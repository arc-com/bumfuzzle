schema_version: 1
rules:
  - group: "Structure"
    rules:
      - type: script_clean
        name: "VERSION file present"
        enabled: true
        command: |
          [ -s VERSION ]
      - type: script_clean
        name: "bf entry point declared in pyproject.toml"
        enabled: true
        command: |
          grep -q '^bf = ' pyproject.toml
      - type: script_clean
        name: "bf entry point declared in package.json"
        enabled: true
        command: |
          grep -q '"bf"' package.json
      - type: script_clean
        name: "bf symlink declared in Homebrew formula"
        enabled: true
        command: |
          grep -q 'install_symlink.*=> "bf"' ../homebrew-tools/Formula/bumfuzzle.rb
  - group: "General"
    rules:
      - type: script_clean
        name: "package.json version matches VERSION"
        enabled: true
        command: |
          grep -q "\"version\": \"$(cat VERSION)\"" package.json

rules:
  - group: "Structure"
    rules:
      - type: script_clean
        name: "VERSION file present"
        enabled: true
        command: |
          [ -s VERSION ]
      - type: script_clean
        name: "bfz entry point declared in pyproject.toml"
        enabled: true
        command: |
          grep -q '^bfz = ' pyproject.toml
      - type: script_clean
        name: "bfz entry point declared in package.json"
        enabled: true
        command: |
          grep -q '"bfz"' package.json
      - type: script_clean
        name: "bfz symlink declared in Homebrew formula"
        enabled: true
        command: |
          grep -q 'install_symlink.*=> "bfz"' Formula/bumfuzzle.rb

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bumfuzzle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;--surf3:#2d333b;
  --b1:#30363d;--b2:#21262d;
  --tx:#e6edf3;--tm:#8b949e;--td:#484f58;
  --ac:#58a6ff;--ac2:#388bfd;
  --gr:#3fb950;--yl:#e3b341;--rd:#f85149;--or:#d29922;--pu:#a371f7;
  --r:6px;--mono:ui-monospace,'SF Mono','Cascadia Code',monospace;
}
body{background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--b1);padding:10px 20px;display:flex;align-items:center;gap:10px}
.hdr-logo{font-weight:700;font-size:15px;letter-spacing:-.3px}
.hdr-meta{font-size:11px;color:var(--td);font-family:var(--mono)}
.hdr-path{font-size:11px;color:var(--tm);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-save{font-size:11px;white-space:nowrap}
.hdr-save.idle{color:var(--td)}.hdr-save.saving{color:var(--tm)}.hdr-save.ok{color:var(--gr)}.hdr-save.err{color:var(--rd)}

/* ── Layout ── */
.wrap{max-width:820px;margin:0 auto;padding:20px 20px 80px}

/* ── Section ── */
.sec{border:1px solid var(--b1);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surf);cursor:pointer;user-select:none}
.sec-hdr:hover{background:var(--surf2)}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tm)}
.sec-body{padding:16px}
.sec-body.closed{display:none}

/* ── Fields ── */
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.lbl{display:block;font-size:11px;color:var(--tm);margin-bottom:5px}
.inp{width:100%;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);font-size:13px;padding:6px 10px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--ac)}
.inp.mono{font-family:var(--mono);font-size:12px}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:26px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surf2);border:1px solid var(--b1);border-radius:20px;padding:2px 8px 2px 10px;font-size:12px;font-family:var(--mono);color:var(--tx)}
.chip-x{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.chip-x:hover{color:var(--rd)}
.chip-empty{font-size:12px;color:var(--td);font-style:italic}
.add-row{display:flex;gap:6px;margin-top:7px}
.add-inp{flex:1;background:var(--surf2);border:1px dashed var(--b1);border-radius:var(--r);color:var(--tx);font-size:12px;font-family:var(--mono);padding:4px 8px;outline:none}
.add-inp:focus{border-color:var(--ac)}
.add-btn{background:transparent;border:1px dashed var(--b1);border-radius:var(--r);color:var(--tm);font-size:12px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-btn:hover{border-color:var(--ac);color:var(--tx)}

/* ── Rule tree ── */
.rtree{padding:2px 0}

/* ── Tree line segments ── */
.rt-pfx{display:flex;flex-shrink:0;align-self:stretch}
.tl-seg{width:16px;flex-shrink:0;position:relative;align-self:stretch}
.tl-pipe::before{content:'';position:absolute;left:7px;top:0;bottom:0;border-left:1px solid var(--b1)}
.tl-tee::before{content:'';position:absolute;left:7px;top:0;bottom:0;border-left:1px solid var(--b1)}
.tl-tee::after{content:'';position:absolute;left:7px;right:0;top:50%;border-top:1px solid var(--b1)}
.tl-end::before{content:'';position:absolute;left:7px;top:0;height:50%;border-left:1px solid var(--b1)}
.tl-end::after{content:'';position:absolute;left:7px;right:0;top:50%;border-top:1px solid var(--b1)}

/* ── Line numbers / row outer ── */
.rt-outer{display:flex;margin-left:-16px}
.rt-ln{display:flex;align-items:center;justify-content:flex-end;width:20px;flex-shrink:0;font-size:10px;font-family:var(--mono);color:var(--td);padding-right:5px;user-select:none}
.rt-status{font-size:10px;color:var(--yl);margin-left:5px;flex-shrink:0;white-space:nowrap}
.rt-grp-count{font-size:11px;color:var(--td);font-family:var(--mono);margin-left:6px;font-weight:400;white-space:nowrap}

/* ── Row ── */
.rt-row{flex:1;display:flex;align-items:center;min-height:36px;padding:0 4px 0 0;border-radius:4px;cursor:pointer;user-select:none;position:relative;min-width:0}
.rt-row:hover{background:rgba(255,255,255,.03)}
.rt-row:hover .rt-actions{opacity:1}
.rt-row.rt-dragging{background:rgba(88,166,255,.08);outline:1px solid rgba(88,166,255,.25);outline-offset:-1px}

/* ── Content ── */
.rt-content{flex:1;min-width:0;padding:5px 4px 5px 0}
.rt-name{display:block;font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
.rt-name.grp{font-weight:600}
.rt-subdesc{display:block;font-size:11px;color:var(--td);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;line-height:1.3}
.rt-name-inp{background:none;border:none;color:var(--tx);font-size:13px;font-weight:600;font-family:inherit;outline:none;padding:0;width:100%;cursor:text;line-height:1.35;display:block}
.rt-name-inp::placeholder{color:var(--td)}
.rt-name-inp:focus{background:var(--surf3);border-radius:3px;padding:0 5px;margin:0 -5px}

/* ── Hover actions ── */
.rt-actions{opacity:0;transition:opacity .1s;display:flex;align-items:center;flex-shrink:0;padding-left:4px}
.rt-rm{background:none;border:none;color:var(--td);cursor:pointer;width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:color .1s,background .1s}
.rt-rm:hover{color:var(--rd);background:rgba(248,81,73,.1)}
.rt-edit:hover{color:var(--pu);background:rgba(163,113,247,.1)}

/* ── Expanded panel ── */
.rt-panel-wrap{display:flex;align-items:flex-start}
.rt-panel{flex:1;border:1px solid var(--b1);border-radius:var(--r);padding:14px 14px 16px;margin:2px 6px 6px;background:var(--surf)}
.rf-sec{margin-bottom:14px}.rf-sec:last-child{margin-bottom:0}
.rf-lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--td);font-family:var(--mono);margin-bottom:7px}

/* ── Segmented control ── */
.seg{display:inline-flex;border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;flex-wrap:wrap}
.seg-btn{background:transparent;border:none;border-right:1px solid var(--b1);color:var(--tm);font-size:11px;font-family:var(--mono);padding:5px 12px;cursor:pointer;white-space:nowrap;transition:background .1s,color .1s}
.seg-btn:last-child{border-right:none}
.seg-btn:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.seg-btn.on{font-weight:600}
.seg-btn.on.t-info     {background:rgba(88,166,255,.08);color:var(--ac)}
.seg-btn.on.t-warn     {background:rgba(227,179,65,.13);color:var(--yl)}
.seg-btn.on.t-error    {background:rgba(210,153,34,.13);color:var(--or)}
.seg-btn.on.t-hard-stop{background:rgba(248,81,73,.13);color:var(--rd)}
.seg-btn.on.t-on       {background:rgba(88,166,255,.1);color:var(--ac)}

/* ── Instruction textarea ── */
.instr-ta{width:100%;min-height:72px;resize:vertical;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);font-size:13px;font-family:inherit;padding:8px 10px;outline:none;line-height:1.5}
.instr-ta:focus{border-color:var(--ac)}

/* ── Panel status bar ── */
.rf-status-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--b1)}
.rf-actions-bar{display:flex;gap:5px}
.rf-btn{background:none;border:1px solid var(--b1);border-radius:4px;color:var(--tm);font-size:11px;font-family:inherit;padding:3px 10px;cursor:pointer;transition:border-color .1s,color .1s,background .1s}
.rf-btn:hover{border-color:var(--tm);color:var(--tx)}
.rf-btn-save{border-color:rgba(63,185,80,.4);color:var(--gr)}
.rf-btn-save:hover{border-color:var(--gr);background:rgba(63,185,80,.07)}
.rf-btn-cancel{border-color:rgba(248,81,73,.3);color:var(--rd)}
.rf-btn-cancel:hover{border-color:var(--rd);background:rgba(248,81,73,.06)}

/* ── Diff view ── */
.rf-diff-empty{font-size:12px;color:var(--td);padding:12px 0;font-style:italic}
.rf-diff-row{display:grid;grid-template-columns:80px 1fr 16px 1fr;gap:4px 8px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--b2);font-size:12px}
.rf-diff-row:last-child{border-bottom:none}
.rf-diff-field{font-family:var(--mono);font-size:10px;color:var(--td);padding-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rf-diff-from{color:var(--tm);font-family:var(--mono);font-size:11px;word-break:break-all;text-decoration:line-through;opacity:.7}
.rf-diff-arrow{color:var(--td);font-size:10px;text-align:center}
.rf-diff-to{color:var(--gr);font-family:var(--mono);font-size:11px;word-break:break-all}

/* ── Root add buttons ── */
.add-root-row{display:flex;gap:6px;margin-top:12px}
.add-root-btn{flex:1;background:transparent;border:1px dashed var(--b1);border-radius:var(--r);color:var(--tm);font-size:12px;padding:8px;cursor:pointer;font-family:inherit;transition:border-color .1s,color .1s}
.add-root-btn:hover{border-color:var(--ac);color:var(--tx)}


/* ── Actions ── */
.act-row{display:flex;gap:8px}
.btn{flex:1;padding:10px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--surf);border:1px solid var(--b1);color:var(--tx);transition:border-color .15s}
.btn:hover:not(:disabled){border-color:var(--ac)}
.btn:disabled{opacity:.38;cursor:default}
.btn.pri{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.pri:hover:not(:disabled){background:var(--ac2);border-color:var(--ac2)}
.btn.cancel{flex:0;padding:10px 16px;color:var(--tm)}
.out-wrap{margin-top:10px;display:none}
.out-log{background:#010409;border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;font-family:var(--mono);font-size:12px;color:#c9d1d9;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;min-height:36px}
.out-status{margin-top:5px;font-size:12px;font-weight:600}
.out-status.ok{color:var(--gr)}.out-status.err{color:var(--rd)}

/* ── Toast ── */
#toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none}
.toast{background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--tm);max-width:280px;opacity:0;transform:translateX(6px);transition:opacity .15s,transform .15s}
.toast.show{opacity:1;transform:translateX(0)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>
'use strict';

let S, C, META;
let state;

// ── Tree helpers ──────────────────────────────────────────────────────────────

function isGroup(item) { return 'group' in item; }
function isRule(item)  { return 'type'  in item; }
function isEnum(item)  { return 'values' in item; }

function getParentArr(path, rootArr) {
  let arr = rootArr;
  for (let i = 0; i < path.length - 1; i++) arr = arr[path[i]].rules;
  return arr;
}

function removeByPath(path, rootArr) {
  const arr = getParentArr(path, rootArr);
  return arr.splice(path[path.length - 1], 1)[0];
}

function insertByPath(path, item, rootArr) {
  const arr = getParentArr(path, rootArr);
  arr.splice(path[path.length - 1], 0, item);
}

function findPath(target, items, base) {
  for (let i = 0; i < items.length; i++) {
    if (items[i] === target) return [...base, i];
    if (isGroup(items[i])) {
      const r = findPath(target, items[i].rules || [], [...base, i]);
      if (r) return r;
    }
  }
  return null;
}

function isAncestorOf(ancestor, item) {
  if (!isGroup(ancestor)) return false;
  const check = rules => (rules || []).some(r => r === item || (isGroup(r) && check(r.rules)));
  return check(ancestor.rules);
}

// ── Data init ─────────────────────────────────────────────────────────────────

function defaultEnums() {
  return [{
    group: 'Claude Model Configuration',
    rules: [
      { name: 'model', description: 'Selects the default model.', values: ['claude-3-5-sonnet', 'claude-3-opus', 'claude-3-haiku', 'claude-3-5-haiku'] },
      { name: 'availableModels', description: 'Restricts the models available to users or subagents.', values: ['claude-3-5-sonnet', 'claude-3-opus', 'claude-3-haiku', 'claude-3-5-haiku'] },
      { name: 'effortLevel', description: 'Controls the depth of extended thinking.', values: ['low', 'medium', 'high'] },
    ],
  }];
}

function initData() {
  const cRules = C && C.rules;
  const sRules = S && S.rules;
  const cEnums = C && C.enums;
  const sEnums = S && S.enums;
  state = {
    rules: JSON.parse(JSON.stringify(cRules || sRules || [])),
    enums: JSON.parse(JSON.stringify(cEnums || sEnums || defaultEnums())),
    sections: { rules: true, enums: true, actions: true },
  };
  annotate(state.rules);
  annotateEnums(state.enums);
}

function annotate(items) {
  (items || []).forEach(item => {
    if (isGroup(item)) {
      if (item._col === undefined) item._col = false;
      if (!item.rules) item.rules = [];
      annotate(item.rules);
    } else {
      if (item._exp === undefined) item._exp = false;
      if (!item.name) item.name = '';
      if (!item.scope || item.scope === 'recursive') item.scope = 'root';
      if (Array.isArray(item.hints)) {
        item.instruction = item.hints.join('\n');
        delete item.hints;
      } else if (item.instruction === undefined) {
        item.instruction = '';
      }
      if (item._saved === undefined) item._saved = ruleSnapshot(item);
      if (item._mode === undefined) item._mode = 'edit';
    }
  });
}

function annotateEnums(items) {
  (items || []).forEach(item => {
    if (isGroup(item)) {
      if (item._col === undefined) item._col = false;
      // normalize group children key from saved YAML
      if (item.enums && !item.rules) { item.rules = item.enums; delete item.enums; }
      if (!item.rules) item.rules = [];
      annotateEnums(item.rules);
    } else {
      if (item._exp === undefined) item._exp = false;
      if (!item.name) item.name = '';
      if (!item.description) item.description = '';
      if (!Array.isArray(item.values)) item.values = [];
    }
  });
}

// ── DOM helpers ───────────────────────────────────────────────────────────────

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

function showToast(msg) {
  const t = el('div', { class: 'toast' }, msg);
  document.getElementById('toasts').append(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 200); }, 2800);
}

// ── Auto-save ─────────────────────────────────────────────────────────────────

let saveTimer = null, saveEl = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveStatus('saving');
  saveTimer = setTimeout(doSave, 600);
}

async function doSave() {
  try {
    const res = await fetch('/save', { method: 'POST', body: generateYaml() });
    if (!res.ok) throw new Error();
    setSaveStatus('ok');
  } catch { setSaveStatus('err'); }
}

function setSaveStatus(s) {
  if (!saveEl) return;
  const labels = { idle: '', saving: 'Saving…', ok: 'Saved ✓', err: 'Save failed' };
  saveEl.textContent = labels[s] || '';
  saveEl.className = 'hdr-save ' + s;
}

// ── YAML generation ───────────────────────────────────────────────────────────

function generateYaml() {
  const lines = [];

  function writeRuleItems(items, indent) {
    for (const item of items) {
      if (isGroup(item)) {
        lines.push(indent + '- group: ' + JSON.stringify(item.group));
        lines.push(indent + '  rules:');
        if (item.rules && item.rules.length) writeRuleItems(item.rules, indent + '    ');
      } else {
        lines.push(indent + '- type: ' + item.type);
        lines.push(indent + '  name: '                              + JSON.stringify(item.name));
        if (item.description) lines.push(indent + '  description: ' + JSON.stringify(item.description));
        if (item.target)      lines.push(indent + '  target: '      + JSON.stringify(item.target));
        if (item.pattern !== undefined && item.pattern !== '')
                              lines.push(indent + '  pattern: '     + JSON.stringify(item.pattern));
        if (item.scope && item.scope !== 'root')
                              lines.push(indent + '  scope: '       + JSON.stringify(item.scope));
        if (item.exclude)     lines.push(indent + '  exclude: '     + JSON.stringify(item.exclude));
        if (item.command)     lines.push(indent + '  command: '     + JSON.stringify(item.command));
        if (item.severity && item.severity !== 'error')
                              lines.push(indent + '  severity: '    + item.severity);
        if (item.instruction) lines.push(indent + '  instruction: ' + JSON.stringify(item.instruction));
      }
    }
  }

  function writeEnumItems(items, indent) {
    for (const item of items) {
      if (isGroup(item)) {
        lines.push(indent + '- group: ' + JSON.stringify(item.group));
        lines.push(indent + '  enums:');
        if (item.rules && item.rules.length) writeEnumItems(item.rules, indent + '    ');
      } else {
        lines.push(indent + '- name: ' + JSON.stringify(item.name));
        if (item.description) lines.push(indent + '  description: ' + JSON.stringify(item.description));
        if (item.values.length) {
          lines.push(indent + '  values:');
          item.values.forEach(v => lines.push(indent + '    - ' + JSON.stringify(v)));
        } else {
          lines.push(indent + '  values: []');
        }
      }
    }
  }

  if (state.rules.length) { lines.push('rules:'); writeRuleItems(state.rules, '  '); }
  else lines.push('rules: []');

  if (state.enums.length) { lines.push('enums:'); writeEnumItems(state.enums, '  '); }
  else lines.push('enums: []');

  return lines.join('\n') + '\n';
}

// ── Line number assignment ────────────────────────────────────────────────────

function assignLineNumbers(items) {
  let n = 0;
  function walk(arr) {
    (arr || []).forEach(item => {
      item._ln = ++n;
      if (isGroup(item)) walk(item.rules);
    });
  }
  walk(items);
}

// ── Flatten tree ──────────────────────────────────────────────────────────────

function flattenRules(items, ancestorCols, pathBase) {
  const out = [];
  (items || []).forEach((item, i) => {
    const last = i === items.length - 1;
    const path = [...pathBase, i];
    const cols = [...ancestorCols, !last];
    if (isGroup(item)) {
      out.push({ kind: 'group', item, cols, path });
      if (!item._col) out.push(...flattenRules(item.rules || [], cols, path));
    } else {
      out.push({ kind: 'rule', item, cols, path });
      if (item._exp) out.push({ kind: 'panel', item, cols, path });
    }
  });
  return out;
}

function flattenEnums(items, ancestorCols, pathBase) {
  const out = [];
  (items || []).forEach((item, i) => {
    const last = i === items.length - 1;
    const path = [...pathBase, i];
    const cols = [...ancestorCols, !last];
    if (isGroup(item)) {
      out.push({ kind: 'enum-group', item, cols, path });
      if (!item._col) out.push(...flattenEnums(item.rules || [], cols, path));
    } else {
      out.push({ kind: 'enum', item, cols, path });
      if (item._exp) out.push({ kind: 'enum-panel', item, cols, path });
    }
  });
  return out;
}

// ── Tree line prefix ──────────────────────────────────────────────────────────

function countItems(group) {
  return (group.rules || []).reduce((n, item) => n + 1 + (isGroup(item) ? countItems(item) : 0), 0);
}

function buildPrefix(cols, isPanel) {
  const pfx = el('div', { class: 'rt-pfx' });
  if (cols.length === 0) return pfx;
  const isRoot = cols.length === 1;
  if (isRoot) {
    // root items: no visual connector, no segments
    return pfx;
  }
  for (let d = 0; d < cols.length - 1; d++) {
    pfx.append(el('span', { class: 'tl-seg' + (cols[d] ? ' tl-pipe' : '') }));
  }
  const hasSiblings = cols[cols.length - 1];
  if (isPanel) {
    pfx.append(el('span', { class: 'tl-seg' + (hasSiblings ? ' tl-pipe' : '') }));
  } else {

  return pfx;
}

// ── Drag system ───────────────────────────────────────────────────────────────

let rulesRowRegistry = [];
let enumsRowRegistry = [];
let drag = null;
let lastDropItem = null, lastDropMode = null;
let lastCursorY = null;

function initDrag() {
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
}

function attachDrag(rowEl, item, rootArr) {
  rowEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.tagName === 'TEXTAREA') return;
    drag = { item, startX: e.clientX, startY: e.clientY, active: false, rootArr, dir: 'down' };
  });
}

function computeDropTarget(e, dir) {
  const allRows = [...rulesRowRegistry, ...enumsRowRegistry];
  for (const { item, el: rowEl, rootArr } of allRows) {
    if (item === drag.item || isAncestorOf(drag.item, item)) continue;
    if (rootArr !== drag.rootArr) continue;
    const rect = rowEl.getBoundingClientRect();
    if (e.clientY < rect.top || e.clientY > rect.bottom) continue;
    return { item, mode: dir === 'down' ? 'after' : 'before' };
  }
  return null;
}

function onDragMove(e) {
  if (!drag) return;
  if (!drag.active) {
    if (Math.abs(e.clientX - drag.startX) + Math.abs(e.clientY - drag.startY) < 5) return;
    drag.active = true;
  }

  if (lastCursorY !== null && e.clientY !== lastCursorY) {
    drag.dir = e.clientY > lastCursorY ? 'down' : 'up';
  }
  lastCursorY = e.clientY;

  const dropInfo = computeDropTarget(e, drag.dir);
  if (!dropInfo || (dropInfo.item === lastDropItem && dropInfo.mode === lastDropMode)) return;

  const rootArr = drag.rootArr;
  const srcPath = findPath(drag.item, rootArr, []);
  if (!srcPath) return;
  removeByPath(srcPath, rootArr);

  if (dropInfo.mode === 'into') {
    dropInfo.item.rules = dropInfo.item.rules || [];
    dropInfo.item.rules.unshift(drag.item);
  } else {
    const dstPath = findPath(dropInfo.item, rootArr, []);
    if (!dstPath) { insertByPath(srcPath, drag.item, rootArr); return; }
    if (dropInfo.mode === 'after') dstPath[dstPath.length - 1]++;
    insertByPath(dstPath, drag.item, rootArr);
  }

  lastDropItem = dropInfo.item;
  lastDropMode = dropInfo.mode;

  if (rootArr === state.rules) reRenderRules();
  else reRenderEnums();

  const reg = [...rulesRowRegistry, ...enumsRowRegistry].find(r => r.item === drag.item);
  if (reg) reg.el.classList.add('rt-dragging');
}

function onDragEnd() {
  if (!drag) return;
  const wasActive = drag.active;
  const rootArr = drag.rootArr;
  drag = null; lastDropItem = null; lastDropMode = null; lastCursorY = null;
  if (wasActive) {
    if (rootArr === state.rules) reRenderRules();
    else reRenderEnums();
    scheduleSave();
    document.addEventListener('click', e => e.stopPropagation(), { capture: true, once: true });
  }
}

// ── Section factory ───────────────────────────────────────────────────────────

function makeSection(key, title) {
  const sec  = el('div', { class: 'sec' });
  const hdr  = el('div', { class: 'sec-hdr' });
  hdr.append(el('span', { class: 'sec-title' }, title));
  sec.append(hdr);
  const body = el('div', { class: 'sec-body' });
  sec.append(body);
  hdr.addEventListener('click', () => {
    const open = !body.classList.contains('closed');
    body.classList.toggle('closed', open);
    state.sections[key] = !open;
  });
  return { sec, body };
}

// ── Rule snapshot helpers ─────────────────────────────────────────────────────

const RULE_TYPES  = ['file_present','file_absent','content_present','content_absent','script_clean'];
const SEV_LEVELS  = ['info','warn','error','hard-stop'];
const SNAP_FIELDS = ['type','name','description','target','scope','pattern','exclude','command','severity','instruction'];

function ruleSnapshot(rule) {
  const s = {};
  SNAP_FIELDS.forEach(f => { s[f] = rule[f] ?? ''; });
  return JSON.stringify(s);
}
function isDirty(rule) {
  return rule._saved === null || ruleSnapshot(rule) !== rule._saved;
}
function diffFields(rule) {
  if (!rule._saved) return [];
  const from = JSON.parse(rule._saved);
  return SNAP_FIELDS
    .filter(f => (from[f] ?? '') !== (rule[f] ?? ''))
    .map(f => ({ f, from: from[f] ?? '', to: rule[f] ?? '' }));
}

// ── Rule field editor ─────────────────────────────────────────────────────────

function buildRuleFields(rule) {
  const panel = el('div', { class: 'rt-panel' });

  const btnDiff   = el('button', { class: 'rf-btn' }, 'Diff');
  const btnSave   = el('button', { class: 'rf-btn rf-btn-save' }, 'Save');
  const btnEdit   = el('button', { class: 'rf-btn' }, 'Edit');
  const btnCancel = el('button', { class: 'rf-btn rf-btn-cancel' }, 'Cancel');
  panel.append(el('div', { class: 'rf-status-bar' },
    el('div', { class: 'rf-actions-bar' }, btnDiff, btnEdit, btnSave, btnCancel),
  ));

  const formView = el('div', {});
  function sec(lbl, content) {
    const s = el('div', { class: 'rf-sec' });
    s.append(el('span', { class: 'rf-lbl' }, lbl), content);
    return s;
  }

  const nInp = el('input', { class: 'inp', type: 'text', placeholder: 'Short label for this rule' });
  nInp.value = rule.name || '';
  nInp.addEventListener('input', () => { rule.name = nInp.value; rule._updateRow?.(); scheduleSave(); updateStatus(); });

  const tSeg = el('div', { class: 'seg', style: 'flex-wrap:wrap;gap:1px' });
  const tBtns = {};
  RULE_TYPES.forEach(t => {
    const b = el('button', { class: 'seg-btn' + (rule.type === t ? ' on t-on' : '') }, t.replace(/_/g, ' '));
    b.dataset.val = t;
    b.addEventListener('click', () => {
      rule.type = t;
      Object.values(tBtns).forEach(x => x.className = 'seg-btn' + (x.dataset.val === t ? ' on t-on' : ''));
      scheduleSave(); updateStatus();
    });
    tBtns[t] = b; tSeg.append(b);
  });

  const dInp = el('input', { class: 'inp', type: 'text', placeholder: 'What does this rule check?' });
  dInp.value = rule.description || '';
  dInp.addEventListener('input', () => { rule.description = dInp.value; rule._updateRow?.(); scheduleSave(); updateStatus(); });

  const tgtInp = el('input', { class: 'inp mono', type: 'text', placeholder: 'Dockerfile, config/*.yml …' });
  tgtInp.value = rule.target || '';
  tgtInp.addEventListener('input', () => { rule.target = tgtInp.value.trim(); scheduleSave(); updateStatus(); });

  const scSeg = el('div', { class: 'seg' });
  const scBtns = {};
  const scPathInp = el('input', { class: 'inp mono', type: 'text', placeholder: 'src/components',
    style: 'margin-top:7px' + (rule.scope !== 'root' ? '' : ';display:none') });
  scPathInp.value = rule.scope !== 'root' ? rule.scope : '';
  scPathInp.addEventListener('input', () => { rule.scope = scPathInp.value.trim() || ''; scheduleSave(); updateStatus(); });
  ['root', 'custom'].forEach(s => {
    const isOn = s === 'root' ? rule.scope === 'root' : rule.scope !== 'root';
    const b = el('button', { class: 'seg-btn' + (isOn ? ' on t-on' : '') }, s);
    b.dataset.val = s;
    b.addEventListener('click', () => {
      if (s === 'root') {
        rule.scope = 'root';
        scPathInp.style.display = 'none';
      } else {
        if (rule.scope === 'root') rule.scope = '';
        scPathInp.style.display = '';
        scPathInp.focus();
      }
      Object.values(scBtns).forEach(x => {
        const on = x.dataset.val === 'root' ? rule.scope === 'root' : rule.scope !== 'root';
        x.className = 'seg-btn' + (on ? ' on t-on' : '');
      });
      scheduleSave(); updateStatus();
    });
    scBtns[s] = b; scSeg.append(b);
  });

  const pInp = el('input', { class: 'inp mono', type: 'text', placeholder: 'console\\.log, TODO …' });
  pInp.value = rule.pattern || '';
  pInp.addEventListener('input', () => { rule.pattern = pInp.value; scheduleSave(); updateStatus(); });

  const exInp = el('input', { class: 'inp mono', type: 'text', placeholder: 'config/local.yml' });
  exInp.value = rule.exclude || '';
  exInp.addEventListener('input', () => { rule.exclude = exInp.value.trim(); scheduleSave(); updateStatus(); });

  const cInp = el('input', { class: 'inp mono', type: 'text', placeholder: 'npx tsc --noEmit' });
  cInp.value = rule.command || '';
  cInp.addEventListener('input', () => { rule.command = cInp.value; scheduleSave(); updateStatus(); });

  const sSeg = el('div', { class: 'seg' });
  const sBtns = {};
  SEV_LEVELS.forEach(s => {
    const b = el('button', { class: 'seg-btn' + ((rule.severity || 'error') === s ? ' on t-' + s : '') }, s);
    b.dataset.val = s;
    b.addEventListener('click', () => {
      rule.severity = s;
      Object.values(sBtns).forEach(x => x.className = 'seg-btn' + (x.dataset.val === s ? ' on t-' + s : ''));
      scheduleSave(); updateStatus();
    });
    sBtns[s] = b; sSeg.append(b);
  });

  const iTa = el('textarea', { class: 'instr-ta', placeholder: 'What should the developer do when this check fails?' });
  iTa.value = rule.instruction || '';
  iTa.addEventListener('input', () => { rule.instruction = iTa.value; scheduleSave(); updateStatus(); });

  formView.append(
    sec('Name', nInp),
    sec('Type', tSeg),
    sec('Description', dInp),
    sec('Target — path or glob', tgtInp),
    sec('Scope', el('div', {}, scSeg, scPathInp)),
    sec('Pattern — grep regex', pInp),
    sec('Exclude — glob to skip (optional)', exInp),
    sec('Command', cInp),
    sec('Severity on fail', sSeg),
    sec('Instructions on fail', iTa),
  );

  const diffView = el('div', {});
  function renderDiff() {
    diffView.innerHTML = '';
    const changes = diffFields(rule);
    if (!changes.length) { diffView.append(el('div', { class: 'rf-diff-empty' }, 'No changes')); return; }
    changes.forEach(({ f, from, to }) => {
      diffView.append(el('div', { class: 'rf-diff-row' },
        el('span', { class: 'rf-diff-field' }, f),
        el('span', { class: 'rf-diff-from' }, from || '(empty)'),
        el('span', { class: 'rf-diff-arrow' }, '→'),
        el('span', { class: 'rf-diff-to' }, to || '(empty)'),
      ));
    });
  }

  panel.append(formView, diffView);

  function updateStatus() {
    const dirty = isDirty(rule);
    const mode  = rule._mode;
    nInp.style.borderColor = rule.name ? '' : 'var(--rd)';
    btnDiff.style.display   = (mode === 'edit' && dirty && rule._saved !== null) ? '' : 'none';
    btnSave.style.display   = (dirty && !!rule.name) ? '' : 'none';
    btnEdit.style.display   = mode === 'diff' ? '' : 'none';
    btnCancel.style.display = dirty ? '' : 'none';
  }

  function setMode(mode) {
    rule._mode = mode;
    formView.style.display = mode === 'edit' ? '' : 'none';
    diffView.style.display = mode === 'diff' ? '' : 'none';
    if (mode === 'diff') renderDiff();
    updateStatus();
  }

  btnDiff.addEventListener('click', () => setMode('diff'));
  btnEdit.addEventListener('click', () => setMode('edit'));

  btnSave.addEventListener('click', () => {
    rule._saved = ruleSnapshot(rule);
    rule._updateRow?.();
    scheduleSave();
    setMode('edit');
  });

  btnCancel.addEventListener('click', () => {
    if (rule._saved === null) {
      const path = findPath(rule, state.rules, []);
      if (path) { removeByPath(path, state.rules); reRenderRules(); scheduleSave(); }
      return;
    }
    const saved = JSON.parse(rule._saved);
    SNAP_FIELDS.forEach(f => { rule[f] = saved[f] ?? ''; });
    nInp.value   = rule.name        || '';
    dInp.value   = rule.description || '';
    tgtInp.value = rule.target      || '';
    pInp.value   = rule.pattern     || '';
    exInp.value  = rule.exclude     || '';
    cInp.value   = rule.command     || '';
    iTa.value    = rule.instruction || '';
    Object.values(tBtns).forEach(b => {
      b.className = 'seg-btn' + (b.dataset.val === rule.type ? ' on t-on' : '');
    });
    Object.values(scBtns).forEach(b => {
      const on = b.dataset.val === 'root' ? rule.scope === 'root' : rule.scope !== 'root';
      b.className = 'seg-btn' + (on ? ' on t-on' : '');
    });
    scPathInp.style.display = rule.scope !== 'root' ? '' : 'none';
    scPathInp.value = rule.scope !== 'root' ? rule.scope : '';
    Object.values(sBtns).forEach(b => {
      b.className = 'seg-btn' + (b.dataset.val === (rule.severity || 'error') ? ' on t-' + b.dataset.val : '');
    });
    rule._updateRow?.();
    scheduleSave();
    setMode('edit');
  });

  setMode(rule._mode || 'edit');
  return panel;
}

    removeByPath(entry.path, state.enums); reRenderEnums(); scheduleSave();
  });

  row.append(buildPrefix(cols), content, el('div', { class: 'rt-actions' }, rm));

  attachDrag(row, item, state.enums);
  enumsRowRegistry.push({ item, el: row, rootArr: state.enums });
  const outer = el('div', { class: 'rt-outer' });
  outer.append(el('span', { class: 'rt-ln' }, String(item._ln)), row);
  return outer;
}

function buildEnumPanelRow(entry) {
  const { item, cols } = entry;
  const wrap = el('div', { class: 'rt-panel-wrap' });
  wrap.append(buildPrefix(cols, true));
  wrap.append(buildEnumPanel(item));
  const outer = el('div', { class: 'rt-outer' });
  outer.append(el('span', { class: 'rt-ln' }), wrap);
  return outer;
}

// ── Tree render ───────────────────────────────────────────────────────────────

let rulesBodyEl = null;
let enumsBodyEl = null;

function buildRulesTree() {
  rulesRowRegistry = [];
  const wrap = el('div', { class: 'rtree' });

  flattenRules(state.rules, [], []).forEach(entry => {
    if      (entry.kind === 'group') wrap.append(buildGroupRow(entry));
    else if (entry.kind === 'rule')  wrap.append(buildRuleRow(entry));
    else if (entry.kind === 'panel') wrap.append(buildPanelRow(entry));
  });

  const addRow  = el('div', { class: 'add-root-row' });
  const addRule = el('button', { class: 'add-root-btn' }, '+ Add Rule');
  addRule.addEventListener('click', () => {
    state.rules.push({ type: 'file_present', name: 'New Rule', description: '', target: '',
      scope: 'recursive', severity: 'error', instruction: '', _exp: true, _saved: null, _mode: 'edit' });
    reRenderRules(); scheduleSave();
  });
  const addGroup = el('button', { class: 'add-root-btn' }, '+ Add Group');
  addGroup.addEventListener('click', () => {
    state.rules.push({ group: 'New Group', rules: [], _col: false });
    reRenderRules(); scheduleSave();
  });
  addRow.append(addRule, addGroup);
  wrap.append(addRow);
  return wrap;
}

function buildEnumsTree() {
  enumsRowRegistry = [];
  const wrap = el('div', { class: 'rtree' });

  flattenEnums(state.enums, [], []).forEach(entry => {
    if      (entry.kind === 'enum-group') wrap.append(buildEnumGroupRow(entry));
    else if (entry.kind === 'enum')       wrap.append(buildEnumRow(entry));
    else if (entry.kind === 'enum-panel') wrap.append(buildEnumPanelRow(entry));
  });

  const addRow  = el('div', { class: 'add-root-row' });
  const addEnum = el('button', { class: 'add-root-btn' }, '+ Add Enum');
  addEnum.addEventListener('click', () => {
    state.enums.push({ name: '', description: '', values: [], _exp: true });
    reRenderEnums(); scheduleSave();
  });
  const addGroup = el('button', { class: 'add-root-btn' }, '+ Add Group');
  addGroup.addEventListener('click', () => {
    state.enums.push({ group: 'New Group', rules: [], _col: false });
    reRenderEnums(); scheduleSave();
  });
  addRow.append(addEnum, addGroup);
  wrap.append(addRow);
  return wrap;
}

function reRenderRules(anchorItem, anchorY) {
  if (!rulesBodyEl) return;
  assignLineNumbers(state.rules);
  rulesBodyEl.innerHTML = '';
  rulesBodyEl.append(buildRulesTree());
  if (anchorItem !== undefined && anchorY !== undefined) {
    const reg = rulesRowRegistry.find(r => r.item === anchorItem);
    if (reg) window.scrollBy(0, reg.el.getBoundingClientRect().top - anchorY);
  }
}

function reRenderEnums(anchorItem, anchorY) {
  if (!enumsBodyEl) return;
  assignLineNumbers(state.enums);
  enumsBodyEl.innerHTML = '';
  enumsBodyEl.append(buildEnumsTree());
  if (anchorItem !== undefined && anchorY !== undefined) {
    const reg = enumsRowRegistry.find(r => r.item === anchorItem);
    if (reg) window.scrollBy(0, reg.el.getBoundingClientRect().top - anchorY);
  }
}

// ── Command runner ────────────────────────────────────────────────────────────

let cmdRunning = false, confirmCmd = null;
let outLogEl = null, outStatusEl = null, outWrapEl = null, actRowEl = null;

async function runCmd(cmd) {
  try {
    const res = await fetch('/run/' + cmd, { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const evts = buf.split('\n\n');
      buf = evts.pop();
      for (const ev of evts) {
        if (!ev.startsWith('data: ')) continue;
        const line = JSON.parse(ev.slice(6));
        if (typeof line === 'string' && line.startsWith('__DONE__')) {
          const ec = parseInt(line.split(' ')[1], 10);
          outStatusEl.textContent = ec === 0 ? '✓ Done' : '✗ Exited ' + ec;
          outStatusEl.className = 'out-status ' + (ec === 0 ? 'ok' : 'err');
          break outer;
        }
        outLogEl.textContent += line + '\n';
        outLogEl.scrollTop = outLogEl.scrollHeight;
      }
    }
  } catch (e) {
    outStatusEl.textContent = '✗ ' + e.message;
    outStatusEl.className = 'out-status err';
  }
  cmdRunning = false;
  renderActBtns();
}

function renderActBtns() {
  if (!actRowEl) return;
  actRowEl.innerHTML = '';
  if (confirmCmd) {
    actRowEl.append(
      el('button', { class: 'btn cancel', onclick: () => { confirmCmd = null; renderActBtns(); } }, 'Cancel'),
      el('button', { class: 'btn pri', onclick: () => {
        const cmd = confirmCmd; confirmCmd = null;
        cmdRunning = true;
        outLogEl.textContent = ''; outStatusEl.textContent = '';
        outStatusEl.className = 'out-status';
        outWrapEl.style.display = '';
        renderActBtns(); runCmd(cmd);
      }}, 'Run ' + confirmCmd),
    );
  } else {
    ['kickstart','preflight'].forEach((cmd, i) => {
      const b = el('button', { class: 'btn' + (i === 0 ? ' pri' : '') },
        cmd.charAt(0).toUpperCase() + cmd.slice(1));
      b.disabled = cmdRunning;
      b.addEventListener('click', () => { if (!cmdRunning) { confirmCmd = cmd; renderActBtns(); } });
      actRowEl.append(b);
    });
  }
}

// ── Page render ───────────────────────────────────────────────────────────────

function renderPage() {
  const app = document.getElementById('app');

  saveEl = el('span', { class: 'hdr-save idle' });
  app.append(el('div', { class: 'hdr' },
    el('span', { class: 'hdr-logo' }, 'bumfuzzle'),
    el('span', { class: 'hdr-meta' }, 'v' + META.version),
    el('span', { class: 'hdr-path' }, META.projectDir),
    saveEl,
  ));

  const wrap = el('div', { class: 'wrap' });

  // Rules
  const { sec: rulesSec, body: rb } = makeSection('rules', 'Rules');
  rulesBodyEl = rb;
  reRenderRules();
  wrap.append(rulesSec);

  // Enums
  const { sec: enumsSec, body: eb } = makeSection('enums', 'Enums');
  enumsBodyEl = eb;
  reRenderEnums();
  wrap.append(enumsSec);

  // Actions
  const { sec: actSec, body: ab } = makeSection('actions', 'Actions');
  actRowEl    = el('div', { class: 'act-row' });
  outLogEl    = el('pre',  { class: 'out-log' });
  outStatusEl = el('div',  { class: 'out-status' });
  outWrapEl   = el('div',  { class: 'out-wrap' }, outLogEl, outStatusEl);
  renderActBtns();
  ab.append(actRowEl, outWrapEl);
  wrap.append(actSec);

  app.append(wrap);
  initDrag();
}

// ── Boot ──────────────────────────────────────────────────────────────────────

(async () => {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    S = cfg.settings; C = cfg.current; META = cfg.meta;
    initData();
    renderPage();
  } catch {
    document.getElementById('app').textContent = 'Run bumfuzzle to open this page.';
  }
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bumfuzzle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
  --text: #e2e8f0; --muted: #475569; --accent: #6366f1;
  --accent-dim: #4f46e5; --success: #22c55e; --error: #ef4444;
  --radius: 8px; --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
#app { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }
h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
.status-line { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 28px; word-break: break-all; }
.status-path { color: var(--text); }
.section { margin-bottom: 28px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.section-subtitle { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.field input[type=text] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; padding: 8px 12px; outline: none; transition: border-color 0.15s; font-family: inherit; }
.field input[type=text]:focus { border-color: var(--accent); }
.badge { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 12px; font-family: var(--mono); }

/* ── Tree ──────────────────────────────────────────────────────────────────── */
.tree { font-family: var(--mono); font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 4px; }
.tree-root { color: var(--muted); padding: 2px 10px 6px; font-size: 13px; }
.tree-row { display: flex; align-items: center; padding: 2px 6px; border-radius: 4px; cursor: pointer; user-select: none; min-height: 22px; }
.tree-row:hover:not(.is-locked):not(.is-required) { background: rgba(99,102,241,0.07); }
.tree-row.is-locked   { opacity: 0.35; cursor: not-allowed; }
.tree-row.is-required { cursor: not-allowed; }
.tree-prefix   { color: var(--muted); white-space: pre; flex-shrink: 0; }
.tree-expander { width: 16px; flex-shrink: 0; color: var(--muted); font-size: 9px; text-align: center; }
.tree-expander:hover { color: var(--text); }
.tree-cb { width: 13px; height: 13px; border: 1.5px solid var(--border); border-radius: 3px; margin: 0 7px 0 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.1s, border-color 0.1s; font-size: 9px; color: #fff; line-height: 1; }
.tree-row.is-present .tree-cb { background: var(--success); border-color: var(--success); }
.tree-row.is-present .tree-cb::after { content: '✓'; }
.tree-name { color: var(--muted); }
.tree-row.is-present .tree-name { color: var(--text); }
.tree-name.is-dir { color: #334155; }
.tree-row.is-present .tree-name.is-dir { color: #93c5fd; }
.tree-add { display: flex; gap: 6px; margin: 8px 10px 2px; }
.tree-add input { flex: 1; background: transparent; border: 1px dashed var(--border); border-radius: 4px; color: var(--muted); font-size: 12px; font-family: var(--mono); padding: 4px 8px; outline: none; }
.tree-add input:focus { border-color: var(--accent); color: var(--text); }
.tree-add input::placeholder { color: #334155; }
.tree-add button { background: transparent; border: 1px dashed var(--border); border-radius: 4px; color: var(--muted); font-size: 11px; padding: 4px 10px; cursor: pointer; white-space: nowrap; font-family: inherit; }
.tree-add button:hover { border-color: var(--accent); color: var(--text); }

/* ── Chips ─────────────────────────────────────────────────────────────────── */
.chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 28px; align-items: center; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 8px 3px 11px; font-size: 12px; font-family: var(--mono); color: var(--text); }
.chip-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; padding: 0 1px; }
.chip-x:hover { color: var(--error); }
.chip-empty { font-size: 12px; color: var(--muted); font-style: italic; }

/* ── Add row ───────────────────────────────────────────────────────────────── */
.add-row { display: flex; gap: 7px; margin-top: 7px; }
.add-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 12px; font-family: var(--mono); padding: 6px 10px; outline: none; }
.add-row input:focus { border-color: var(--accent); }
.add-row button { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer; font-family: inherit; }
.add-row button:hover { border-color: var(--accent); color: var(--text); }

/* ── Toast ─────────────────────────────────────────────────────────────────── */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; align-items: flex-end; }
.toast { background: #1e1b4b; border: 1px solid #4338ca; border-radius: var(--radius); padding: 8px 14px; font-size: 12px; color: #a5b4fc; max-width: 280px; opacity: 0; transform: translateX(8px); transition: opacity 0.18s, transform 0.18s; }
.toast.visible { opacity: 1; transform: translateX(0); }

/* ── Save status ───────────────────────────────────────────────────────────── */
.save-status { font-size: 11px; color: var(--muted); white-space: nowrap; }
.save-status.is-saved { color: var(--success); }
.save-status.is-error { color: var(--error); }

/* ── Action buttons ────────────────────────────────────────────────────────── */
.action-row { display: flex; gap: 10px; }
.btn-action { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-weight: 600; padding: 13px; cursor: pointer; font-family: inherit; transition: border-color 0.15s; }
.btn-action:hover:not(:disabled) { border-color: var(--accent); }
.btn-action:disabled { opacity: 0.38; cursor: default; }
.btn-action.is-confirm { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-action.is-confirm:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
.btn-action.is-cancel { flex: 0; padding: 13px 20px; color: var(--muted); }

/* ── Output log ────────────────────────────────────────────────────────────── */
.output-wrap { margin-top: 14px; }
.output-log { background: #000; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-family: var(--mono); font-size: 12px; color: #d4d4d4; white-space: pre-wrap; word-break: break-all; max-height: 360px; overflow-y: auto; min-height: 48px; }
.output-status { margin-top: 8px; font-size: 13px; font-weight: 600; }
.output-status.is-success { color: var(--success); }
.output-status.is-error   { color: var(--error); }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Config & derived state (set by boot) ──────────────────────────────────────

let S, C, META;
let wizDirs, wizFiles, TOOL_DEFS, TOOL_KEYS, FRAG_DEFS, GITI_FRAGS, GITI_DEFAULTS;
let STATIC_TREE, PARENT_MAP, NODE_BREADCRUMBS;
let state;

// ── static data builders ──────────────────────────────────────────────────────

function buildStaticTree() {
  const byPath = {};
  const roots  = [];
  const allEntries = [
    ...wizDirs.map(d  => ({ ...d,  isDir: true,  nodePath: d.label.replace(/\/$/, '') })),
    ...wizFiles.map(f => ({ ...f,  isDir: false, nodePath: f.foreach ? null : f.label })),
  ].filter(e => e.nodePath !== null);

  for (const e of allEntries) byPath[e.nodePath] = { ...e, children: [] };
  for (const e of allEntries) {
    const node = byPath[e.nodePath];
    const slash = e.nodePath.lastIndexOf('/');
    const par   = slash >= 0 ? e.nodePath.substring(0, slash) : null;
    if (par && byPath[par]) byPath[par].children.push(node);
    else roots.push(node);
  }

  wizFiles.filter(f => f.foreach).forEach(f => roots.push({ ...f, isDir: false, children: [] }));
  return roots;
}

function allStaticNodes() {
  const out = [];
  (function walk(ns) { ns.forEach(n => { out.push(n); walk(n.children || []); }); })(STATIC_TREE);
  return out;
}

function buildParentMap() {
  const map = {};
  (function walk(nodes, parent) {
    nodes.forEach(n => { if (parent) map[n.key] = parent; walk(n.children || [], n); });
  })(STATIC_TREE, null);
  return map;
}

// ── data initialization ───────────────────────────────────────────────────────

function initData() {
  wizDirs  = (S.bumfuzzle && S.bumfuzzle.directories) || [];
  wizFiles = (S.bumfuzzle && S.bumfuzzle.files) || [];

  TOOL_DEFS = S.tools || {};
  TOOL_KEYS = Object.keys(TOOL_DEFS);

  FRAG_DEFS     = (S.gitignore && S.gitignore.fragments) || {};
  GITI_FRAGS    = Object.keys(FRAG_DEFS);
  const gitiCommon = (S.gitignore && S.gitignore.defaults && S.gitignore.defaults.common) || [];
  GITI_DEFAULTS = new Set(gitiCommon);

  STATIC_TREE = buildStaticTree();
  PARENT_MAP  = buildParentMap();

  NODE_BREADCRUMBS = {};
  (function buildBreadcrumbs(defs, path, ancestors) {
    for (const [k, def] of Object.entries(defs)) {
      const p = path ? path + '.' + k : k;
      NODE_BREADCRUMBS[p] = [...ancestors, def.label || k].join(' › ');
      if (def.modules) buildBreadcrumbs(def.modules, p, [...ancestors, def.label || k]);
    }
  })(TOOL_DEFS, '', []);

  const _gitiExcl = (C.gitignore && C.gitignore.exclude_fragments) || [];
  const _gitiXtra = (C.gitignore && C.gitignore.extra_fragments)   || [];
  const _gitiPatX = (C.gitignore && C.gitignore.exclude_patterns)  || [];

  state = {
    name: (C.project && C.project.name) || META.projectDirName || '',

    envs:   [...((C.environments && C.environments.values) || (S.defaults && S.defaults.environments) || [])],
    stacks: [...((C.stacks && C.stacks.values) || [])],

    toolEnabled:  {},
    toolExpanded: {},

    checked:  {},
    expanded: Object.fromEntries(allStaticNodes().filter(n => n.isDir).map(n => [n.key, true])),

    giti: Object.fromEntries(GITI_FRAGS.map(f => [f,
      _gitiExcl.includes(f) ? false : _gitiXtra.includes(f) ? true : GITI_DEFAULTS.has(f)
    ])),
    gitiPatterns: Object.fromEntries(GITI_FRAGS.map(f => {
      const pats   = FRAG_DEFS[f] || [];
      const fragOn = !_gitiExcl.includes(f) && (_gitiXtra.includes(f) || GITI_DEFAULTS.has(f));
      return [f, pats.map(pat => fragOn && !_gitiPatX.includes(pat))];
    })),
    gitiExpanded: Object.fromEntries(GITI_FRAGS.map(f => [f, true])),
    extraGiti: [],

    extraDirs: [...((C.extra_dirs) || [])],
  };

  allStaticNodes().forEach(n => { state.checked[n.key] = defaultCheckState(n); });

  walkNodes(TOOL_DEFS, '', (path, def) => {
    state.toolEnabled[path]  = initNodeEnabled(path, def);
    state.toolExpanded[path] = true;
  });
}

// ── state helpers ─────────────────────────────────────────────────────────────

function defaultCheckState(node) {
  if (node.kind === 'step') {
    const v = C.scaffold && C.scaffold.steps && C.scaffold.steps[node.key];
    return (v === false || node.bumfuzzle_default === false) ? null : 'present';
  }
  const art = C.artifacts && C.artifacts[node.key];
  if (art) {
    if (art.enabled === true)  return 'present';
    if (art.enabled === false) return null;
  }
  return node.bumfuzzle_default !== false ? 'present' : null;
}

function walkNodes(defs, path, cb) {
  for (const [k, def] of Object.entries(defs)) {
    const p = path ? path + '.' + k : k;
    cb(p, def);
    if (def.modules) walkNodes(def.modules, p, cb);
  }
}

function readCfgNode(cfgTools, path) {
  const parts = path.split('.');
  let cur = cfgTools;
  for (const p of parts) {
    if (cur == null || typeof cur !== 'object') return undefined;
    if (cur.modules && typeof cur.modules === 'object') cur = cur.modules;
    cur = cur[p];
  }
  return cur;
}

function initNodeEnabled(path, def) {
  const ov = readCfgNode(C.tools || {}, path);
  if (typeof ov === 'boolean') return ov;
  if (ov && typeof ov.enabled === 'boolean') return ov.enabled;
  return def.enabled !== false;
}

// ── lock helpers ──────────────────────────────────────────────────────────────

function computeLockedKeys() {
  const locked = new Set();
  function walk(defs, path, parentOff) {
    for (const [k, def] of Object.entries(defs)) {
      const p  = path ? path + '.' + k : k;
      const on = !parentOff && state.toolEnabled[p];
      if (!on) (def.locks || []).forEach(l => locked.add(l));
      if (def.modules) walk(def.modules, p, !on);
    }
  }
  walk(TOOL_DEFS, '', false);
  return locked;
}

function lockingLabel(key) {
  const baseKey = key.includes(':') ? key.split(':')[0] : key;
  let result = null;
  walkNodes(TOOL_DEFS, '', (p, def) => {
    if (!result && (def.locks || []).includes(baseKey))
      result = NODE_BREADCRUMBS[p];
  });
  return result || 'the required tool';
}

// ── DOM helpers ───────────────────────────────────────────────────────────────

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

function addRow(placeholder, onAdd) {
  const inp = el('input', { type: 'text', placeholder });
  const btn = el('button', {}, '+ add');
  btn.addEventListener('click', () => { const v = inp.value.trim(); if (v) { onAdd(v); inp.value = ''; } });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  return el('div', { class: 'add-row' }, inp, btn);
}

function section(title, subtitle, ...children) {
  const s = el('div', { class: 'section' });
  if (title)    s.append(el('div', { class: 'section-title' }, title));
  if (subtitle) s.append(el('div', { class: 'section-subtitle' }, subtitle));
  children.filter(Boolean).forEach(c => s.append(c));
  return s;
}

function renderChips(listEl, items, onRemove) {
  listEl.innerHTML = '';
  if (!items.length) { listEl.append(el('span', { class: 'chip-empty' }, 'none')); return; }
  items.forEach((item, i) => {
    const x = el('button', { class: 'chip-x' }, '×');
    x.addEventListener('click', e => { e.stopPropagation(); onRemove(i); });
    listEl.append(el('span', { class: 'chip' }, item, x));
  });
}

// ── toast ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const ctr = document.getElementById('toast-container');
  if (!ctr) return;
  const t = el('div', { class: 'toast' }, msg);
  ctr.append(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('visible')));
  setTimeout(() => { t.classList.remove('visible'); setTimeout(() => t.remove(), 200); }, 3000);
}

// ── auto-save ─────────────────────────────────────────────────────────────────

let saveTimer     = null;
let saveStatusEl  = null;
let cmdRunning    = false;
let confirmingCmd = null;
let outputLogEl   = null;
let outputStatusEl = null;
let outputWrapEl  = null;
let actionRowEl   = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  updateSaveStatus('saving');
  saveTimer = setTimeout(doSave, 600);
}

async function doSave() {
  try {
    const res = await fetch('/save', { method: 'POST', body: generateYaml() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    updateSaveStatus('saved');
  } catch (_) {
    updateSaveStatus('error');
  }
}

function updateSaveStatus(s) {
  if (!saveStatusEl) return;
  const labels = { saving: 'Saving…', saved: 'Saved ✓', error: 'Save error', idle: '' };
  saveStatusEl.textContent = labels[s] || '';
  saveStatusEl.className = 'save-status' + (s === 'saved' ? ' is-saved' : s === 'error' ? ' is-error' : '');
}

// ── command runner (SSE streaming) ────────────────────────────────────────────

async function runCmd(cmd) {
  try {
    const res = await fetch('/run/' + cmd, { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const events = buf.split('\n\n');
      buf = events.pop();
      for (const ev of events) {
        if (!ev.startsWith('data: ')) continue;
        const line = JSON.parse(ev.slice(6));
        if (typeof line === 'string' && line.startsWith('__DONE__')) {
          const ec = parseInt(line.split(' ')[1], 10);
          outputStatusEl.textContent = ec === 0 ? '✓ Done' : '✗ Exited with code ' + ec;
          outputStatusEl.className = 'output-status ' + (ec === 0 ? 'is-success' : 'is-error');
          break outer;
        }
        outputLogEl.textContent += line + '\n';
        outputLogEl.scrollTop = outputLogEl.scrollHeight;
      }
    }
  } catch (e) {
    outputStatusEl.textContent = '✗ Failed: ' + e.message;
    outputStatusEl.className = 'output-status is-error';
  }
  cmdRunning = false;
  renderActionButtons();
}

function renderActionButtons() {
  if (!actionRowEl) return;
  actionRowEl.innerHTML = '';
  if (confirmingCmd) {
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-action is-cancel';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => { confirmingCmd = null; renderActionButtons(); });

    const runBtn = document.createElement('button');
    runBtn.className = 'btn-action is-confirm';
    runBtn.textContent = 'Run ' + confirmingCmd;
    runBtn.addEventListener('click', () => {
      const cmd = confirmingCmd;
      confirmingCmd = null;
      cmdRunning = true;
      outputLogEl.textContent = '';
      outputStatusEl.textContent = '';
      outputStatusEl.className = 'output-status';
      outputWrapEl.style.display = '';
      renderActionButtons();
      runCmd(cmd);
    });

    actionRowEl.append(cancelBtn, runBtn);
  } else {
    ['kickstart', 'preflight'].forEach(cmd => {
      const btn = document.createElement('button');
      btn.className = 'btn-action';
      btn.textContent = cmd.charAt(0).toUpperCase() + cmd.slice(1);
      btn.disabled = cmdRunning;
      btn.addEventListener('click', () => {
        if (!cmdRunning) { confirmingCmd = cmd; renderActionButtons(); }
      });
      actionRowEl.append(btn);
    });
  }
}

// ── tools tree ────────────────────────────────────────────────────────────────

let toolTreeEl = null;

function renderToolNodes(defs, path, linePrefix, container) {
  const entries = Object.entries(defs);
  entries.forEach(([k, def], i) => {
    const p      = path ? path + '.' + k : k;
    const isOn   = state.toolEnabled[p];
    const isLast = i === entries.length - 1;
    const mods   = def.modules ? Object.keys(def.modules) : [];
    const exp    = state.toolExpanded[p];

    const row = el('div', { class: 'tree-row' + (isOn ? ' is-present' : '') });
    row.append(el('span', { class: 'tree-prefix' }, linePrefix + (isLast ? '└── ' : '├── ')));
    const expBtn = el('span', { class: 'tree-expander' },
      (mods.length && isOn) ? (exp ? '▼' : '▶') : '');
    if (mods.length && isOn) {
      expBtn.addEventListener('click', e => {
        e.stopPropagation();
        state.toolExpanded[p] = !exp;
        renderToolTree();
      });
    }
    row.append(expBtn);
    row.append(el('span', { class: 'tree-cb' }));
    row.append(el('span', { class: 'tree-name' }, def.label || k));
    row.addEventListener('click', () => {
      state.toolEnabled[p] = !isOn;
      renderToolTree(); renderToolSections(); renderTree();
    });
    container.append(row);

    if (isOn && exp && mods.length) {
      renderToolNodes(def.modules, p, linePrefix + (isLast ? '    ' : '│   '), container);
    }
  });
}

function renderToolTree() {
  const container = el('div', { class: 'tree' });
  renderToolNodes(TOOL_DEFS, '', '', container);
  if (toolTreeEl) toolTreeEl.replaceWith(container);
  toolTreeEl = container;
  scheduleSave();
}

// ── scaffold tree ─────────────────────────────────────────────────────────────

let treeRowsEl = null;

function cycleState(node, current) {
  return current === 'present' ? null : 'present';
}

function propagate(node, val) {
  state.checked[node.key] = val;
  (node.children || []).forEach(c => propagate(c, val));
}

function resolveVals(foreachKey) {
  if (foreachKey === 'stacks.values')       return state.stacks;
  if (foreachKey === 'environments.values') return state.envs;
  return [];
}

function flattenVisible(nodes, prefix) {
  const rows = [];
  nodes.forEach((node, i) => {
    const isLast = i === nodes.length - 1;
    if (node.foreach) {
      const vals = resolveVals(node.foreach);
      vals.forEach((val, vi) => {
        const isLastV = vi === vals.length - 1 && isLast;
        const instKey = node.key + ':' + val;
        const label   = node.label.replace(/\{\{VALUE\}\}/g, val);
        rows.push({ node: { ...node, key: instKey, label, foreach: null }, prefix: prefix + (isLastV ? '└── ' : '├── ') });
      });
      return;
    }
    rows.push({ node, prefix: prefix + (isLast ? '└── ' : '├── ') });
    if (node.isDir && node.children.length && state.expanded[node.key])
      rows.push(...flattenVisible(node.children, prefix + (isLast ? '    ' : '│   ')));
  });
  return rows;
}

function getChecked(key, defaultVal) {
  if (!(key in state.checked)) state.checked[key] = defaultVal !== undefined ? defaultVal : 'present';
  return state.checked[key];
}

function renderTree() {
  const lockedKeys = computeLockedKeys();
  const container  = el('div');

  flattenVisible(STATIC_TREE, '').forEach(({ node, prefix }) => {
    const isRequired   = node.required === true;
    const baseKey      = node.key.includes(':') ? node.key.split(':')[0] : node.key;
    const isToolLocked = lockedKeys.has(baseKey);
    const defVal       = node.bumfuzzle_default !== false ? 'present' : null;
    const chk          = isToolLocked
      ? null
      : isRequired
        ? 'present'
        : getChecked(node.key, defVal);
    const hasChildren  = node.isDir && (node.children || []).length > 0;

    let cls = 'tree-row';
    if (chk === 'present') cls += ' is-present';
    if (isToolLocked)      cls += ' is-locked';
    if (isRequired && !isToolLocked) cls += ' is-required';
    const row = el('div', { class: cls });

    row.append(el('span', { class: 'tree-prefix' }, prefix));
    const exp = el('span', { class: 'tree-expander' }, hasChildren ? (state.expanded[node.key] ? '▼' : '▶') : '');
    if (hasChildren && !isToolLocked && !isRequired) {
      exp.addEventListener('click', e => {
        e.stopPropagation();
        state.expanded[node.key] = !state.expanded[node.key];
        renderTree();
      });
    }
    row.append(exp);
    row.append(el('span', { class: 'tree-cb' }));
    row.append(el('span', { class: 'tree-name' + (node.isDir ? ' is-dir' : '') }, node.label));

    if (isToolLocked) {
      row.addEventListener('click', () => showToast(`Enable ${lockingLabel(node.key)} to use ${node.label}`));
    } else if (isRequired) {
      row.addEventListener('click', () => showToast(`${node.label} is required and cannot be disabled`));
    } else {
      row.addEventListener('click', () => {
        const next = cycleState(node, state.checked[node.key] !== undefined ? state.checked[node.key] : defVal);
        if (node.foreach === null && (node.children || []).length) propagate(node, next);
        else state.checked[node.key] = next;
        renderToolSections(); renderTree();
      });
    }
    container.append(row);
  });

  // custom extra dirs
  state.extraDirs.forEach((d, i) => {
    const row = el('div', { class: 'tree-row is-present' });
    row.append(el('span', { class: 'tree-prefix' }, i === state.extraDirs.length - 1 ? '└── ' : '├── '));
    row.append(el('span', { class: 'tree-expander' }));
    row.append(el('span', { class: 'tree-cb' }));
    row.append(el('span', { class: 'tree-name is-dir' }, d + '/'));
    row.addEventListener('click', () => { state.extraDirs.splice(i, 1); renderTree(); });
    container.append(row);
  });

  if (treeRowsEl) treeRowsEl.replaceWith(container);
  treeRowsEl = container;
  scheduleSave();
}

// ── gitignore tree ────────────────────────────────────────────────────────────

function renderGitSection() {
  const container = el('div', { class: 'tree' });
  GITI_FRAGS.forEach((f, fi) => {
    const isLastFrag = fi === GITI_FRAGS.length - 1;
    const pats       = FRAG_DEFS[f] || [];
    const expanded   = state.gitiExpanded[f] !== false;
    const fragOn     = state.giti[f];

    const fragRow = el('div', { class: 'tree-row' + (fragOn ? ' is-present' : '') });
    fragRow.append(el('span', { class: 'tree-prefix' }, isLastFrag ? '└── ' : '├── '));
    const exp = el('span', { class: 'tree-expander' }, pats.length ? (expanded ? '▼' : '▶') : '');
    exp.addEventListener('click', e => { e.stopPropagation(); state.gitiExpanded[f] = !expanded; renderToolSections(); });
    fragRow.append(exp);
    fragRow.append(el('span', { class: 'tree-cb' }));
    fragRow.append(el('span', { class: 'tree-name' }, f));
    fragRow.addEventListener('click', () => {
      const next = !fragOn;
      state.giti[f] = next;
      state.gitiPatterns[f] = pats.map(() => next);
      renderToolSections();
    });
    container.append(fragRow);

    if (expanded && pats.length) {
      const childPfx = isLastFrag ? '    ' : '│   ';
      pats.forEach((pat, pi) => {
        const expandedPats = pat.includes('{{VALUE}}') || pat.includes('{{STACK}}') || pat.includes('{{ENV}}')
          ? [...state.stacks, ...state.envs].map(v => pat.replace(/\{\{VALUE\}\}|\{\{STACK\}\}|\{\{ENV\}\}/g, v))
          : [pat];

        expandedPats.forEach((resolvedPat, rpi) => {
          const isLastPat = pi === pats.length - 1 && rpi === expandedPats.length - 1;
          const patOn     = fragOn && (state.gitiPatterns[f][pi] !== false);
          const cls       = 'tree-row' + (patOn ? ' is-present' : '') + (!fragOn ? ' is-locked' : '');
          const patRow    = el('div', { class: cls });
          patRow.append(el('span', { class: 'tree-prefix' }, childPfx + (isLastPat ? '└── ' : '├── ')));
          patRow.append(el('span', { class: 'tree-expander' }));
          patRow.append(el('span', { class: 'tree-cb' }));
          patRow.append(el('span', { class: 'tree-name' }, resolvedPat));
          if (fragOn) {
            patRow.addEventListener('click', () => {
              state.gitiPatterns[f][pi] = !state.gitiPatterns[f][pi];
              renderToolSections();
            });
          }
          container.append(patRow);
        });
      });
    }
  });

  return section('Gitignore', null, container,
    addRow('extra pattern…', v => { if (!state.extraGiti.includes(v)) { state.extraGiti.push(v); renderToolSections(); } })
  );
}

// ── tool sub-sections ─────────────────────────────────────────────────────────

let toolSectionsEl = null;

function renderToolSections() {
  const container = el('div');
  if (state.toolEnabled['git'] && state.toolEnabled['git.gitignore'] && state.checked.gitignore === 'present')
    container.append(renderGitSection());
  if (toolSectionsEl) toolSectionsEl.replaceWith(container);
  toolSectionsEl = container;
  scheduleSave();
}

// ── full page render (once) ───────────────────────────────────────────────────

function renderPage() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  app.append(el('h1', {}, 'bumfuzzle'));
  app.append(el('p', { class: 'subtitle' }, 'v' + META.version + ' · ' + META.projectDirName));

  // ── Project path + save status ────────────────────────────────────────────
  saveStatusEl = el('span', { class: 'save-status' });
  app.append(el('div', { class: 'status-line' },
    el('span', { class: 'status-path' }, META.projectDir),
    el('span', {}, ' · auto-saving '),
    saveStatusEl
  ));

  // ── Project ───────────────────────────────────────────────────────────────
  const nameInp = el('input', { type: 'text', placeholder: META.projectDirName });
  nameInp.value = state.name;
  nameInp.addEventListener('input', () => { state.name = nameInp.value.trim() || META.projectDirName; scheduleSave(); });
  app.append(section('Project', null,
    el('div', { class: 'field' }, el('label', {}, 'Name'), nameInp)
  ));

  // ── App Environments ──────────────────────────────────────────────────────
  const envsListEl = el('div', { class: 'chip-list' });
  const refreshEnvs = () => {
    renderChips(envsListEl, state.envs, i => { state.envs.splice(i, 1); refreshEnvs(); renderTree(); renderToolSections(); });
  };
  refreshEnvs();
  app.append(section('App Environments', null, envsListEl,
    addRow('env name…', v => { if (!state.envs.includes(v)) { state.envs.push(v); refreshEnvs(); renderTree(); renderToolSections(); } })
  ));

  // ── Stacks ────────────────────────────────────────────────────────────────
  const stacksListEl = el('div', { class: 'chip-list' });
  const refreshStacks = () => {
    renderChips(stacksListEl, state.stacks, i => { state.stacks.splice(i, 1); refreshStacks(); renderTree(); renderToolSections(); });
  };
  refreshStacks();
  app.append(section('Stacks', null, stacksListEl,
    addRow('stack name…', v => { if (!state.stacks.includes(v)) { state.stacks.push(v); refreshStacks(); renderTree(); renderToolSections(); } })
  ));

  // ── Tools ─────────────────────────────────────────────────────────────────
  toolTreeEl = el('div');
  const toolsSec = el('div', { class: 'section' });
  toolsSec.append(el('div', { class: 'section-title' }, 'Tools'));
  toolsSec.append(toolTreeEl);
  app.append(toolsSec);
  renderToolTree();

  // ── Scaffold ──────────────────────────────────────────────────────────────
  treeRowsEl = el('div');
  const treeWrap = el('div', { class: 'tree' },
    el('div', { class: 'tree-root' }, META.projectDirName + '/'),
    treeRowsEl
  );
  const addDirInp = el('input', { type: 'text', placeholder: 'add custom dir…' });
  const addDirBtn = el('button', {}, '+ dir');
  addDirBtn.addEventListener('click', () => {
    const v = addDirInp.value.trim().replace(/\/$/, '');
    if (v && !state.extraDirs.includes(v)) { state.extraDirs.push(v); addDirInp.value = ''; renderTree(); }
  });
  addDirInp.addEventListener('keydown', e => { if (e.key === 'Enter') addDirBtn.click(); });
  treeWrap.append(el('div', { class: 'tree-add' }, addDirInp, addDirBtn));

  const scaffoldSec = el('div', { class: 'section' });
  scaffoldSec.append(el('div', { class: 'section-title' }, 'Scaffold Files / Folders'));
  scaffoldSec.append(el('div', { class: 'section-subtitle' },
    'Kickstart creates if doesn\'t exist', el('br', {}), 'Preflight checks presence'));
  scaffoldSec.append(treeWrap);
  app.append(scaffoldSec);
  renderTree();

  // ── Tool sub-sections (Gitignore etc.) ────────────────────────────────────
  toolSectionsEl = el('div');
  app.append(toolSectionsEl);
  renderToolSections();

  // ── Actions ───────────────────────────────────────────────────────────────
  actionRowEl    = el('div', { class: 'action-row' });
  outputLogEl    = el('pre',  { class: 'output-log' });
  outputStatusEl = el('div',  { class: 'output-status' });
  outputWrapEl   = el('div',  { class: 'output-wrap' }, outputLogEl, outputStatusEl);
  outputWrapEl.style.display = 'none';
  renderActionButtons();
  app.append(section(null, null, actionRowEl, outputWrapEl));
}

// ── YAML generation ───────────────────────────────────────────────────────────

function genToolNodesYaml(defs, path, indent) {
  const lines = [];
  for (const [k, def] of Object.entries(defs)) {
    const p       = path ? path + '.' + k : k;
    const enabled = state.toolEnabled[p];
    if (def.modules && Object.keys(def.modules).length) {
      lines.push(indent + k + ':');
      lines.push(indent + '  enabled: ' + enabled);
      lines.push(indent + '  modules:');
      lines.push(...genToolNodesYaml(def.modules, p, indent + '    '));
    } else {
      lines.push(indent + k + ': ' + enabled);
    }
  }
  return lines;
}

function generateYaml() {
  const lines      = [];
  const name       = state.name || META.projectDirName;
  const lockedKeys = computeLockedKeys();

  lines.push('project:');
  lines.push('  name: ' + name);

  lines.push('environments:');
  lines.push('  values: ' + (state.envs.length   ? '' : '[]'));
  state.envs.forEach(e => lines.push('    - ' + e));

  lines.push('stacks:');
  lines.push('  values: ' + (state.stacks.length ? '' : '[]'));
  state.stacks.forEach(s => lines.push('    - ' + s));

  lines.push('tools:');
  lines.push(...genToolNodesYaml(TOOL_DEFS, '', '  '));

  const stepNodes       = allStaticNodes().filter(n => n.kind === 'step');
  const deselectedSteps = stepNodes.filter(n => state.checked[n.key] !== 'present' || lockedKeys.has(n.key));
  const editorFalse     = ['vscode', 'claude'].filter(k => !state.toolEnabled[k]);
  if (deselectedSteps.length || editorFalse.length) {
    lines.push('scaffold:');
    if (deselectedSteps.length) {
      lines.push('  steps:');
      deselectedSteps.forEach(n => lines.push('    ' + n.key + ': false'));
    }
    if (editorFalse.length) {
      lines.push('  editor:');
      editorFalse.forEach(k => lines.push('    ' + k + ': false'));
    }
  }

  lines.push('artifacts:');
  const artDefs = S.artifacts || {};
  for (const k of Object.keys(artDefs)) {
    const def = artDefs[k];
    if (def.foreach) {
      const vals = resolveVals(def.foreach);
      if (!vals.length) {
        lines.push('  ' + k + ': { enabled: false }');
        continue;
      }
      const instStates = vals.map(v => getChecked(k + ':' + v, null));
      const anyPresent = instStates.some(s => s === 'present');
      const isLocked   = lockedKeys.has(k);
      lines.push('  ' + k + ':');
      lines.push('    enabled: ' + (!isLocked && anyPresent));
    } else {
      const chk     = lockedKeys.has(k) ? null : state.checked[k];
      const enabled = chk === 'present';
      lines.push('  ' + k + ': { enabled: ' + enabled + ' }');
    }
  }

  const excl_frags    = [];
  const extra_frags   = [];
  const extra_patterns = [...state.extraGiti];

  for (const f of GITI_FRAGS) {
    const pats   = FRAG_DEFS[f] || [];
    const fragOn = state.giti[f];
    const patSt  = state.gitiPatterns[f] || pats.map(() => true);
    const anyOn  = patSt.some(v => v !== false);

    if (!fragOn || !anyOn) {
      if (GITI_DEFAULTS.has(f)) excl_frags.push(f);
      continue;
    }
    if (!GITI_DEFAULTS.has(f)) extra_frags.push(f);
    const allOn = patSt.every(v => v !== false);
    if (!allOn) {
      if (GITI_DEFAULTS.has(f)) excl_frags.push(f);
      const idx = extra_frags.indexOf(f); if (idx >= 0) extra_frags.splice(idx, 1);
      pats.forEach((pat, pi) => {
        if (patSt[pi] !== false) {
          if (pat.includes('{{VALUE}}') || pat.includes('{{STACK}}') || pat.includes('{{ENV}}')) {
            [...state.stacks, ...state.envs].forEach(v =>
              extra_patterns.push(pat.replace(/\{\{VALUE\}\}|\{\{STACK\}\}|\{\{ENV\}\}/g, v)));
          } else {
            extra_patterns.push(pat);
          }
        }
      });
    }
  }

  lines.push('gitignore:');
  lines.push('  exclude_fragments: ' + (excl_frags.length    ? '' : '[]'));
  excl_frags.forEach(f => lines.push('    - ' + f));
  lines.push('  extra_fragments: '   + (extra_frags.length   ? '' : '[]'));
  extra_frags.forEach(f => lines.push('    - ' + f));
  lines.push('  extra_patterns: '    + (extra_patterns.length ? '' : '[]'));
  extra_patterns.forEach(p => lines.push('    - ' + p));

  lines.push('extra_dirs: ' + (state.extraDirs.length ? '' : '[]'));
  state.extraDirs.forEach(d => lines.push('  - ' + d));

  return lines.join('\n') + '\n';
}

// ── boot ──────────────────────────────────────────────────────────────────────

document.body.append(el('div', { id: 'toast-container' }));
(async () => {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    S    = cfg.settings;
    C    = cfg.current;
    META = cfg.meta;
    initData();
    renderPage();
  } catch (_) {
    document.getElementById('app').textContent = 'Run bumfuzzle to open this page.';
  }
})();
</script>

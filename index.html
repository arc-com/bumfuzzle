<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bumfuzzle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--surf2:#21262d;--surf3:#2d333b;
  --b1:#30363d;--b2:#21262d;
  --tx:#e6edf3;--tm:#8b949e;--td:#484f58;
  --ac:#58a6ff;--ac2:#388bfd;
  --gr:#3fb950;--yl:#e3b341;--rd:#f85149;--or:#d29922;
  --r:6px;--mono:ui-monospace,'SF Mono','Cascadia Code',monospace;
}
body{background:var(--bg);color:var(--tx);font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--b1);padding:10px 20px;display:flex;align-items:center;gap:10px}
.hdr-logo{font-weight:700;font-size:15px;letter-spacing:-.3px}
.hdr-meta{font-size:11px;color:var(--td);font-family:var(--mono)}
.hdr-path{font-size:11px;color:var(--tm);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-save{font-size:11px;white-space:nowrap}
.hdr-save.idle{color:var(--td)}.hdr-save.saving{color:var(--tm)}.hdr-save.ok{color:var(--gr)}.hdr-save.err{color:var(--rd)}

/* ── Layout ── */
.wrap{max-width:820px;margin:0 auto;padding:20px 20px 80px}

/* ── Section ── */
.sec{border:1px solid var(--b1);border-radius:var(--r);margin-bottom:20px;overflow:hidden}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surf);cursor:pointer;user-select:none}
.sec-hdr:hover{background:var(--surf2)}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--tm)}
.sec-chev{margin-left:auto;color:var(--td);font-size:10px;transition:transform .15s}
.sec-chev.open{transform:rotate(90deg)}
.sec-body{padding:16px}
.sec-body.closed{display:none}

/* ── Fields ── */
.field{margin-bottom:14px}.field:last-child{margin-bottom:0}
.lbl{display:block;font-size:11px;color:var(--tm);margin-bottom:5px}
.inp{width:100%;background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);font-size:13px;padding:6px 10px;outline:none;font-family:inherit}
.inp:focus{border-color:var(--ac)}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center;min-height:26px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surf2);border:1px solid var(--b1);border-radius:20px;padding:2px 8px 2px 10px;font-size:12px;font-family:var(--mono);color:var(--tx)}
.chip-x{background:none;border:none;color:var(--tm);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.chip-x:hover{color:var(--rd)}
.chip-empty{font-size:12px;color:var(--td);font-style:italic}
.add-row{display:flex;gap:6px;margin-top:7px}
.add-inp{flex:1;background:var(--surf2);border:1px dashed var(--b1);border-radius:var(--r);color:var(--tx);font-size:12px;font-family:var(--mono);padding:4px 8px;outline:none}
.add-inp:focus{border-color:var(--ac)}
.add-btn{background:transparent;border:1px dashed var(--b1);border-radius:var(--r);color:var(--tm);font-size:12px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-btn:hover{border-color:var(--ac);color:var(--tx)}

/* ── Toggle (checkbox) ── */
.tog{width:14px;height:14px;border:1.5px solid var(--b1);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .1s,border-color .1s}
.tog.on{background:var(--ac);border-color:var(--ac)}
.tog.on::after{content:'✓';color:#fff;font-size:9px;line-height:1}
.tog.dis{opacity:.28;cursor:not-allowed}

/* ── ASCII tree (shared by tools, scaffold, gitignore) ── */
.tree{font-family:var(--mono);font-size:12px}
.tree-root{color:var(--td);padding:2px 0 4px}
.trow{display:flex;align-items:center;min-height:22px;padding:1px 0;border-radius:3px}
.trow:hover{background:rgba(255,255,255,.025)}
.trow.clickable{cursor:pointer}
.tpfx{color:var(--td);white-space:pre;flex-shrink:0;user-select:none}
.texp{width:16px;text-align:center;font-size:9px;color:var(--tm);cursor:pointer;flex-shrink:0;border-radius:2px;line-height:16px;user-select:none}
.texp:hover{color:var(--tx);background:rgba(255,255,255,.07)}
.texp.blank{cursor:default;pointer-events:none}
.texp.blank:hover{background:none}
/* scaffold checkboxes */
.tcb{width:13px;height:13px;border:1.5px solid var(--b1);border-radius:3px;margin:0 5px 0 2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;transition:background .1s,border-color .1s;cursor:pointer}
.trow.on .tcb{background:var(--gr);border-color:var(--gr)}
.trow.on .tcb::after{content:'✓'}
.trow.req .tcb{background:var(--surf3);border-color:var(--b1);cursor:not-allowed}
.trow.req .tcb::after{content:'✓';color:var(--tm)}
.tcb.lck{opacity:.22;cursor:not-allowed}
.tname{color:var(--tm);font-size:12px;padding-left:2px}
.trow.on .tname{color:var(--tx)}
.tname.dir{color:var(--td)}
.trow.on .tname.dir{color:#79c0ff}
.trow.lck-row .tname{opacity:.35}
.tree-meta{font-size:11px;color:var(--td);margin-left:8px}
.tree-add{display:flex;gap:6px;margin-top:10px}

/* ── gi-frag pills (gitignore toggles + validation hint chips) ── */
.gi-frag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:12px;font-family:var(--mono);border:1px solid var(--b1);background:var(--surf2);color:var(--td);cursor:pointer;user-select:none;transition:border-color .12s,color .12s,background .12s;flex-shrink:0}
.gi-frag:hover{border-color:var(--tm);color:var(--tm)}
.gi-frag.on{border-color:var(--ac);color:var(--tx);background:rgba(88,166,255,.08)}
.gi-frag::before{content:'○';font-size:9px;color:inherit;line-height:1}
.gi-frag.on::before{content:'◉';color:var(--ac)}
.gi-frags{display:flex;flex-wrap:wrap;gap:5px}

/* ── Gitignore extras ── */
.gi-sep{font-size:11px;color:var(--td);font-family:var(--mono);margin:14px 0 8px;padding-top:12px;border-top:1px solid var(--b2)}

/* ── Rules ── */
.rule-type-badge{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:3px;border:1px solid var(--b1);color:var(--td);flex-shrink:0;white-space:nowrap}
.rule-type-file-present  {border-color:rgba(63,185,80,.35); color:var(--gr);background:rgba(63,185,80,.07)}
.rule-type-file-absent   {border-color:rgba(248,81,73,.35); color:var(--rd);background:rgba(248,81,73,.07)}
.rule-type-content-present{border-color:rgba(88,166,255,.35);color:var(--ac);background:rgba(88,166,255,.07)}
.rule-type-content-absent{border-color:rgba(227,179,65,.35);color:var(--yl);background:rgba(227,179,65,.07)}
.rule-type-script-clean  {border-color:rgba(210,153,34,.35);color:var(--or);background:rgba(210,153,34,.07)}
.rule-remove{background:none;border:none;color:var(--td);cursor:pointer;font-size:16px;line-height:1;padding:0 4px;flex-shrink:0;transition:color .1s}
.rule-remove:hover{color:var(--rd)}
.rule-type-seg{display:flex;flex-wrap:wrap;gap:5px}
.rule-type-btn{background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tm);font-size:11px;font-family:var(--mono);padding:4px 10px;cursor:pointer;transition:border-color .1s,color .1s,background .1s;white-space:nowrap}
.rule-type-btn:hover{border-color:var(--tm);color:var(--tx)}
.rule-type-btn.on{border-color:var(--ac);color:var(--tx);background:rgba(88,166,255,.08)}
.add-rule-btn{width:100%;background:transparent;border:1px dashed var(--b1);border-radius:var(--r);color:var(--tm);font-size:12px;padding:9px;cursor:pointer;margin-top:8px;font-family:inherit;transition:border-color .1s,color .1s}
.add-rule-btn:hover{border-color:var(--ac);color:var(--tx)}
.rules-empty{font-size:12px;color:var(--td);padding:4px 0 8px}

/* ── Validation accordion ── */
.val-list{display:flex;flex-direction:column;gap:3px}
.val-card{border:1px solid transparent;border-radius:var(--r);overflow:hidden;transition:border-color .12s}
.val-card:hover{border-color:var(--b2)}
.val-card.exp{border-color:var(--b1)}
.val-hdr{display:flex;align-items:center;gap:9px;padding:7px 10px;cursor:pointer;border-radius:var(--r)}
.val-hdr:hover{background:rgba(255,255,255,.02)}
.val-card.exp .val-hdr{border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid var(--b2);background:rgba(255,255,255,.01)}
.val-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;overflow:hidden}
.vkey{font-size:11px;font-family:var(--mono);color:var(--td);flex-shrink:0}
.val-card.on .vkey{color:var(--ac)}
.vdesc-short{font-size:12px;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.val-card.off .val-info{opacity:.42}
/* severity badge (collapsed row) */
.sev-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;border:1px solid var(--b1);color:var(--td);flex-shrink:0}
.sev-badge.sev-warn{border-color:rgba(227,179,65,.35);color:var(--yl);background:rgba(227,179,65,.07)}
.sev-badge.sev-error{border-color:rgba(210,153,34,.35);color:var(--or);background:rgba(210,153,34,.07)}
.sev-badge.sev-hard-stop{border-color:rgba(248,81,73,.35);color:var(--rd);background:rgba(248,81,73,.07)}
.val-chev{color:var(--td);font-size:10px;flex-shrink:0}
/* expanded body */
.val-body{padding:12px 12px 14px}
.val-desc{font-size:13px;color:var(--tm);margin-bottom:14px;line-height:1.5}
.val-section{margin-bottom:14px}
.val-section:last-child{margin-bottom:0}
.val-sec-lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--td);font-family:var(--mono);margin-bottom:7px}
/* severity segmented control */
.sev-seg{display:inline-flex;border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.sev-btn{background:transparent;border:none;border-right:1px solid var(--b1);color:var(--tm);font-size:11px;font-family:var(--mono);padding:5px 14px;cursor:pointer;white-space:nowrap;transition:background .1s,color .1s}
.sev-btn:last-child{border-right:none}
.sev-btn:hover:not([disabled]){background:rgba(255,255,255,.05);color:var(--tx)}
.sev-btn[disabled]{opacity:.3;cursor:not-allowed}
.sev-btn.on{font-weight:600}
.sev-btn.on.sev-skip{background:var(--surf3);color:var(--tm)}
.sev-btn.on.sev-warn{background:rgba(227,179,65,.13);color:var(--yl)}
.sev-btn.on.sev-error{background:rgba(210,153,34,.13);color:var(--or)}
.sev-btn.on.sev-hard-stop{background:rgba(248,81,73,.13);color:var(--rd)}
/* hint text panel */
.hint-texts{background:var(--surf2);border:1px solid var(--b2);border-radius:var(--r);padding:8px 10px;margin-top:8px;display:flex;flex-direction:column;gap:6px}
.hint-text-row{display:grid;grid-template-columns:auto 1fr;gap:10px;font-size:11px;font-family:var(--mono);align-items:start}
.hint-key{color:var(--ac);white-space:nowrap}
.hint-val{color:var(--tm);word-break:break-word;line-height:1.45}
.hint-custom-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}

/* ── Actions ── */
.act-row{display:flex;gap:8px}
.btn{flex:1;padding:10px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--surf);border:1px solid var(--b1);color:var(--tx);transition:border-color .15s}
.btn:hover:not(:disabled){border-color:var(--ac)}
.btn:disabled{opacity:.38;cursor:default}
.btn.pri{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.pri:hover:not(:disabled){background:var(--ac2);border-color:var(--ac2)}
.btn.cancel{flex:0;padding:10px 16px;color:var(--tm)}
.out-wrap{margin-top:10px;display:none}
.out-log{background:#010409;border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;font-family:var(--mono);font-size:12px;color:#c9d1d9;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;min-height:36px}
.out-status{margin-top:5px;font-size:12px;font-weight:600}
.out-status.ok{color:var(--gr)}.out-status.err{color:var(--rd)}

/* ── Toast ── */
#toasts{position:fixed;top:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:none}
.toast{background:var(--surf2);border:1px solid var(--b1);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--tm);max-width:280px;opacity:0;transform:translateX(6px);transition:opacity .15s,transform .15s}
.toast.show{opacity:1;transform:translateX(0)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<script>
'use strict';

let S, C, META;
let wizDirs, wizFiles, TOOL_DEFS, FRAG_DEFS, GITI_FRAGS, GITI_DEFAULTS;
let STATIC_TREE, PARENT_MAP, NODE_BREADCRUMBS;
let state;

// ── Static tree builders ──────────────────────────────────────────────────────

function buildStaticTree() {
  const byPath = {}, roots = [];
  const all = [
    ...wizDirs.map(d => ({...d, isDir:true,  nodePath: d.label.replace(/\/$/, '')})),
    ...wizFiles.map(f => ({...f, isDir:false, nodePath: f.foreach ? null : f.label})),
  ].filter(e => e.nodePath !== null);

  for (const e of all) byPath[e.nodePath] = {...e, children:[]};
  for (const e of all) {
    const node = byPath[e.nodePath];
    const slash = e.nodePath.lastIndexOf('/');
    const par = slash >= 0 ? e.nodePath.substring(0, slash) : null;
    if (par && byPath[par]) byPath[par].children.push(node);
    else roots.push(node);
  }
  wizFiles.filter(f => f.foreach).forEach(f => roots.push({...f, isDir:false, children:[]}));
  return roots;
}

function allStaticNodes() {
  const out = [];
  (function walk(ns) { ns.forEach(n => { out.push(n); walk(n.children||[]); }); })(STATIC_TREE);
  return out;
}

function buildParentMap() {
  const map = {};
  (function walk(nodes, parent) {
    nodes.forEach(n => { if (parent) map[n.key] = parent; walk(n.children||[], n); });
  })(STATIC_TREE, null);
  return map;
}

// ── Data init ─────────────────────────────────────────────────────────────────

function initData() {
  wizDirs  = (S.bumfuzzle && S.bumfuzzle.directories) || [];
  wizFiles = (S.bumfuzzle && S.bumfuzzle.files)       || [];
  TOOL_DEFS  = S.tools || {};
  FRAG_DEFS  = (S.gitignore && S.gitignore.fragments) || {};
  GITI_FRAGS = Object.keys(FRAG_DEFS);
  const gitiCommon = (S.gitignore && S.gitignore.defaults && S.gitignore.defaults.common) || [];
  GITI_DEFAULTS = new Set(gitiCommon);

  STATIC_TREE = buildStaticTree();
  PARENT_MAP  = buildParentMap();

  NODE_BREADCRUMBS = {};
  (function bc(defs, path, anc) {
    for (const [k, def] of Object.entries(defs)) {
      const p = path ? path + '.' + k : k;
      NODE_BREADCRUMBS[p] = [...anc, def.label||k].join(' › ');
      if (def.modules) bc(def.modules, p, [...anc, def.label||k]);
    }
  })(TOOL_DEFS, '', []);

  const cGiti    = (C && C.gitignore) || {};
  const excl     = cGiti.exclude_fragments || [];
  const xtra     = cGiti.extra_fragments   || [];
  const exclPats = cGiti.exclude_patterns  || [];
  const cVal     = (C && C.validation) || {};
  const sVal     = S.validation || {};

  state = {
    name: (C && C.project && C.project.name) || META.projectDirName || '',
    envs: [...((C && C.environments && C.environments.values) || (S.defaults && S.defaults.environments) || [])],

    toolEnabled:  {},
    toolExpanded: {},

    checked:  {},
    expanded: Object.fromEntries(allStaticNodes().filter(n => n.isDir).map(n => [n.key, true])),

    giti: Object.fromEntries(GITI_FRAGS.map(f => [f,
      excl.includes(f) ? false : xtra.includes(f) ? true : GITI_DEFAULTS.has(f)
    ])),
    gitiPatterns: Object.fromEntries(GITI_FRAGS.map(f => {
      const pats = FRAG_DEFS[f] || [];
      const on   = !excl.includes(f) && (xtra.includes(f) || GITI_DEFAULTS.has(f));
      return [f, pats.map(p => on && !exclPats.includes(p))];
    })),
    gitiExpanded: Object.fromEntries(GITI_FRAGS.map(f => [f, false])),
    extraGiti: [...(cGiti.extra_patterns || [])],

    extraDirs: [...((C && C.extra_dirs) || [])],

    validation: Object.fromEntries(Object.entries(sVal).map(([key, def]) => {
      const ov          = cVal[key] || {};
      const defEnabled  = def.enabled !== false;
      const defSeverity = def.severity || 'error';
      const defHints    = def.selected_hints || [];
      return [key, {
        enabled:       ov.enabled  !== undefined ? ov.enabled  : defEnabled,
        severity:      ov.severity !== undefined ? ov.severity : defSeverity,
        selectedHints: ov.selected_hints ? [...ov.selected_hints] : [...defHints],
        description:   def.description || key,
        availHints:    Object.keys(def.hints || {}),
        hintsMap:      def.hints || {},
        _de: defEnabled, _ds: defSeverity, _dh: [...defHints],
      }];
    })),

    valExpanded: Object.fromEntries(Object.keys(sVal).map(k => [k, false])),

    rules: ((C && C.rules) || []).map(r => ({
      type:        r.type        || 'file_present',
      description: r.description || '',
      target:      r.target      || '',
      pattern:     r.pattern     || '',
      scope:       r.scope       || 'recursive',
      exclude:     r.exclude     || '',
      command:     r.command     || '',
      severity:    r.severity    || 'error',
      hints:       [...(r.hints  || [])],
      _exp:        false,
    })),

    sections: { project:true, tools:true, scaffold:true, gitignore:true, rules:true, validation:true, actions:true },
  };

  if (state.validation.command_checks) {
    const ov = cVal.command_checks || {};
    state.validation.command_checks.items = (ov.items || []).map(it => ({
      label:    it.label    || '',
      command:  it.command  || '',
      severity: it.severity || 'error',
      hints:    [...(it.hints || [])],
    }));
  }

  allStaticNodes().forEach(n => { state.checked[n.key] = defCheck(n); });
  walkDefs(TOOL_DEFS, '', (p, def) => {
    state.toolEnabled[p]  = initEnabled(p, def);
    state.toolExpanded[p] = true;
  });
}

// ── State helpers ─────────────────────────────────────────────────────────────

function defCheck(node) {
  if (node.kind === 'step') {
    const v = C && C.scaffold && C.scaffold.steps && C.scaffold.steps[node.key];
    return (v === false || node.bumfuzzle_default === false) ? null : 'present';
  }
  const art = C && C.artifacts && C.artifacts[node.key];
  if (art) {
    if (art.enabled === true)  return 'present';
    if (art.enabled === false) return null;
  }
  return node.bumfuzzle_default !== false ? 'present' : null;
}

function walkDefs(defs, path, cb) {
  for (const [k, def] of Object.entries(defs)) {
    const p = path ? path + '.' + k : k;
    cb(p, def);
    if (def.modules) walkDefs(def.modules, p, cb);
  }
}

function readCfgNode(cfgTools, path) {
  const parts = path.split('.');
  let cur = cfgTools;
  for (const p of parts) {
    if (cur == null || typeof cur !== 'object') return undefined;
    if (cur.modules) cur = cur.modules;
    cur = cur[p];
  }
  return cur;
}

function initEnabled(path, def) {
  const ov = readCfgNode((C && C.tools) || {}, path);
  if (typeof ov === 'boolean') return ov;
  if (ov && typeof ov.enabled === 'boolean') return ov.enabled;
  return def.enabled !== false;
}

function computeLockedKeys() {
  const locked = new Set();
  function walk(defs, path, parentOff) {
    for (const [k, def] of Object.entries(defs)) {
      const p  = path ? path + '.' + k : k;
      const on = !parentOff && state.toolEnabled[p];
      if (!on) (def.locks||[]).forEach(l => locked.add(l));
      if (def.modules) walk(def.modules, p, !on);
    }
  }
  walk(TOOL_DEFS, '', false);
  return locked;
}

function lockingLabel(key) {
  const base = key.includes(':') ? key.split(':')[0] : key;
  let result = null;
  walkDefs(TOOL_DEFS, '', (p, def) => {
    if (!result && (def.locks||[]).includes(base)) result = NODE_BREADCRUMBS[p];
  });
  return result || 'the required tool';
}

function resolveVals(foreachKey) {
  if (foreachKey === 'environments.values') return state.envs;
  return [];
}

// ── DOM helpers ───────────────────────────────────────────────────────────────

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs||{})) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  children.forEach(c => { if (c != null) e.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return e;
}

function showToast(msg) {
  const t = el('div', {class:'toast'}, msg);
  document.getElementById('toasts').append(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 200); }, 2800);
}

// ── Auto-save ─────────────────────────────────────────────────────────────────

let saveTimer = null, saveEl = null;
let cmdRunning = false, confirmCmd = null;
let outLogEl = null, outStatusEl = null, outWrapEl = null, actRowEl = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveStatus('saving');
  saveTimer = setTimeout(doSave, 600);
}

async function doSave() {
  try {
    const res = await fetch('/save', {method:'POST', body:generateYaml()});
    if (!res.ok) throw new Error();
    setSaveStatus('ok');
  } catch {
    setSaveStatus('err');
  }
}

function setSaveStatus(s) {
  if (!saveEl) return;
  const labels = {idle:'', saving:'Saving…', ok:'Saved ✓', err:'Save failed'};
  saveEl.textContent = labels[s] || '';
  saveEl.className = 'hdr-save ' + s;
}

// ── Command runner ────────────────────────────────────────────────────────────

async function runCmd(cmd) {
  try {
    const res = await fetch('/run/' + cmd, {method:'POST'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const evts = buf.split('\n\n');
      buf = evts.pop();
      for (const ev of evts) {
        if (!ev.startsWith('data: ')) continue;
        const line = JSON.parse(ev.slice(6));
        if (typeof line === 'string' && line.startsWith('__DONE__')) {
          const ec = parseInt(line.split(' ')[1], 10);
          outStatusEl.textContent = ec === 0 ? '✓ Done' : '✗ Exited ' + ec;
          outStatusEl.className = 'out-status ' + (ec === 0 ? 'ok' : 'err');
          break outer;
        }
        outLogEl.textContent += line + '\n';
        outLogEl.scrollTop = outLogEl.scrollHeight;
      }
    }
  } catch (e) {
    outStatusEl.textContent = '✗ ' + e.message;
    outStatusEl.className = 'out-status err';
  }
  cmdRunning = false;
  renderActBtns();
}

function renderActBtns() {
  if (!actRowEl) return;
  actRowEl.innerHTML = '';
  if (confirmCmd) {
    actRowEl.append(
      el('button', {class:'btn cancel', onclick:() => { confirmCmd = null; renderActBtns(); }}, 'Cancel'),
      el('button', {class:'btn pri', onclick:() => {
        const cmd = confirmCmd; confirmCmd = null;
        cmdRunning = true;
        outLogEl.textContent = '';
        outStatusEl.textContent = '';
        outStatusEl.className = 'out-status';
        outWrapEl.style.display = '';
        renderActBtns();
        runCmd(cmd);
      }}, 'Run ' + confirmCmd)
    );
  } else {
    ['kickstart','preflight'].forEach((cmd, i) => {
      const b = el('button', {class:'btn' + (i === 0 ? ' pri' : '')},
        cmd.charAt(0).toUpperCase() + cmd.slice(1));
      b.disabled = cmdRunning;
      b.addEventListener('click', () => { if (!cmdRunning) { confirmCmd = cmd; renderActBtns(); } });
      actRowEl.append(b);
    });
  }
}

// ── Section factory ───────────────────────────────────────────────────────────

function makeSection(key, title) {
  const sec  = el('div', {class:'sec'});
  const hdr  = el('div', {class:'sec-hdr'});
  const chev = el('span', {class:'sec-chev open'}, '▶');
  hdr.append(el('span', {class:'sec-title'}, title), chev);
  sec.append(hdr);
  const body = el('div', {class:'sec-body'});
  sec.append(body);
  hdr.addEventListener('click', () => {
    const open = !body.classList.contains('closed');
    body.classList.toggle('closed', open);
    chev.classList.toggle('open', !open);
    state.sections[key] = !open;
  });
  return {sec, body};
}

// ── YAML generation ───────────────────────────────────────────────────────────

function genToolYaml(defs, path, indent) {
  const lines = [];
  for (const [k, def] of Object.entries(defs)) {
    const p  = path ? path + '.' + k : k;
    const on = state.toolEnabled[p];
    if (def.modules && Object.keys(def.modules).length) {
      lines.push(indent + k + ':');
      lines.push(indent + '  enabled: ' + on);
      lines.push(indent + '  modules:');
      lines.push(...genToolYaml(def.modules, p, indent + '    '));
    } else {
      lines.push(indent + k + ': ' + on);
    }
  }
  return lines;
}

function generateYaml() {
  const lines = [], locked = computeLockedKeys();

  lines.push('project:');
  lines.push('  name: ' + (state.name || META.projectDirName));

  lines.push('environments:');
  lines.push('  values: ' + (state.envs.length ? '' : '[]'));
  state.envs.forEach(e => lines.push('    - ' + e));

  lines.push('tools:');
  lines.push(...genToolYaml(TOOL_DEFS, '', '  '));

  const stepNodes   = allStaticNodes().filter(n => n.kind === 'step');
  const deselSteps  = stepNodes.filter(n => state.checked[n.key] !== 'present' || locked.has(n.key));
  const edFalse     = ['vscode','claude'].filter(k => !state.toolEnabled[k]);
  if (deselSteps.length || edFalse.length) {
    lines.push('scaffold:');
    if (deselSteps.length) {
      lines.push('  steps:');
      deselSteps.forEach(n => lines.push('    ' + n.key + ': false'));
    }
    if (edFalse.length) {
      lines.push('  editor:');
      edFalse.forEach(k => lines.push('    ' + k + ': false'));
    }
  }

  lines.push('artifacts:');
  for (const [k, def] of Object.entries(S.artifacts||{})) {
    if (def.foreach) {
      const vals = resolveVals(def.foreach);
      if (!vals.length) { lines.push('  ' + k + ': { enabled: false }'); continue; }
      const anyPresent = vals.some(v => state.checked[k + ':' + v] === 'present');
      lines.push('  ' + k + ':');
      lines.push('    enabled: ' + (!locked.has(k) && anyPresent));
    } else {
      const chk = locked.has(k) ? null : state.checked[k];
      lines.push('  ' + k + ': { enabled: ' + (chk === 'present') + ' }');
    }
  }

  const exclFrags = [], xtraFrags = [], xtraPats = [...state.extraGiti];
  for (const f of GITI_FRAGS) {
    const pats   = FRAG_DEFS[f] || [];
    const fragOn = state.giti[f];
    const patSt  = state.gitiPatterns[f] || pats.map(() => true);
    const anyOn  = patSt.some(v => v !== false);
    if (!fragOn || !anyOn) {
      if (GITI_DEFAULTS.has(f)) exclFrags.push(f);
      continue;
    }
    if (!GITI_DEFAULTS.has(f)) xtraFrags.push(f);
    const allOn = patSt.every(v => v !== false);
    if (!allOn) {
      if (GITI_DEFAULTS.has(f)) exclFrags.push(f);
      const idx = xtraFrags.indexOf(f); if (idx >= 0) xtraFrags.splice(idx, 1);
      pats.forEach((pat, pi) => {
        if (patSt[pi] !== false) {
          if (pat.includes('{{VALUE}}') || pat.includes('{{ENV}}')) {
            state.envs.forEach(v => xtraPats.push(pat.replace(/\{\{VALUE\}\}|\{\{ENV\}\}/g, v)));
          } else xtraPats.push(pat);
        }
      });
    }
  }
  lines.push('gitignore:');
  lines.push('  exclude_fragments: ' + (exclFrags.length ? '' : '[]'));
  exclFrags.forEach(f => lines.push('    - ' + f));
  lines.push('  extra_fragments: ' + (xtraFrags.length ? '' : '[]'));
  xtraFrags.forEach(f => lines.push('    - ' + f));
  lines.push('  extra_patterns: ' + (xtraPats.length ? '' : '[]'));
  xtraPats.forEach(p => lines.push('    - ' + p));

  lines.push('extra_dirs: ' + (state.extraDirs.length ? '' : '[]'));
  state.extraDirs.forEach(d => lines.push('  - ' + d));

  if (state.rules.length) {
    lines.push('rules:');
    for (const r of state.rules) {
      lines.push('  - type: ' + r.type);
      if (r.description) lines.push('    description: ' + JSON.stringify(r.description));
      if (r.target)      lines.push('    target: '      + r.target);
      if (r.pattern)     lines.push('    pattern: '     + JSON.stringify(r.pattern));
      if (r.scope && r.scope !== 'recursive') lines.push('    scope: ' + r.scope);
      if (r.exclude)     lines.push('    exclude: '     + r.exclude);
      if (r.command)     lines.push('    command: '     + JSON.stringify(r.command));
      if (r.severity && r.severity !== 'error') lines.push('    severity: ' + r.severity);
      if (r.hints && r.hints.length) {
        lines.push('    hints:');
        r.hints.forEach(h => lines.push('      - ' + JSON.stringify(h)));
      }
    }
  }

  const valLines = [];
  for (const [key, val] of Object.entries(state.validation)) {
    const hintsSame = JSON.stringify([...val.selectedHints].sort()) === JSON.stringify([...val._dh].sort());
    const hasItems  = val.items && val.items.length > 0;
    const changed   = val.enabled !== val._de || val.severity !== val._ds || !hintsSame || hasItems;
    if (!changed) continue;
    valLines.push('  ' + key + ':');
    valLines.push('    enabled: ' + val.enabled);
    if (val.severity !== val._ds) valLines.push('    severity: ' + val.severity);
    if (!hintsSame) valLines.push('    selected_hints: [' + val.selectedHints.join(', ') + ']');
    if (hasItems) {
      valLines.push('    items:');
      for (const item of val.items) {
        valLines.push('      - label: '   + JSON.stringify(item.label   || ''));
        valLines.push('        command: ' + JSON.stringify(item.command || ''));
        if (item.severity && item.severity !== 'error')
          valLines.push('        severity: ' + item.severity);
        if (item.hints && item.hints.length) {
          valLines.push('        hints:');
          item.hints.forEach(h => valLines.push('          - ' + JSON.stringify(h)));
        }
      }
    }
  }
  if (valLines.length) {
    lines.push('validation:');
    lines.push(...valLines);
  }

  return lines.join('\n') + '\n';
}

// ── Re-render targets ─────────────────────────────────────────────────────────

let toolsBodyEl = null, scaffoldBodyEl = null, gitBodyEl = null, rulesBodyEl = null, valBodyEl = null;

function repl(bodyEl, buildFn) {
  if (!bodyEl) return;
  bodyEl.innerHTML = '';
  bodyEl.append(buildFn());
}

function reRenderTools()      { repl(toolsBodyEl,    buildTools);      scheduleSave(); }
function reRenderScaffold()   { repl(scaffoldBodyEl, buildScaffold);   scheduleSave(); }
function reRenderGitignore()  { repl(gitBodyEl,      buildGitignore);  scheduleSave(); }
function reRenderRules()      { repl(rulesBodyEl,    buildRules);      scheduleSave(); }
function reRenderValidation() { repl(valBodyEl,      buildValidation); scheduleSave(); }

// ── Build: Tools (ASCII tree + parent→child cascade) ─────────────────────────

function buildTools() {
  const wrap = el('div', {class:'tree'});
  wrap.append(el('div', {class:'tree-root'}, 'tools/'));
  renderToolLevel(TOOL_DEFS, '', wrap, '', false);
  return wrap;
}

function renderToolLevel(defs, path, container, prefix, parentOff) {
  const entries = Object.entries(defs);
  entries.forEach(([k, def], i) => {
    const p      = path ? path + '.' + k : k;
    const on     = !!state.toolEnabled[p];
    const mods   = def.modules && Object.keys(def.modules).length ? def.modules : null;
    const isLast = i === entries.length - 1;
    const rowPfx = prefix + (isLast ? '└── ' : '├── ');
    const kidPfx = prefix + (isLast ? '    ' : '│   ');
    const exp    = !!state.toolExpanded[p];
    const effOff = parentOff || !on;

    const row = el('div', {class:'trow' + (on ? ' on' : '') + (parentOff ? ' lck-row' : '') + (mods ? ' clickable' : '')});

    // Entire row click → toggle expand (when has children)
    if (mods) {
      row.addEventListener('click', () => {
        state.toolExpanded[p] = !state.toolExpanded[p];
        reRenderTools();
      });
    }

    row.append(el('span', {class:'tpfx'}, rowPfx));
    row.append(el('span', {class:'texp' + (mods ? '' : ' blank')}, mods ? (exp ? '▾' : '▸') : ''));

    // Toggle — stopPropagation prevents row-click expand firing
    const tog = el('div', {class:'tog' + (on ? ' on' : '') + (parentOff ? ' dis' : '')});
    tog.addEventListener('click', e => {
      e.stopPropagation();
      if (parentOff) { showToast('Enable parent tool first'); return; }
      const next = !on;
      state.toolEnabled[p] = next;
      if (!next && mods) {
        // cascade off to all descendants
        walkDefs(mods, p, cp => { state.toolEnabled[cp] = false; });
        state.toolExpanded[p] = false;
      }
      reRenderTools();
      reRenderScaffold();
    });
    row.append(tog);
    row.append(el('span', {class:'tname'}, def.label || k));

    container.append(row);

    if (mods && exp) {
      renderToolLevel(mods, p, container, kidPfx, effOff);
    }
  });
}

// ── Build: Scaffold ───────────────────────────────────────────────────────────

function buildScaffold() {
  const wrap   = el('div');
  const locked = computeLockedKeys();
  const tree   = el('div', {class:'tree'});
  tree.append(el('div', {class:'tree-root'}, META.projectDirName + '/'));

  flattenVisible(STATIC_TREE, '').forEach(({node, prefix}) => {
    tree.append(buildScaffoldRow(node, prefix, locked));
  });

  state.extraDirs.forEach((d, i) => {
    const isLast = i === state.extraDirs.length - 1;
    const row    = el('div', {class:'trow on'});
    row.append(el('span', {class:'tpfx'}, isLast ? '└── ' : '├── '));
    row.append(el('span', {class:'texp blank'}));
    const cb = el('div', {class:'tcb'});
    cb.addEventListener('click', () => { state.extraDirs.splice(i, 1); reRenderScaffold(); });
    row.append(cb);
    row.append(el('span', {class:'tname dir'}, d + '/'));
    tree.append(row);
  });

  wrap.append(tree);

  const addInp = el('input', {class:'add-inp', type:'text', placeholder:'custom dir…'});
  const addBtn = el('button', {class:'add-btn'}, '+ dir');
  addBtn.addEventListener('click', () => {
    const v = addInp.value.trim().replace(/\/$/, '');
    if (v && !state.extraDirs.includes(v)) { state.extraDirs.push(v); addInp.value = ''; reRenderScaffold(); }
  });
  addInp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  wrap.append(el('div', {class:'tree-add'}, addInp, addBtn));

  return wrap;
}

function buildScaffoldRow(node, prefix, locked) {
  const isRequired  = node.required === true;
  const baseKey     = node.key.includes(':') ? node.key.split(':')[0] : node.key;
  const isLocked    = locked.has(baseKey);
  const chk         = isLocked ? null : isRequired ? 'present'
    : (state.checked[node.key] !== undefined ? state.checked[node.key]
      : (node.bumfuzzle_default !== false ? 'present' : null));
  const hasChildren = node.isDir && (node.children||[]).length > 0;

  let cls = 'trow';
  if (chk === 'present') cls += ' on';
  if (isRequired) cls += ' req';
  if (isLocked)   cls += ' lck-row';
  const row = el('div', {class:cls});

  row.append(el('span', {class:'tpfx'}, prefix));

  const expBtn = el('span', {class:'texp' + (hasChildren ? '' : ' blank')},
    hasChildren ? (state.expanded[node.key] ? '▾' : '▸') : '');
  if (hasChildren) {
    expBtn.addEventListener('click', e => {
      e.stopPropagation();
      state.expanded[node.key] = !state.expanded[node.key];
      reRenderScaffold();
    });
  }
  row.append(expBtn);

  const cb = el('div', {class:'tcb' + (isLocked ? ' lck' : '')});
  cb.addEventListener('click', e => {
    e.stopPropagation();
    if (isLocked)   { showToast('Enable ' + lockingLabel(node.key) + ' to use ' + node.label); return; }
    if (isRequired) { showToast(node.label + ' is required'); return; }
    const next = state.checked[node.key] === 'present' ? null : 'present';
    if (!node.foreach && (node.children||[]).length) propagate(node, next);
    else state.checked[node.key] = next;
    reRenderScaffold();
  });
  row.append(cb);
  row.append(el('span', {class:'tname' + (node.isDir ? ' dir' : '')}, node.label));

  if (isRequired) row.append(el('span', {class:'tree-meta'}, 'required'));
  if (isLocked)   row.append(el('span', {class:'tree-meta'}, '🔒 ' + lockingLabel(node.key)));

  return row;
}

function flattenVisible(nodes, prefix) {
  const rows = [];
  nodes.forEach((node, i) => {
    const isLast = i === nodes.length - 1;
    if (node.foreach) {
      const vals = resolveVals(node.foreach);
      vals.forEach((val, vi) => {
        const isLastV  = vi === vals.length - 1 && isLast;
        const instKey  = node.key + ':' + val;
        const label    = node.label.replace(/\{\{VALUE\}\}/g, val);
        if (!(instKey in state.checked)) state.checked[instKey] = defCheck({...node, key:instKey});
        rows.push({node:{...node, key:instKey, label, foreach:null}, prefix: prefix + (isLastV ? '└── ' : '├── ')});
      });
      return;
    }
    rows.push({node, prefix: prefix + (isLast ? '└── ' : '├── ')});
    if (node.isDir && node.children.length && state.expanded[node.key])
      rows.push(...flattenVisible(node.children, prefix + (isLast ? '    ' : '│   ')));
  });
  return rows;
}

function propagate(node, val) {
  state.checked[node.key] = val;
  (node.children||[]).forEach(c => propagate(c, val));
}

// ── Build: Gitignore (ASCII tree) ─────────────────────────────────────────────

function buildGitignore() {
  const wrap = el('div');
  const tree = el('div', {class:'tree'});
  tree.append(el('div', {class:'tree-root'}, '.gitignore/'));

  GITI_FRAGS.forEach((f, fi) => {
    const isLastFrag = fi === GITI_FRAGS.length - 1;
    const fragPfx    = isLastFrag ? '└── ' : '├── ';
    const kidPfx     = isLastFrag ? '    ' : '│   ';
    const on         = state.giti[f];
    const exp        = state.gitiExpanded[f];
    const pats       = FRAG_DEFS[f] || [];

    const frow = el('div', {class:'trow' + (on ? ' on' : '')});
    frow.append(el('span', {class:'tpfx'}, fragPfx));

    if (pats.length) {
      const expBtn = el('span', {class:'texp'}, exp ? '▾' : '▸');
      expBtn.addEventListener('click', e => {
        e.stopPropagation();
        state.gitiExpanded[f] = !exp;
        reRenderGitignore();
      });
      frow.append(expBtn);
    } else {
      frow.append(el('span', {class:'texp blank'}));
    }

    const chip = el('span', {class:'gi-frag' + (on ? ' on' : '')}, f);
    chip.addEventListener('click', e => {
      e.stopPropagation();
      const next = !on;
      state.giti[f] = next;
      state.gitiPatterns[f] = pats.map(() => next);
      reRenderGitignore();
    });
    frow.append(chip);
    tree.append(frow);

    if (exp && pats.length) {
      pats.forEach((pat, pi) => {
        const isLastPat = pi === pats.length - 1;
        const patPfx    = kidPfx + (isLastPat ? '└── ' : '├── ');
        const patOn     = on && (state.gitiPatterns[f][pi] !== false);

        const prow = el('div', {class:'trow' + (patOn ? ' on' : '')});
        prow.append(el('span', {class:'tpfx'}, patPfx));
        prow.append(el('span', {class:'texp blank'}));

        const pcb = el('div', {class:'tcb' + (!on ? ' lck' : '')});
        pcb.addEventListener('click', () => {
          if (!on) { showToast('Enable ' + f + ' to toggle individual patterns'); return; }
          state.gitiPatterns[f][pi] = !patOn;
          reRenderGitignore();
        });
        prow.append(pcb);
        prow.append(el('span', {class:'tname'}, pat));
        tree.append(prow);
      });
    }
  });

  wrap.append(tree);

  // Extra patterns below the tree
  wrap.append(el('div', {class:'gi-sep'}, 'extra patterns'));

  if (state.extraGiti.length) {
    const list = el('div', {class:'chips', style:'margin-bottom:8px'});
    state.extraGiti.forEach((p, i) => {
      const x = el('button', {class:'chip-x'}, '×');
      x.addEventListener('click', () => { state.extraGiti.splice(i, 1); reRenderGitignore(); });
      list.append(el('span', {class:'chip'}, p, x));
    });
    wrap.append(list);
  }

  const addInp = el('input', {class:'add-inp', type:'text', placeholder:'pattern…'});
  const addBtn = el('button', {class:'add-btn'}, '+ add');
  addBtn.addEventListener('click', () => {
    const v = addInp.value.trim();
    if (v && !state.extraGiti.includes(v)) { state.extraGiti.push(v); addInp.value = ''; reRenderGitignore(); }
  });
  addInp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  wrap.append(el('div', {class:'add-row'}, addInp, addBtn));

  return wrap;
}

// ── Build: Validation (accordion) ─────────────────────────────────────────────

function buildValidation() {
  const wrap = el('div', {class:'val-list'});
  const sevs = (S.preflight && S.preflight.valid_severities) || ['skip','warn','error','hard-stop'];

  for (const [key, val] of Object.entries(state.validation)) {
    const on  = val.enabled;
    const exp = !!state.valExpanded[key];

    const card = el('div', {class:'val-card' + (on ? ' on' : ' off') + (exp ? ' exp' : '')});

    // ── collapsed header ──
    const hdr = el('div', {class:'val-hdr'});

    const tog = el('div', {class:'tog' + (on ? ' on' : '')});
    tog.addEventListener('click', e => {
      e.stopPropagation();
      state.validation[key].enabled = !on;
      reRenderValidation();
    });

    const info = el('div', {class:'val-info'});
    info.append(
      el('span', {class:'vkey'}, key),
      el('span', {class:'vdesc-short'}, val.description)
    );

    const badge = el('span', {class:'sev-badge sev-' + val.severity}, val.severity);
    const chev  = el('span', {class:'val-chev'}, exp ? '▾' : '▸');

    hdr.append(tog, info, badge, chev);
    hdr.addEventListener('click', () => {
      state.valExpanded[key] = !exp;
      reRenderValidation();
    });

    card.append(hdr);

    // ── expanded body ──
    if (exp) {
      const body = el('div', {class:'val-body'});

      body.append(el('p', {class:'val-desc'}, val.description));

      // Severity segmented control
      const sevSec = el('div', {class:'val-section'});
      sevSec.append(el('span', {class:'val-sec-lbl'}, 'Severity'));
      const seg = el('div', {class:'sev-seg'});
      sevs.forEach(s => {
        const active = val.severity === s;
        const btn = el('button', {class:'sev-btn' + (active ? ' on sev-' + s : '')}, s);
        if (!on) btn.setAttribute('disabled', '');
        btn.addEventListener('click', () => {
          if (!on) return;
          state.validation[key].severity = s;
          reRenderValidation();
        });
        seg.append(btn);
      });
      sevSec.append(seg);
      body.append(sevSec);

      // Hints section
      const hintDefs    = val.hintsMap;
      const hintKeys    = val.availHints;
      const customHints = val.selectedHints.filter(h => !hintDefs[h]);

      if (hintKeys.length || customHints.length) {
        const hintSec = el('div', {class:'val-section'});
        hintSec.append(el('span', {class:'val-sec-lbl'}, 'Hints'));

        // Predefined hint chips — gi-frag style, title attr = full text
        if (hintKeys.length) {
          const chipsRow = el('div', {class:'gi-frags'});
          hintKeys.forEach(h => {
            const isOn = val.selectedHints.includes(h);
            const chip = el('span', {class:'gi-frag' + (isOn ? ' on' : ''), title: hintDefs[h]}, h);
            chip.addEventListener('click', () => {
              const arr = state.validation[key].selectedHints;
              const idx = arr.indexOf(h);
              if (idx >= 0) arr.splice(idx, 1); else arr.push(h);
              reRenderValidation();
            });
            chipsRow.append(chip);
          });
          hintSec.append(chipsRow);

          // Inline text for selected predefined hints
          const selected = hintKeys.filter(h => val.selectedHints.includes(h));
          if (selected.length) {
            const texts = el('div', {class:'hint-texts'});
            selected.forEach(h => {
              const row = el('div', {class:'hint-text-row'});
              row.append(el('span', {class:'hint-key'}, h));
              row.append(el('span', {class:'hint-val'}, hintDefs[h]));
              texts.append(row);
            });
            hintSec.append(texts);
          }
        }

        // Custom hints (free-text entries not in hintDefs)
        if (customHints.length) {
          const customRow = el('div', {class:'hint-custom-chips', style: hintKeys.length ? 'margin-top:8px' : ''});
          customHints.forEach(h => {
            const x = el('button', {class:'chip-x'}, '×');
            x.addEventListener('click', () => {
              const arr = state.validation[key].selectedHints;
              arr.splice(arr.indexOf(h), 1);
              reRenderValidation();
            });
            customRow.append(el('span', {class:'chip'}, h, x));
          });
          hintSec.append(customRow);
        }

        // Add custom hint input
        const addRow = el('div', {class:'add-row', style:'margin-top:9px'});
        const addInp = el('input', {class:'add-inp', type:'text', placeholder:'custom hint text…'});
        const addBtn = el('button', {class:'add-btn'}, '+ hint');
        addBtn.addEventListener('click', () => {
          const v = addInp.value.trim();
          if (v && !state.validation[key].selectedHints.includes(v)) {
            state.validation[key].selectedHints.push(v);
            addInp.value = '';
            reRenderValidation();
          }
        });
        addInp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
        addRow.append(addInp, addBtn);
        hintSec.append(addRow);

        body.append(hintSec);
      }

      // Items editor — command_checks only
      if (key === 'command_checks') {
        const itemsSec = el('div', {class:'val-section'});
        itemsSec.append(el('span', {class:'val-sec-lbl'}, 'Checks'));

        (val.items || []).forEach((item, ii) => {
          const itemWrap = el('div', {style:'border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;margin-bottom:8px'});

          const lblRow = el('div', {class:'field'});
          lblRow.append(el('span', {class:'lbl'}, 'Label'));
          const lblInp = el('input', {class:'inp', type:'text', placeholder:'ESLint'});
          lblInp.value = item.label;
          lblInp.addEventListener('input', () => { item.label = lblInp.value; scheduleSave(); });
          lblRow.append(lblInp);
          itemWrap.append(lblRow);

          const cmdRow = el('div', {class:'field'});
          cmdRow.append(el('span', {class:'lbl'}, 'Command'));
          const cmdInp = el('input', {class:'inp', type:'text',
            placeholder:'npx eslint src --max-warnings=0',
            style:'font-family:var(--mono)'});
          cmdInp.value = item.command;
          cmdInp.addEventListener('input', () => { item.command = cmdInp.value; scheduleSave(); });
          cmdRow.append(cmdInp);
          itemWrap.append(cmdRow);

          const sevRow = el('div', {class:'field'});
          sevRow.append(el('span', {class:'lbl'}, 'Severity'));
          const seg = el('div', {class:'sev-seg'});
          ['skip','warn','error','hard-stop'].forEach(s => {
            const btn = el('button', {class:'sev-btn' + (item.severity === s ? ' on sev-' + s : '')}, s);
            btn.addEventListener('click', () => { item.severity = s; reRenderValidation(); });
            seg.append(btn);
          });
          sevRow.append(seg);
          itemWrap.append(sevRow);

          const hintRow = el('div', {class:'field'});
          hintRow.append(el('span', {class:'lbl'}, 'Hints'));
          if (item.hints.length) {
            const hintChips = el('div', {class:'hint-custom-chips', style:'margin-bottom:6px'});
            item.hints.forEach((h, hi) => {
              const x = el('button', {class:'chip-x'}, '×');
              x.addEventListener('click', () => { item.hints.splice(hi, 1); reRenderValidation(); });
              hintChips.append(el('span', {class:'chip'}, h, x));
            });
            hintRow.append(hintChips);
          }
          const hAddRow = el('div', {class:'add-row'});
          const hInp = el('input', {class:'add-inp', type:'text', placeholder:'hint text…'});
          const hBtn = el('button', {class:'add-btn'}, '+ hint');
          hBtn.addEventListener('click', () => {
            const v = hInp.value.trim();
            if (v) { item.hints.push(v); hInp.value = ''; reRenderValidation(); }
          });
          hInp.addEventListener('keydown', e => { if (e.key === 'Enter') hBtn.click(); });
          hAddRow.append(hInp, hBtn);
          hintRow.append(hAddRow);
          itemWrap.append(hintRow);

          const rmBtn = el('button', {class:'add-btn',
            style:'margin-top:4px;color:var(--rd);border-color:rgba(248,81,73,.35)'}, '× Remove');
          rmBtn.addEventListener('click', () => { val.items.splice(ii, 1); reRenderValidation(); });
          itemWrap.append(rmBtn);

          itemsSec.append(itemWrap);
        });

        const addBtn = el('button', {class:'add-rule-btn'}, '+ Add Check');
        addBtn.addEventListener('click', () => {
          val.items.push({label:'', command:'', severity:'error', hints:[]});
          reRenderValidation();
        });
        itemsSec.append(addBtn);
        body.append(itemsSec);
      }

      card.append(body);
    }

    wrap.append(card);
  }
  return wrap;
}

// ── Build: Rules ──────────────────────────────────────────────────────────────

function buildRules() {
  const wrap = el('div');
  const sevs  = ['skip','warn','error','hard-stop'];
  const TYPES = ['file_present','file_absent','content_present','content_absent','script_clean'];

  if (!state.rules.length) {
    wrap.append(el('p', {class:'rules-empty'},
      'No rules yet. Add a rule to enforce file presence, content patterns, or script exits.'));
  }

  state.rules.forEach((rule, ri) => {
    const exp  = !!rule._exp;
    const card = el('div', {class:'val-card' + (exp ? ' exp on' : '')});

    // ── collapsed header ──
    const hdr = el('div', {class:'val-hdr'});

    const typeCls  = 'rule-type-badge rule-type-' + rule.type.replace(/_/g, '-');
    const typeLabel = rule.type.replace(/_/g, ' ');
    const info = el('div', {class:'val-info'});
    info.append(
      el('span', {class: typeCls}, typeLabel),
      el('span', {class:'vdesc-short'}, rule.description || '—')
    );

    const badge     = el('span', {class:'sev-badge sev-' + rule.severity}, rule.severity);
    const removeBtn = el('button', {class:'rule-remove', title:'Remove rule'}, '×');
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      state.rules.splice(ri, 1);
      reRenderRules();
    });
    const chev = el('span', {class:'val-chev'}, exp ? '▾' : '▸');

    hdr.append(info, badge, removeBtn, chev);
    hdr.addEventListener('click', () => { rule._exp = !exp; reRenderRules(); });
    card.append(hdr);

    // ── expanded body ──
    if (exp) {
      const body = el('div', {class:'val-body'});

      // Type selector
      const typeSec = el('div', {class:'val-section'});
      typeSec.append(el('span', {class:'val-sec-lbl'}, 'Type'));
      const typeSeg = el('div', {class:'rule-type-seg'});
      TYPES.forEach(t => {
        const btn = el('button', {class:'rule-type-btn' + (rule.type === t ? ' on' : '')},
          t.replace(/_/g, ' '));
        btn.addEventListener('click', () => { rule.type = t; reRenderRules(); });
        typeSeg.append(btn);
      });
      typeSec.append(typeSeg);
      body.append(typeSec);

      // Description
      const descSec = el('div', {class:'val-section'});
      descSec.append(el('span', {class:'val-sec-lbl'}, 'Description'));
      const descInp = el('input', {class:'inp', type:'text', placeholder:'What does this rule check?'});
      descInp.value = rule.description;
      descInp.addEventListener('input', () => { rule.description = descInp.value; scheduleSave(); });
      descSec.append(descInp);
      body.append(descSec);

      // Target (file_* and content_*)
      if (rule.type !== 'script_clean') {
        const tgtSec = el('div', {class:'val-section'});
        tgtSec.append(el('span', {class:'val-sec-lbl'}, 'Target  —  path or filename glob'));
        const tgtInp = el('input', {class:'inp', type:'text', placeholder:'Dockerfile, config/*.yml, *.env …'});
        tgtInp.value = rule.target;
        tgtInp.addEventListener('input', () => { rule.target = tgtInp.value.trim(); scheduleSave(); });
        tgtSec.append(tgtInp);
        body.append(tgtSec);

        // Scope toggle
        const scopeSec = el('div', {class:'val-section'});
        scopeSec.append(el('span', {class:'val-sec-lbl'}, 'Scope'));
        const scopeSeg = el('div', {class:'sev-seg'});
        ['recursive','root'].forEach(s => {
          const btn = el('button', {class:'sev-btn' + (rule.scope === s ? ' on sev-skip' : '')}, s);
          btn.addEventListener('click', () => { rule.scope = s; reRenderRules(); });
          scopeSeg.append(btn);
        });
        scopeSec.append(scopeSeg);
        body.append(scopeSec);
      }

      // Pattern + Exclude (content_* only)
      if (rule.type === 'content_present' || rule.type === 'content_absent') {
        const patSec = el('div', {class:'val-section'});
        patSec.append(el('span', {class:'val-sec-lbl'}, 'Pattern  —  grep regex'));
        const patInp = el('input', {class:'inp', type:'text', placeholder:'console\\.log, localhost, TODO …'});
        patInp.value = rule.pattern;
        patInp.addEventListener('input', () => { rule.pattern = patInp.value; scheduleSave(); });
        patSec.append(patInp);
        body.append(patSec);

        const exSec = el('div', {class:'val-section'});
        exSec.append(el('span', {class:'val-sec-lbl'}, 'Exclude  —  glob to skip (optional)'));
        const exInp = el('input', {class:'inp', type:'text', placeholder:'config/local.yml'});
        exInp.value = rule.exclude;
        exInp.addEventListener('input', () => { rule.exclude = exInp.value.trim(); scheduleSave(); });
        exSec.append(exInp);
        body.append(exSec);
      }

      // Command (script_clean only)
      if (rule.type === 'script_clean') {
        const cmdSec = el('div', {class:'val-section'});
        cmdSec.append(el('span', {class:'val-sec-lbl'}, 'Command'));
        const cmdInp = el('input', {class:'inp', type:'text', placeholder:'npx tsc --noEmit'});
        cmdInp.value = rule.command;
        cmdInp.addEventListener('input', () => { rule.command = cmdInp.value; scheduleSave(); });
        cmdSec.append(cmdInp);
        body.append(cmdSec);
      }

      // Severity
      const sevSec = el('div', {class:'val-section'});
      sevSec.append(el('span', {class:'val-sec-lbl'}, 'Severity'));
      const seg = el('div', {class:'sev-seg'});
      sevs.forEach(s => {
        const btn = el('button', {class:'sev-btn' + (rule.severity === s ? ' on sev-' + s : '')}, s);
        btn.addEventListener('click', () => { rule.severity = s; reRenderRules(); });
        seg.append(btn);
      });
      sevSec.append(seg);
      body.append(sevSec);

      // Hints
      const hintSec = el('div', {class:'val-section'});
      hintSec.append(el('span', {class:'val-sec-lbl'}, 'Hints  —  shown when this check fails'));
      if (rule.hints.length) {
        const hintList = el('div', {class:'hint-custom-chips', style:'margin-bottom:8px'});
        rule.hints.forEach((h, hi) => {
          const x = el('button', {class:'chip-x'}, '×');
          x.addEventListener('click', () => { rule.hints.splice(hi, 1); reRenderRules(); });
          hintList.append(el('span', {class:'chip'}, h, x));
        });
        hintSec.append(hintList);
      }
      const addRow = el('div', {class:'add-row'});
      const addInp = el('input', {class:'add-inp', type:'text', placeholder:'hint text…'});
      const addBtn = el('button', {class:'add-btn'}, '+ hint');
      addBtn.addEventListener('click', () => {
        const v = addInp.value.trim();
        if (v) { rule.hints.push(v); addInp.value = ''; reRenderRules(); }
      });
      addInp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
      addRow.append(addInp, addBtn);
      hintSec.append(addRow);
      body.append(hintSec);

      card.append(body);
    }

    wrap.append(card);
  });

  // Add rule button
  const addRuleBtn = el('button', {class:'add-rule-btn'}, '+ Add Rule');
  addRuleBtn.addEventListener('click', () => {
    state.rules.push({
      type:'file_present', description:'', target:'', pattern:'',
      scope:'recursive', exclude:'', command:'', severity:'error',
      hints:[], _exp:true,
    });
    reRenderRules();
  });
  wrap.append(addRuleBtn);

  return wrap;
}

// ── Page render ───────────────────────────────────────────────────────────────

function renderPage() {
  const app = document.getElementById('app');

  saveEl = el('span', {class:'hdr-save idle'});
  app.append(el('div', {class:'hdr'},
    el('span', {class:'hdr-logo'}, 'bumfuzzle'),
    el('span', {class:'hdr-meta'}, 'v' + META.version),
    el('span', {class:'hdr-path'}, META.projectDir),
    saveEl
  ));

  const wrap = el('div', {class:'wrap'});

  // ── Project ────────────────────────────────────────────────────────────────
  const {sec: projSec, body: projBody} = makeSection('project', 'Project');

  const nameInp = el('input', {class:'inp', type:'text', placeholder:META.projectDirName});
  nameInp.value = state.name;
  nameInp.addEventListener('input', () => {
    state.name = nameInp.value.trim() || META.projectDirName;
    scheduleSave();
  });
  projBody.append(el('div', {class:'field'}, el('label', {class:'lbl'}, 'Name'), nameInp));

  const envsEl = el('div', {class:'chips'});
  function refreshEnvs() {
    envsEl.innerHTML = '';
    if (!state.envs.length) envsEl.append(el('span', {class:'chip-empty'}, 'none'));
    state.envs.forEach((e, i) => {
      const x = el('button', {class:'chip-x'}, '×');
      x.addEventListener('click', () => {
        state.envs.splice(i, 1);
        refreshEnvs();
        reRenderScaffold();
        reRenderGitignore();
        scheduleSave();
      });
      envsEl.append(el('span', {class:'chip'}, e, x));
    });
  }
  refreshEnvs();

  const envInp = el('input', {class:'add-inp', type:'text', placeholder:'env name…'});
  const envBtn = el('button', {class:'add-btn'}, '+ add');
  envBtn.addEventListener('click', () => {
    const v = envInp.value.trim();
    if (v && !state.envs.includes(v)) {
      state.envs.push(v); envInp.value = '';
      refreshEnvs(); reRenderScaffold(); reRenderGitignore(); scheduleSave();
    }
  });
  envInp.addEventListener('keydown', e => { if (e.key === 'Enter') envBtn.click(); });

  projBody.append(el('div', {class:'field'},
    el('label', {class:'lbl'}, 'Environments'),
    envsEl,
    el('div', {class:'add-row'}, envInp, envBtn)
  ));
  wrap.append(projSec);

  // ── Tools ──────────────────────────────────────────────────────────────────
  const {sec: toolsSec, body: tb} = makeSection('tools', 'Tools');
  toolsBodyEl = tb;
  repl(toolsBodyEl, buildTools);
  wrap.append(toolsSec);

  // ── Scaffold ───────────────────────────────────────────────────────────────
  const {sec: scaffSec, body: sb} = makeSection('scaffold', 'Scaffold');
  scaffoldBodyEl = sb;
  repl(scaffoldBodyEl, buildScaffold);
  wrap.append(scaffSec);

  // ── Gitignore ──────────────────────────────────────────────────────────────
  const {sec: gitSec, body: gb} = makeSection('gitignore', 'Gitignore');
  gitBodyEl = gb;
  repl(gitBodyEl, buildGitignore);
  wrap.append(gitSec);

  // ── Rules ──────────────────────────────────────────────────────────────────
  const {sec: rulesSec, body: rb} = makeSection('rules', 'Rules');
  rulesBodyEl = rb;
  repl(rulesBodyEl, buildRules);
  wrap.append(rulesSec);

  // ── Validation Rules ───────────────────────────────────────────────────────
  const {sec: valSec, body: vb} = makeSection('validation', 'Validation Rules');
  valBodyEl = vb;
  repl(valBodyEl, buildValidation);
  wrap.append(valSec);

  // ── Actions ────────────────────────────────────────────────────────────────
  const {sec: actSec, body: ab} = makeSection('actions', 'Actions');
  actRowEl    = el('div', {class:'act-row'});
  outLogEl    = el('pre',  {class:'out-log'});
  outStatusEl = el('div',  {class:'out-status'});
  outWrapEl   = el('div',  {class:'out-wrap'}, outLogEl, outStatusEl);
  renderActBtns();
  ab.append(actRowEl, outWrapEl);
  wrap.append(actSec);

  app.append(wrap);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

(async () => {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    S = cfg.settings; C = cfg.current; META = cfg.meta;
    initData();
    renderPage();
  } catch {
    document.getElementById('app').textContent = 'Run bumfuzzle to open this page.';
  }
})();
</script>
</body>
</html>

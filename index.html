    panel.append(formView, diffView, el('div', { class: 'rf-status-bar' },
      dirtyBadgeScript,
      el('div', { class: 'rf-actions-bar' }, btnDiff, btnEdit, btnCancel, btnSave),
    ));
  } else {
    panel.append(formView, diffView);
  }

  function updateStatus() {
    const dirty = isScriptDirty(script);
    const mode  = script._mode;
    idInp.style.borderColor = script.id ? '' : 'var(--rd)';
    if (dirtyBadgeScript) dirtyBadgeScript.classList.toggle('visible', dirty);
    btnDiff.style.display   = (mode === 'edit' && dirty && script._saved !== null) ? '' : 'none';
    btnSave.style.display   = (dirty && !!script.id) ? '' : 'none';
    btnEdit.style.display   = mode === 'diff' ? '' : 'none';
    btnCancel.style.display = '';
  }

  function setMode(mode) {
    script._mode = mode;
    formView.style.display = mode === 'edit' ? '' : 'none';
    diffView.style.display = mode === 'diff' ? '' : 'none';
    if (mode === 'diff') renderDiff();
    updateStatus();
  }

  btnDiff.addEventListener('click', () => setMode('diff'));
  btnEdit.addEventListener('click', () => setMode('edit'));

  btnSave.addEventListener('click', () => {
    script._saved = scriptSnapshot(script);
    if (script.id) idInp.readOnly = true;
    script._updateRow?.();
    scheduleSave();
    setMode('edit');
  });

  btnCancel.addEventListener('click', () => {
    if (!isScriptDirty(script)) {
      script._exp = false;
      reRender();
      return;
    }
    if (script._saved === null) {
      const path = findPath(script, state.scripts, []);
      if (path) { removeByPath(path, state.scripts); reRender(); scheduleSave(); }
      return;
    }
    const saved = JSON.parse(script._saved);
    script.id          = saved.id          || '';
    script.name        = saved.name        || '';
    script.description = saved.description || '';
    script.command     = saved.command     || '';
    script.args        = JSON.parse(JSON.stringify(saved.args || []));
    idInp.value  = script.id;
    nInp.value   = script.name;
    dInp.value   = script.description;
    cmdTa.value  = script.command;
    rebuildArgsList();
    script._updateRow?.();
    scheduleSave();
    setMode('edit');
  });

  setMode(script._mode || 'edit');
  requestAnimationFrame(() => autoResize(cmdTa));
  return panel;
}

// ── Tree section factory ──────────────────────────────────────────────────────

function createTreeSection(opts) {
  let registry = [];
  let bodyEl   = null;
  let section;

  function buildGroupRow(entry) {
    const { item: grp, cols } = entry;
    const row = el('div', { class: 'rt-row' });
    let editing = false;

    row.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON' || editing) return;
      const anchorY = row.getBoundingClientRect().top;
      grp._col = !grp._col;
      reRender(grp, anchorY);
    });

    const nameSpan  = el('span', { class: 'rt-name grp' }, grp.group || 'Unnamed group');
    const n = countItems(grp);
    const countSpan = el('span', { class: 'rt-grp-count' }, n > 0 ? '(' + n + ' items)' : '');
    const nameInp   = el('input', { class: 'rt-name-inp', type: 'text',
      value: grp.group, placeholder: 'Group name', style: 'display:none' });

    nameInp.addEventListener('input', () => { grp.group = nameInp.value; scheduleSave(); });
    nameInp.addEventListener('blur', () => {
      editing = false;
      nameSpan.textContent = grp.group || 'Unnamed group';
      nameInp.style.display = 'none';
      nameSpan.style.display = '';
      countSpan.style.display = '';
    });
    nameInp.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === 'Escape') nameInp.blur(); });

    const editBtn = el('button', { class: 'rt-rm rt-edit', title: 'Rename' }, '✎');
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (editing) return;
      editing = true;
      nameSpan.style.display = 'none';
      countSpan.style.display = 'none';
      nameInp.style.display = '';
      nameInp.focus();
      nameInp.select();
    });

    const rm = el('button', { class: 'rt-rm', title: 'Remove group' }, '\xd7');
    rm.addEventListener('click', e => {
      e.stopPropagation();
      if ((grp.rules || []).length && !confirm('Remove "' + grp.group + '" and all its contents?')) return;
      removeByPath(entry.path, opts.getData()); reRender(); scheduleSave();
    });

    const nameLine = el('div', { style: 'display:flex;align-items:baseline;min-width:0' });
    nameLine.append(nameSpan, countSpan, nameInp);
    row.append(buildPrefix(cols), el('div', { class: 'rt-content' }, nameLine), el('div', { class: 'rt-actions' }, editBtn, rm));

    attachDrag(row, grp, section);
    registry.push({ item: grp, el: row, section });
    const outer = el('div', { class: 'rt-outer' });
    outer.append(el('span', { class: 'rt-ln' }, String(grp._ln)), row);
    return outer;
  }

  function buildItemRow(entry) {
    const { item, cols } = entry;
    const exp = !!item._exp;
    const row = el('div', { class: 'rt-row' });

    row.addEventListener('click', e => {
      if (e.target.tagName === 'BUTTON') return;
      if (exp) { item._exp = false; reRender(); return; }
      const anchorY = row.getBoundingClientRect().top;
      item._exp = true;
      reRender(item, anchorY);
    });

    const nameSpan = el('span', { class: 'rt-name' }, opts.getItemName(item));
    nameSpan.style.flex = '1'; nameSpan.style.minWidth = '0';
    const subSpan  = el('span', { class: 'rt-subdesc' }, item.description || '');
    subSpan.style.display = (item.name && item.description) ? '' : 'none';
    const nameLine = el('div', { style: 'display:flex;align-items:baseline;min-width:0' });

    let statusSpan = null;
    if (opts.hasStatus) {
      statusSpan = el('span', { class: 'rt-status' }, '● unsaved');
      statusSpan.style.display = opts.isItemDirty(item) ? '' : 'none';
      item._updateRow = () => {
        nameSpan.textContent = opts.getItemName(item);
        subSpan.textContent  = item.description || '';
        subSpan.style.display = (item.name && item.description) ? '' : 'none';
        statusSpan.style.display = opts.isItemDirty(item) ? '' : 'none';
      };
    } else {
      item._updateRow = () => {
        nameSpan.textContent = opts.getItemName(item);
        subSpan.textContent  = item.description || '';
        subSpan.style.display = (item.name && item.description) ? '' : 'none';
      };
    }
    nameLine.append(nameSpan);

    const content = el('div', { class: 'rt-content' }, nameLine, subSpan);

    const rm = el('button', { class: 'rt-rm', title: 'Remove' }, '\xd7');
    rm.addEventListener('click', e => {
      e.stopPropagation();
      if (opts.confirmRemove && !opts.confirmRemove(item)) return;
      removeByPath(entry.path, opts.getData()); reRender(); scheduleSave();
    });

    let togBtn = null;
    if (opts.hasEnable) {
      const en0 = item.enabled !== false;
      row.classList.toggle('rt-item-disabled', !en0);
      togBtn = el('button', { class: 'rt-tog' + (en0 ? '' : ' off'), title: en0 ? 'Disable' : 'Enable' }, en0 ? 'on' : 'off');
      togBtn.addEventListener('click', e => {
        e.stopPropagation();
        item.enabled = item.enabled !== false ? false : true;
        const en = item.enabled !== false;
        togBtn.textContent = en ? 'on' : 'off';
        togBtn.className   = 'rt-tog' + (en ? '' : ' off');
        togBtn.title       = en ? 'Disable' : 'Enable';
        row.classList.toggle('rt-item-disabled', !en);
        scheduleSave();
        opts.onReRender?.();
        if (opts.getFilter && opts.getFilter()) reRender();
      });
    }

    row.append(buildPrefix(cols), content, ...(statusSpan ? [statusSpan] : []), ...(togBtn ? [togBtn] : []), el('div', { class: 'rt-actions' }, rm));

    attachDrag(row, item, section);
    registry.push({ item, el: row, section });
    const outer = el('div', { class: 'rt-outer' });
    outer.append(el('span', { class: 'rt-ln' }, String(item._ln)), row);
    return outer;
  }

  function buildPanelRow(entry) {
    const { item, cols } = entry;
    const wrap = el('div', { class: 'rt-panel-wrap' });
    wrap.append(buildPrefix(cols, true));
    wrap.append(opts.buildPanel(entry, reRender, false));
    const outer = el('div', { class: 'rt-outer' });
    outer.append(el('span', { class: 'rt-ln' }), wrap);
    return outer;
  }

  function buildTree() {
    registry = [];
    const wrap = el('div', { class: 'rtree' });

    const filterFn   = opts.getFilter ? opts.getFilter() : null;
    const rawEntries = flattenTree(opts.getData(), [], []);
    let entries = rawEntries;
    if (filterFn) {
      const visibleItems = new Set(
        rawEntries.filter(e => e.kind === 'item' && filterFn(e.item)).map(e => e.item)
      );
      entries = rawEntries.filter(e => {
        if (e.kind === 'item')  return visibleItems.has(e.item);
        if (e.kind === 'panel') return visibleItems.has(e.item);
        if (e.kind === 'group') return flattenItems(e.item.rules || []).some(i => visibleItems.has(i));
        return false;
      });
    }
    entries.forEach(entry => {
      if      (entry.kind === 'group') wrap.append(buildGroupRow(entry));
      else if (entry.kind === 'item')  wrap.append(buildItemRow(entry));
      else if (entry.kind === 'panel') wrap.append(buildPanelRow(entry));
    });

    const addRow = el('div', { class: 'add-root-row' });

    const addItem = el('button', { class: 'add-root-btn' }, opts.addItemLabel);
    addItem.addEventListener('click', () => {
      if (modalEl) return;
      const item = opts.newItem();
      openModal(
        () => opts.buildPanel({ item, path: [], cols: [] }, () => {}, true),
        {
          title: opts.addItemLabel.replace(/^\+\s*/, ''),
          onConfirm: () => {
            item._saved = opts.snapshotFn(item);
            item._exp   = false;
            opts.getData().push(item);
            reRender();
            scheduleSave();
          },
          onCancel:    () => {},
          noConfirm:   true,
          validateFn:  () => opts.validateItem ? opts.validateItem(item) : true,
        }
      );
    });

    const addGroup = el('button', { class: 'add-root-btn' }, opts.addGroupLabel || '+ Add Group');
    addGroup.addEventListener('click', () => {
      if (modalEl) return;
      let groupName = '';
      openModal(
        () => {
          const nameInp = el('input', { class: 'inp', type: 'text', placeholder: 'Group name' });
          nameInp.addEventListener('input', () => { groupName = nameInp.value; });
          return panelSec('Group name', nameInp);
        },
        {
          title: 'New Group',
          onConfirm: () => {
            const grp = opts.newGroup
              ? opts.newGroup(groupName)
              : { group: groupName.trim() || 'New Group', rules: [], _col: false };
            opts.getData().push(grp);
            reRender();
            scheduleSave();
          },
          onCancel:   () => {},
          validateFn: () => groupName.trim().length > 0,
          noConfirm:  true,
        }
      );
    });

    addRow.append(addItem, addGroup);
    wrap.append(addRow);
    return wrap;
  }

  function reRender(anchorItem, anchorY) {
    if (!bodyEl) return;
    assignLineNumbers(opts.getData());
    bodyEl.innerHTML = '';
    bodyEl.append(buildTree());
    opts.onReRender?.();
    if (anchorItem !== undefined && anchorY !== undefined) {
      const reg = registry.find(r => r.item === anchorItem);
      if (reg) window.scrollBy(0, reg.el.getBoundingClientRect().top - anchorY);
    }
  }

  section = {
    getData:  opts.getData,
    reRender,
    get registry() { return registry; },
    mount(el) { bodyEl = el; },
  };
  return section;
}

// ── Command runner ────────────────────────────────────────────────────────────

let cmdRunning = false, confirmCmd = null;
let outLogEl = null, outStatusEl = null, outWrapEl = null, actRowEl = null;

async function runCmd(cmd) {
  try {
    const res = await fetch('/run/' + cmd, { method: 'POST' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = '';
    outer: while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const evts = buf.split('\n\n');
      buf = evts.pop();
      for (const ev of evts) {
        if (!ev.startsWith('data: ')) continue;
        const line = JSON.parse(ev.slice(6));
        if (typeof line === 'string' && line.startsWith('__DONE__')) {
          const ec = parseInt(line.split(' ')[1], 10);
          outStatusEl.textContent = ec === 0 ? '✓ Done' : '✗ Exited ' + ec;
          outStatusEl.className = 'out-status ' + (ec === 0 ? 'ok' : 'err');
          break outer;
        }
        outLogEl.textContent += line + '\n';
        outLogEl.scrollTop = outLogEl.scrollHeight;
      }
    }
  } catch (e) {
    outStatusEl.textContent = '✗ ' + e.message;
    outStatusEl.className = 'out-status err';
  }
  cmdRunning = false;
  renderActBtns();
}

function renderActBtns() {
  if (!actRowEl) return;
  actRowEl.innerHTML = '';
  if (confirmCmd) {
    actRowEl.append(
      el('button', { class: 'btn cancel', onclick: () => { confirmCmd = null; renderActBtns(); } }, 'Cancel'),
      el('button', { class: 'btn pri', onclick: () => {
        const cmd = confirmCmd; confirmCmd = null;
        cmdRunning = true;
        outLogEl.textContent = ''; outStatusEl.textContent = '';
        outStatusEl.className = 'out-status';
        outWrapEl.style.display = '';
        renderActBtns(); runCmd(cmd);
      }}, 'Run ' + confirmCmd),
    );
  } else {
    ['kickstart','preflight'].forEach((cmd, i) => {
      const b = el('button', { class: 'btn' + (i === 0 ? ' pri' : '') },
        cmd.charAt(0).toUpperCase() + cmd.slice(1));
      b.disabled = cmdRunning;
      b.addEventListener('click', () => { if (!cmdRunning) { confirmCmd = cmd; renderActBtns(); } });
      actRowEl.append(b);
    });
  }
}

// ── Page render ───────────────────────────────────────────────────────────────

function renderPage() {
  if (CONFIG.lineNumbers) document.body.classList.add('feat-line-numbers');
  if (CONFIG.treeLines)   document.body.classList.add('feat-tree-lines');

  const app = document.getElementById('app');

  saveEl = el('span', { class: 'hdr-save idle' });
  app.append(el('div', { class: 'hdr' },
    el('span', { class: 'hdr-logo' }, 'bumfuzzle'),
    el('span', { class: 'hdr-meta' }, 'v' + META.version),
    el('span', { class: 'hdr-path' }, META.projectDir),
    saveEl,
    el('button', { class: 'btn-hdr-reset', onclick: showResetModal }, 'Reset'),
  ));

  const wrap = el('div', { class: 'wrap' });

  sections = [];

  // Scripts
  const { sec: scriptsSec, body: sb, titleEl: scriptsTitleEl } = makeSection('scripts', 'Scripts');
  const scriptsTree = createTreeSection({
    getData:       () => state.scripts,
    buildPanel:    (entry, reRender, inModal) => buildScriptPanel(entry.item, reRender, inModal),
    hasStatus:     true,
    isItemDirty:   isScriptDirty,
    getItemName:   item => item.name || item.id || '—',
    newItem:       () => ({ id: '', name: '', description: '', command: '', args: [], _exp: true, _saved: null, _mode: 'edit' }),
    snapshotFn:    scriptSnapshot,
    validateItem:  item => !!item.id && !!item.name,
    addItemLabel:  '+ Add Script',
    confirmRemove: (script) => {
      const refs = flattenItems(state.rules).filter(r => r.type === 'script_reusable' && r.script === script.id);
      if (!refs.length) return true;
      return confirm('Script "' + (script.name || script.id) + '" is referenced by ' + refs.length + ' rule(s):\n' + refs.map(r => '  - ' + (r.name || r.description || r.script)).join('\n') + '\n\nDelete anyway?');
    },
    onReRender: () => {
      const n = countSectionItems(state.scripts, true);
      scriptsTitleEl.textContent = n ? 'Scripts (' + n + ' item' + (n !== 1 ? 's' : '') + ')' : 'Scripts';
    },
  });
  sections.push(scriptsTree);
  scriptsTree.mount(sb);
  scriptsTree.reRender();
  wrap.append(scriptsSec);

  // Rules
  const { sec: rulesSec, body: rb, hdr: rulesHdr, titleEl: rulesTitleEl } = makeSection('rules', 'Rules');
  const filterBtns = {};
  const filterBar  = el('div', { class: 'sec-filter' });
  ['all', 'enabled', 'disabled'].forEach(f => {
    const b = el('button', { class: 'sec-filter-btn' + (f === 'all' ? ' on' : '') }, f);
    b.addEventListener('click', () => {
      state.filters.rules = f;
      Object.values(filterBtns).forEach(x => x.classList.toggle('on', x === b));
      rulesTree.reRender();
    });
    filterBtns[f] = b;
    filterBar.append(b);
  });
  rulesHdr.append(filterBar);

  const rulesTree = createTreeSection({
    getData:      () => state.rules,
    buildPanel:   (entry, reRender, inModal) => buildRuleFields(entry.item, reRender, inModal),
    hasStatus:    true,
    isItemDirty:  isDirty,
    hasEnable:    true,
    getFilter:    () => {
      const f = state.filters.rules;
      if (f === 'enabled')  return item => item.enabled !== false;
      if (f === 'disabled') return item => item.enabled === false;
      return null;
    },
    getItemName:  item => item.name || item.description || '—',
    newItem:      () => ({ type: 'script_clean', name: '', description: '', command: '',
                           severity: 'error', instruction: '', enabled: true, _exp: true, _saved: null, _mode: 'edit' }),
    snapshotFn:   ruleSnapshot,
    validateItem: item => {
      if (!item.name) return false;
      if (item.type === 'script_reusable') return !!item.script && ruleRequiredArgsFilled(item);
      return !!item.command;
    },
    addItemLabel: '+ Add Rule',
    onReRender: () => {
      const { total, enabled, disabled } = countRuleStats(state.rules);
      if (!total) { rulesTitleEl.textContent = 'Rules'; return; }
      rulesTitleEl.textContent = 'Rules (' + total + ' item' + (total !== 1 ? 's' : '') + ' · ' + enabled + ' on · ' + disabled + ' off)';
    },
  });
  sections.push(rulesTree);
  rulesTree.mount(rb);
  rulesTree.reRender();
  wrap.append(rulesSec);

  // Enums
  const { sec: enumsSec, body: eb, titleEl: enumsTitleEl } = makeSection('enums', 'Enums');
  const enumsTree = createTreeSection({
    getData:      () => state.enums,
    buildPanel:   (entry, reRender, inModal) => buildEnumPanel(entry.item, reRender, inModal),
    hasStatus:    true,
    isItemDirty:  isEnumDirty,
    getItemName:  item => item.name || '—',
    newItem:      () => ({ name: '', description: '', values: [], _exp: true, _saved: null, _mode: 'edit' }),
    snapshotFn:   enumSnapshot,
    validateItem: item => !!item.name,
    addItemLabel: '+ Add Enum',
    onReRender: () => {
      const n = countSectionItems(state.enums, true);
      enumsTitleEl.textContent = n ? 'Enums (' + n + ' item' + (n !== 1 ? 's' : '') + ')' : 'Enums';
    },
  });
  sections.push(enumsTree);
  enumsTree.mount(eb);
  enumsTree.reRender();
  wrap.append(enumsSec);

  // Actions
  const { sec: actSec, body: ab } = makeSection('actions', 'Actions');
  actRowEl    = el('div', { class: 'act-row' });
  outLogEl    = el('pre',  { class: 'out-log' });
  outStatusEl = el('div',  { class: 'out-status' });
  outWrapEl   = el('div',  { class: 'out-wrap' }, outLogEl, outStatusEl);
  renderActBtns();
  ab.append(actRowEl, outWrapEl);
  wrap.append(actSec);

  app.append(wrap);
  initDrag();
}

// ── Boot ──────────────────────────────────────────────────────────────────────

(async () => {
  try {
    const res = await fetch('/config');
    if (!res.ok) throw new Error();
    const cfg = await res.json();
    S = cfg.settings; C = cfg.current; META = cfg.meta;
    initData();
    renderPage();
  } catch {
    document.getElementById('app').textContent = 'Run bumfuzzle to open this page.';
  }
})();
</script>

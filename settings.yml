validation:
  required_files:
    enabled: true
    description: "Required files are present"
    error: "Required file missing: {file}"
    hints:
      create_file: "Create the missing file or remove it from validation.required_files.files"
    selected_hints: [create_file]

  required_dirs:
    enabled: true
    description: "Required directories are present"
    error: "Required directory missing: {dir}"
    hints:
      create_dir: "Create the missing directory: mkdir -p <dir>"
    selected_hints: [create_dir]

  githooks_installed:
    enabled: true
    description: "Installed hooks match .githooks sources"
    error: "{hook} hook is out of sync ({detail})"
    hints:
      run_install_hooks: "Run: scripts/hooks.sh --force"
    selected_hints: [run_install_hooks]

  gitignore_patterns:
    enabled: false
    description: ".gitignore contains all required patterns"
    error: "Missing required pattern in .gitignore: {pattern}"
    hints:
      add_pattern: "Add the missing pattern to .gitignore"
    selected_hints: [add_pattern]

  git_no_ai_coauthors:
    enabled: true
    description: "No AI co-authored commits in git history"
    error: "{count} commit(s) with AI co-authorship detected (most recent: {recent})"
    hints:
      review: "Review commits: git log --grep='Co-Authored-By: Claude' -i --oneline"
    selected_hints: [review]

  env_no_unknown_keys:
    enabled: true
    description: "No .env file contains keys not declared in .env.template"
    error: "{file} has undeclared keys: {details}"
    hints:
      remove_or_declare: "Remove the key from the .env file, or declare it in .env.template"
    selected_hints: [remove_or_declare]

  env_no_missing_keys:
    enabled: true
    description: "Every .env file contains all keys declared in .env.template"
    error: "{file} is missing template keys: {details}"
    hints:
      add_from_template: "Add the missing key(s) to the .env file (copy from .env.template)"
    selected_hints: [add_from_template]

  env_accounted_for:
    enabled: true
    description: "All .env.template vars are accounted for"
    error: "Env var in .env.template is not accounted for: {var}"
    hints:
      declare_in_preflight: "Add the var to env.compose.vars or env.tools.vars in bumfuzzle.yml"
    selected_hints: [declare_in_preflight]

  env_no_blank_values:
    enabled: true
    description: "No .env file has blank values"
    error: "{file} has blank value for {var}"
    hints:
      recommend_placeholder: "Add a non-empty placeholder: KEY=<placeholder>"
      recommend_mock: "Use a mock value for local dev: KEY=mock-value"
    selected_hints: [recommend_placeholder]

  service_configs_declared:
    enabled: true
    description: "All runtime service stacks have a config file"
    error: "Runtime stack '{stack}' is missing config.{stack}.yml"
    hints:
      create_config: "Create config.{stack}.yml for the stack"
    selected_hints: [create_config]

  compose_config_valid:
    enabled: true
    description: "Docker Compose files render successfully for each environment and stack"
    error: "Compose config failed for env '{env}', stack '{stack}': {details}"
    hints:
      debug_compose: "Debug with: docker compose -f docker-compose.<stack>.yml --env-file .env.<env> config"
    selected_hints: [debug_compose]

  compose_build_contexts_present:
    enabled: true
    description: "Docker Compose build contexts exist"
    error: "Compose build context missing for stack '{stack}', service '{service}': {context}"
    hints:
      create_context: "Create the build context directory or fix the path in the compose file"
    selected_hints: [create_context]

  no_external_images:
    enabled: false
    description: "Docker Compose services use only local builds or allowlisted images"
    error: "Service '{service}' in {file} uses external image '{image}' (not in docker.image_allowlist)"
    hints:
      add_build: "Add a build context to the service instead of pulling an external image"
      add_to_allowlist: "Add the image to docker.image_allowlist in preflight.yml"
    selected_hints: [add_to_allowlist]

  config_vars_in_template:
    enabled: true
    description: "All vars referenced in config files are declared in .env.template"
    error: "Var referenced in {file} not found in .env.template: {var}"
    hints:
      add_to_template: "Add the var to .env.template"
    selected_hints: [add_to_template]

  config_extends_valid:
    enabled: false
    description: "Config file extends references point to existing files"
    error: "{file} extends '{extends}' which does not exist"
    hints:
      fix_extends: "Create the referenced config file or correct the extends path"
    selected_hints: [fix_extends]

  pnpm_checks:
    enabled: true
    description: "pnpm quality checks pass"
    error: "pnpm check failed"
    hints:
      run_locally: "Run the failing check locally to see the full output: pnpm <check>"
    selected_hints: [run_locally]

  maven_checks:
    enabled: false
    description: "Maven project compiles successfully"
    error: "Maven compile failed"
    hints:
      run_locally: "Run: mvn compile to see the full error output"
    selected_hints: [run_locally]

  gradle_checks:
    enabled: false
    description: "Gradle project tests pass"
    error: "Gradle test failed"
    hints:
      run_locally: "Run: ./gradlew test --no-daemon to see the full error output"
    selected_hints: [run_locally]

  command_checks:
    enabled: false
    description: "Command checks pass"
    error: "Command check failed: {label}"
    hints:
      run_locally: "Run the failing command locally to see full output"
    selected_hints: [run_locally]

  preflight_config_valid:
    enabled: true
    description: "bumfuzzle.yml config is valid"
    error: "{issue}"
    hints:
      set_project_name: "Set project.name in bumfuzzle.yml"
      fix_selected_hints: "Remove the invalid key from selected_hints, or add it to the rule's hints in settings.yml"
      fix_enabled_type: "Set enabled to a boolean: enabled: true (not quoted)"
      fix_list_type: "Set the field to a YAML list: field: [item1, item2]"
      fix_severity: "Set severity to one of: skip, warn, error, hard-stop"
    selected_hints: [set_project_name, fix_selected_hints, fix_enabled_type, fix_list_type, fix_severity]

scaffold:
  git:
    init: true
    hooks: true
  editor:
    vscode: true
    claude: true
  steps:
    git_init: true
    githooks: true
    directories: true
    gitignore: true
    env_files: true
    bumfuzzle_yml: true
    rules: true
    vscode_settings: true
    claude_settings: true
    dependencies: true
    docker_compose: true
    readme: true

artifacts:
  docs:          { path: docs,                     type: dir,     enabled: false }
  tmp:           { path: tmp,                      type: dir,     enabled: false }
  backup:        { path: backup,                   type: dir,     enabled: false }
  scripts:       { path: scripts,                  type: dir,     enabled: false }
  services:      { path: services,                 type: dir,     enabled: false }
  config_dir:    { path: config,                   type: dir,     enabled: false }
  src:           { path: src,                      type: dir,     enabled: false }
  public:        { path: public,                   type: dir,     enabled: false }
  session:       { path: .session,                 type: dir,     enabled: false }
  migrations:    { path: migrations,               type: dir,     enabled: false }
  tests:         { path: tests,                    type: dir,     enabled: false }
  tests_fixtures: { path: tests/fixtures,          type: dir,     enabled: false }
  infra:          { path: infra,            type: dir,     enabled: false }
  infra_docker:   { path: infra/docker,     type: dir,     enabled: false }
  infra_k8s:      { path: infra/k8s,        type: dir,     enabled: false }
  infra_terraform: { path: infra/terraform, type: dir,     enabled: false }
  infra_ansible:   { path: infra/ansible,   type: dir,     enabled: false }
  github:                { path: .github,                           type: dir, enabled: false }
  github_workflows:      { path: .github/workflows,                type: dir, enabled: false }
  github_pr_template:    { path: .github/PULL_REQUEST_TEMPLATE,    type: dir, enabled: false }
  github_issue_template: { path: .github/ISSUE_TEMPLATE,           type: dir, enabled: false }
  gitlab:                { path: .gitlab,                           type: dir, enabled: false }
  gitlab_ci:             { path: .gitlab/ci,                       type: dir, enabled: false }
  gitlab_mr_template:    { path: .gitlab/merge_request_templates,  type: dir, enabled: false }
  gitlab_issue_template: { path: .gitlab/issue_templates,          type: dir, enabled: false }
  bin:           { path: bin,                      type: dir,     enabled: false }
  logs:          { path: logs,                     type: dir,     enabled: false }
  claude_dir:    { path: .claude,                  type: dir,     enabled: false }
  gitignore:     { path: .gitignore,               type: file,    enabled: false }
  readme:        { path: README.md,                type: file,    enabled: false }
  bumfuzzle:     { path: bumfuzzle.yml,            type: file,    enabled: false }
  env_template:  { path: .env.template,            type: file,    enabled: false }
  hooks:         { path: scripts/hooks.sh,          type: file,    enabled: false }
  agents_md:     { path: AGENTS.md,                type: file,    enabled: false }
  claude_md:     { path: CLAUDE.md,                type: file,    enabled: false }
  skill_md:      { path: SKILL.md,                 type: file,    enabled: false }
  vscode_settings: { path: .vscode/settings.json,  type: file,    enabled: false }
  claude_settings: { path: .claude/settings.json,  type: file,    enabled: false }
  env_file:
    path: .env.{{VALUE}}
    type: pattern
    foreach: environments.values
    enabled: false
  docker_compose:
    path: docker-compose.{{VALUE}}.yml
    type: pattern
    foreach: stacks.values
    enabled: false
  config_stack:
    path: config.{{VALUE}}.yml
    type: pattern
    foreach: stacks.values
    enabled: false
  config_shared: { path: config.shared.yml, type: file, enabled: false }

gitignore:
  fragments:
    macos:
      - "**/.DS_Store"
      - ".DS_Store"
    editors:
      - ".idea/"
      - "*.swp"
      - "*.orig"
      - "*.iml"
    tmp:
      - "tmp/"
      - "backup/"
      - "logs/"
      - ".session/"
      - "docs/"
    secrets:
      - ".env.*"
      - "!.env.template"
    claude:
      - ".claude/"
      - ".claude/settings.json"
      - ".claude/settings.local.json"
      - "CLAUDE.md"
      - "AGENTS.md"
    node:
      - "node_modules/"
      - "dist/"
      - ".next/"
      - ".turbo/"
      - ".parcel-cache/"
    java:
      - "target/"
      - "*.class"
      - "*.jar"
      - ".gradle/"
      - "build/"
    python:
      - "__pycache__/"
      - "*.pyc"
      - "*.pyo"
      - ".venv/"
      - "dist/"
      - "*.egg-info/"
    rust:
      - "target/"
      - "Cargo.lock"
    go:
      - "vendor/"
      - "dist/"
      - "build/"
    php:
      - "vendor/"
    bin:
      - "bin/"
    docker:
      - ".docker/"
      - "*.log"
  defaults:
    common:
      - macos
      - editors
      - tmp
      - secrets
      - claude
  exclude_fragments: []
  extra_fragments: []
  extra_patterns: []

docker:
  config_exempt_stacks: []

project:
  name: ""

preflight:
  valid_severities: [skip, warn, error, hard-stop]

tools:
  git:
    label: "Git"
    enabled: true
    locks: [git_init]
    modules:
      gitignore:  { label: "Gitignore",   enabled: true,  locks: [gitignore] }
      hooks:      { label: "Hooks",       enabled: true,  locks: [githooks, hooks] }
      submodules:
        label: "Submodules"
        enabled: false
        locks: []
        modules:
          sparse:    { label: "Sparse checkout", enabled: false, locks: [] }
          recursive: { label: "Recursive init",  enabled: false, locks: [] }
      subtrees:   { label: "Subtrees",    enabled: false, locks: [] }
      worktrees:  { label: "Worktrees",   enabled: false, locks: [] }
      reflog:     { label: "Reflog",      enabled: false, locks: [] }
      lfs:
        label: "LFS"
        enabled: false
        locks: []
        modules:
          tracking: { label: "Tracking rules", enabled: false, locks: [lfs_tracking] }
          pointer:  { label: "Pointer files",  enabled: false, locks: [] }
  github:
    label: "GitHub"
    enabled: false
    locks: [github]
    modules:
      workflows:       { label: "CI Workflows",    enabled: false, locks: [github_workflows] }
      pr_templates:    { label: "PR Templates",    enabled: false, locks: [github_pr_template] }
      issue_templates: { label: "Issue Templates", enabled: false, locks: [github_issue_template] }
  gitlab:
    label: "GitLab"
    enabled: false
    locks: [gitlab]
    modules:
      ci:              { label: "CI Pipelines",    enabled: false, locks: [gitlab_ci] }
      mr_templates:    { label: "MR Templates",    enabled: false, locks: [gitlab_mr_template] }
      issue_templates: { label: "Issue Templates", enabled: false, locks: [gitlab_issue_template] }
  docker:
    label: "Docker"
    enabled: false
    locks: [docker_compose]
    modules:
      volume:     { label: "Volume",      enabled: false, locks: [] }
      mount:      { label: "Mount",       enabled: false, locks: [] }
      networking:
        label: "Networking"
        enabled: false
        locks: []
        modules:
          overlay: { label: "Overlay driver", enabled: false, locks: [compose_network] }
          bridge:  { label: "Bridge driver",  enabled: false, locks: [] }
      registry:
        label: "Registry"
        enabled: false
        locks: [registry_config]
        modules:
          mirror: { label: "Mirror",         enabled: true,  locks: [] }
          auth:   { label: "Authentication", enabled: false, locks: [registry_auth] }
      swarm:      { label: "Swarm",       enabled: false, locks: [] }
  vscode:    { label: "VS Code",    enabled: true,  locks: [vscode_settings] }
  claude:    { label: "Claude AI",  enabled: false, locks: [claude_md, claude_dir, claude_settings] }
  terraform: { label: "Terraform",  enabled: false, locks: [] }
  k8s:       { label: "Kubernetes", enabled: false, locks: [] }
  ansible:   { label: "Ansible",    enabled: false, locks: [] }

extra_dirs: []

rules: []

defaults:
  environments:
    - local
    - test
    - prod

bumfuzzle:
  directories:
    - { label: ".git/",           kind: step,     key: git_init,       bumfuzzle_default: true,  required: true }
    - { label: ".githooks/",      kind: step,     key: githooks,       bumfuzzle_default: true  }
    - { label: ".claude/",        kind: artifact, key: claude_dir,     bumfuzzle_default: false }
    - { label: "docs/",           kind: artifact, key: docs,           bumfuzzle_default: true  }
    - { label: "tmp/",            kind: artifact, key: tmp,            bumfuzzle_default: true  }
    - { label: "backup/",         kind: artifact, key: backup,         bumfuzzle_default: true  }
    - { label: "scripts/",        kind: artifact, key: scripts,        bumfuzzle_default: true  }
    - { label: "src/",            kind: artifact, key: src,            bumfuzzle_default: false }
    - { label: "public/",         kind: artifact, key: public,         bumfuzzle_default: false }
    - { label: "services/",       kind: artifact, key: services,       bumfuzzle_default: false }
    - { label: "config/",         kind: artifact, key: config_dir,     bumfuzzle_default: false }
    - { label: ".session/",       kind: artifact, key: session,        bumfuzzle_default: false }
    - { label: "migrations/",     kind: artifact, key: migrations,     bumfuzzle_default: false }
    - { label: "tests/",          kind: artifact, key: tests,          bumfuzzle_default: false }
    - { label: "tests/fixtures/", kind: artifact, key: tests_fixtures, bumfuzzle_default: false }
    - { label: "infra/",           kind: artifact, key: infra,           bumfuzzle_default: false }
    - { label: "infra/docker/",   kind: artifact, key: infra_docker,    bumfuzzle_default: false }
    - { label: "infra/k8s/",      kind: artifact, key: infra_k8s,       bumfuzzle_default: false }
    - { label: "infra/terraform/", kind: artifact, key: infra_terraform, bumfuzzle_default: false }
    - { label: "infra/ansible/",   kind: artifact, key: infra_ansible,   bumfuzzle_default: false }
    - { label: ".github/",                      kind: artifact, key: github,                bumfuzzle_default: false }
    - { label: ".github/workflows/",            kind: artifact, key: github_workflows,      bumfuzzle_default: false }
    - { label: ".github/PULL_REQUEST_TEMPLATE/", kind: artifact, key: github_pr_template,   bumfuzzle_default: false }
    - { label: ".github/ISSUE_TEMPLATE/",       kind: artifact, key: github_issue_template, bumfuzzle_default: false }
    - { label: ".gitlab/",                      kind: artifact, key: gitlab,                bumfuzzle_default: false }
    - { label: ".gitlab/ci/",                   kind: artifact, key: gitlab_ci,             bumfuzzle_default: false }
    - { label: ".gitlab/merge_request_templates/", kind: artifact, key: gitlab_mr_template,    bumfuzzle_default: false }
    - { label: ".gitlab/issue_templates/",      kind: artifact, key: gitlab_issue_template, bumfuzzle_default: false }
    - { label: "bin/",  kind: artifact, key: bin,  bumfuzzle_default: false }
    - { label: "logs/", kind: artifact, key: logs, bumfuzzle_default: false }
  files:
    - { label: ".gitignore",                kind: artifact, key: gitignore,      bumfuzzle_default: true  }
    - { label: ".env.template",             kind: artifact, key: env_template,   bumfuzzle_default: true  }
    - { label: ".env.{{VALUE}}",            kind: artifact, key: env_file,       bumfuzzle_default: true,  foreach: environments.values }
    - { label: "README.md",                 kind: artifact, key: readme,         bumfuzzle_default: true  }
    - { label: "bumfuzzle.yml",             kind: artifact, key: bumfuzzle,      bumfuzzle_default: true  }
    - { label: "scripts/hooks.sh",          kind: artifact, key: hooks,          bumfuzzle_default: true  }
    - { label: "docker-compose.{{VALUE}}.yml", kind: artifact, key: docker_compose, bumfuzzle_default: false, foreach: stacks.values }
    - { label: "config.{{VALUE}}.yml",      kind: artifact, key: config_stack,   bumfuzzle_default: false, foreach: stacks.values }
    - { label: "config.shared.yml",         kind: artifact, key: config_shared,  bumfuzzle_default: false }
    - { label: "AGENTS.md",                 kind: artifact, key: agents_md,      bumfuzzle_default: false }
    - { label: "CLAUDE.md",                 kind: artifact, key: claude_md,      bumfuzzle_default: false }
    - { label: "SKILL.md",                  kind: artifact, key: skill_md,       bumfuzzle_default: false }
    - { label: ".vscode/settings.json",    kind: artifact, key: vscode_settings, bumfuzzle_default: true  }
    - { label: ".claude/settings.json",    kind: artifact, key: claude_settings, bumfuzzle_default: false }
  questions:
    - key: name
      prompt: "Project name (blank = directory name)"
      default: ""

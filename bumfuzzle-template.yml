  - group: "Key-value file actions"
    scripts:
      - id: yaml-no-empty-values
        name: "YAML no empty values"
        description: "Checks that no key in files matching FILE_PATH (glob-capable) resolves to an empty string or null. Every matched file must pass; FAIL_ON_FILE_NOT_FOUND controls whether no matches is a failure or a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _any=false
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            _any=true
            while IFS= read -r _p; do
              [[ -z "$_p" ]] && continue
              printf '%s has empty value at %s\n' "$_f" "$_p"
              _failed=true
            done < <(yq '.. | select(tag == "!!null" or (tag == "!!str" and . == "")) | path | join(".")' "$_f" 2>/dev/null | grep -v '^$')
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "$_any" == "false" ]]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no file matched %s\n' "$FILE_PATH"
              exit 1
            else
              exit 0
            fi
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: YAML file path or glob
            required: true
            type: path
            placeholder: config.yml
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no file matches FILE_PATH
            type: bool
            required: true
            description: true = no file matching FILE_PATH is a failure; false = no file matching FILE_PATH is a pass
      - id: yaml-no-duplicate-keys
        name: "YAML no duplicate keys"
        description: "Checks that no mapping in files matching FILE_PATH (glob-capable) declares the same key twice — YAML parsers silently keep only one. Indentation-based heuristic: block scalars and list items are handled; flow style and quoted keys are not inspected."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _any=false
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            _any=true
            _dups=$(awk '
              /^[ \t]*#/ { next }
              /^[ \t]*$/ { next }
              skip == 1 {
                n = match($0, /[^ ]/)
                if (n == 0 || n - 1 > skip_ind) next
                skip = 0
              }
              {
                n = match($0, /[^ ]/); ind = n - 1
              }
              /^ *- / {
                for (d in cur) if (d + 0 >= ind) delete cur[d]
                last = ind
                next
              }
              {
                if (match($0, /^ *[A-Za-z0-9_.$-]+ *:/) == 0) next
                key = $0
                sub(/^ */, "", key)
                sub(/ *:.*$/, "", key)
                if (!(ind in cur) || last < ind) { bid++; cur[ind] = bid }
                for (d in cur) if (d + 0 > ind) delete cur[d]
                k = cur[ind] SUBSEP key
                if (k in seen) printf "line %d: duplicate key %s\n", NR, key
                seen[k] = 1
                last = ind
                if ($0 ~ /: *[|>][+-]?[0-9]* *$/) { skip = 1; skip_ind = ind }
              }
            ' "$_f")
            if [[ -n "$_dups" ]]; then
              while IFS= read -r _l; do
                printf '%s %s\n' "$_f" "$_l"
              done <<< "$_dups"
              _failed=true
            fi
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "$_any" == "false" ]]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no file matched %s\n' "$FILE_PATH"
              exit 1
            else
              exit 0
            fi
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: YAML file path or glob
            required: true
            type: path
            placeholder: config.yml
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no file matches FILE_PATH
            type: bool
            required: true
            description: true = no file matching FILE_PATH is a failure; false = no file matching FILE_PATH is a pass
      - id: json-path-value

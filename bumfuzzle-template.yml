      - id: files-content-scan
        name: "Files content scan"
        description: "Greps every file matching INCLUDE_FILES_GLOB (basename globs; accepts a YAML list) under SEARCH_ROOT for one or more ERE REGEX_PATTERN (accepts a YAML list). FAIL_ON_NO_MATCHING_FILE: true passes when any pattern matches anywhere; false fails listing every offending file per pattern. .git, node_modules, .claude and .bumfuzzle are always skipped; EXCLUDE_FILES_GLOB (accepts a YAML list) skips more."
        command: |
          _from="${SEARCH_ROOT:-.}"
          [[ "$_from" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          set -f
          _inc_args=""
          _find_inc_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _inc_args="$_inc_args --include=$_g"
            _find_inc_args="${_find_inc_args:+$_find_inc_args -o }-name $_g"
          done <<< "${INCLUDE_FILES_GLOB:-*}"
          _ex_args="--exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.claude --exclude-dir=.bumfuzzle"
          _find_ex_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args --exclude=$_g"
            _find_ex_args="$_find_ex_args -not -name $_g"
          done <<< "${EXCLUDE_FILES_GLOB:-}"
          _any=$(find "$_from" \( -name .git -o -name node_modules -o -name .claude -o -name .bumfuzzle \) -prune -o \( $_find_inc_args \) $_find_ex_args -type f -print 2>/dev/null | head -1)
          if [[ -z "$_any" ]]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no file matched %s under %s\n' "${INCLUDE_FILES_GLOB:-*}" "$_from"
              exit 1
            else
              exit 0
            fi
          fi
          _found=false
          _failed=false
          while IFS= read -r _pat; do
            [[ -z "$_pat" ]] && continue
            _hits=$(grep -rlE $_inc_args $_ex_args -e "$_pat" "$_from" 2>/dev/null || true)
            if [[ -n "$_hits" ]]; then
              _found=true
              if [[ "${FAIL_ON_NO_MATCHING_FILE:-true}" == "false" ]]; then
                while IFS= read -r _h; do
                  printf '%s matches forbidden pattern %s\n' "$_h" "$_pat"
                done <<< "$_hits"
                _failed=true
              fi
            fi
          done <<< "$REGEX_PATTERN"
          set +f
          if [[ "${FAIL_ON_NO_MATCHING_FILE:-true}" == "true" ]]; then
            [[ "$_found" == "true" ]] || { printf 'missing: no file matched any required pattern\n'; exit 1; }
          else
            [[ "$_failed" == "false" ]]
          fi
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: INCLUDE_FILES_GLOB
            label: Include files glob
            required: true
            type: glob
            list: true
            placeholder: '*.java'
            description: Glob pattern matched against file basenames to include (e.g. *.java, *Controller*). Provide a YAML list to match multiple globs.
          - key: EXCLUDE_FILES_GLOB
            label: Exclude files glob
            required: false
            type: glob
            list: true
            placeholder: '*Test.java'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
          - key: REGEX_PATTERN
            label: Patterns (regex)
            required: true
            type: regex
            list: true
            placeholder: TODO|FIXME
            description: ERE patterns grepped against file contents. Provide a YAML list for multiple; entries may contain spaces.
          - key: FAIL_ON_NO_MATCHING_FILE
            label: Fail when no file matches any pattern
            type: bool
            required: false
            default: true
            description: true = fail when no file matches any required pattern; false = fail listing every offending file that matches a forbidden pattern
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no file matches INCLUDE_FILES_GLOB
            type: bool
            required: true
            description: true = no file matching INCLUDE_FILES_GLOB under SEARCH_ROOT is a failure; false = it's a pass
      - id: git-diff-content-scan
        name: "Git diff content scan"
        description: "Greps every file in the staged git diff (added, copied, modified or renamed, deletions skipped) for one or more ERE REGEX_PATTERN (accepts a YAML list). Fails listing every offending file and line. No staged changes is a pass, since there is nothing to check."
        command: |
          _files=$(git diff --cached --name-only --diff-filter=ACMR 2>/dev/null)
          [ -z "$_files" ] && exit 0
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" || ! -f "$_f" ]] && continue
            while IFS= read -r _pat; do
              [[ -z "$_pat" ]] && continue
              grep -nHE "$_pat" "$_f" 2>/dev/null && _failed=true
            done <<< "$REGEX_PATTERN"
          done <<< "$_files"
          [[ "$_failed" == "false" ]]
        args:
          - key: REGEX_PATTERN
            label: Patterns (regex)
            required: true
            type: regex
            list: true
            placeholder: '<<<<<<<'
            description: ERE patterns grepped against each staged file's content. Provide a YAML list for multiple; entries may contain spaces.
      - id: config-keys-used
        name: "Config keys used"
        description: "Checks that every top-level key in a YAML config file is referenced somewhere in the codebase (word-boundary fixed-string grep). The config file itself, .bumfuzzle, lockfiles, .git, node_modules and .claude are skipped; EXCLUDE_FILES_GLOB (accepts a YAML list) skips more. The 'extends' key is ignored. FAIL_ON_FILE_NOT_FOUND controls whether a missing config file is a failure or a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          if [ ! -f "$FILE_PATH" ]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: %s not found\n' "$FILE_PATH"
              exit 1
            else
              exit 0
            fi
          fi
          _self=$(basename "$FILE_PATH")
          set -f
          _ex_args="--exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.claude --exclude-dir=.bumfuzzle --exclude=$_self --exclude=*.lock"
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args --exclude=$_g"
          done <<< "${EXCLUDE_FILES_GLOB:-}"
          _failed=false
          while IFS= read -r _k; do
            [[ -z "$_k" || "$_k" == "extends" ]] && continue
            grep -rqwF $_ex_args -e "$_k" . 2>/dev/null || { printf 'config key %s is not referenced anywhere in the codebase\n' "$_k"; _failed=true; }
          done < <(yq 'keys | .[]' "$FILE_PATH" 2>/dev/null)
          set +f
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: Config file path
            required: true
            type: path
            placeholder: config.yml
          - key: EXCLUDE_FILES_GLOB
            label: Exclude files glob
            required: false
            type: glob
            list: true
            placeholder: '*Test.java'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when config file not found
            type: bool
            required: true
            description: true = a missing FILE_PATH is a failure; false = it's a pass
      - id: run-tool-over-matched-files
        name: "Run tool over matched files"
        description: "Finds files matching INCLUDE_FILES_GLOB under SEARCH_ROOT, skipping .git, node_modules, .claude and .bumfuzzle, and runs TOOL_COMMAND against the list. FAIL_ON_FILE_NOT_FOUND controls whether no matching files is a failure or a pass."
        command: |
          _from="${SEARCH_ROOT:-.}"
          [[ "$_from" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          _files=$(find "$_from" \( -name .git -o -name node_modules -o -name .claude -o -name .bumfuzzle \) -prune -o -name "$INCLUDE_FILES_GLOB" -type f -print 2>/dev/null)
          if [ -z "$_files" ]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no file matched %s under %s\n' "$INCLUDE_FILES_GLOB" "$_from"
              exit 1
            else
              exit 0
            fi
          fi
          $TOOL_COMMAND $_files
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: INCLUDE_FILES_GLOB
            label: "Include files glob"
            required: true
            type: glob
            placeholder: '*.md'
            description: "Glob pattern matched against file basenames to include."
          - key: TOOL_COMMAND
            label: "Tool command"
            required: true
            type: string
            placeholder: "proselint"
            description: "The command to run against the matched file list, e.g. proselint or sqlfluff lint --dialect ansi"
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no file matches INCLUDE_FILES_GLOB
            type: bool
            required: true
            description: true = no file matching INCLUDE_FILES_GLOB under SEARCH_ROOT is a failure; false = it's a pass
      - id: file-location-restriction
        name: "File location restriction"
        description: "Checks that every file whose basename matches INCLUDE_FILES_GLOB (accepts a YAML list, minus EXCLUDE_FILES_GLOB) lives under FILE_LOCATION_ALLOWED_DIR — a match found anywhere else fails. Searches under SEARCH_ROOT up to SEARCH_DEPTH levels deep; .git, node_modules, .venv and .claude are always skipped."
        command: |
          _from="${SEARCH_ROOT:-.}"
          [[ "$_from" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          [[ -z "${FILE_LOCATION_ALLOWED_DIR:-}" ]] && { printf 'FILE_LOCATION_ALLOWED_DIR is required\n'; exit 1; }
          [[ "$FILE_LOCATION_ALLOWED_DIR" =~ \.\. ]] && { printf 'FILE_LOCATION_ALLOWED_DIR must not contain ..\n'; exit 1; }
          _allowed="${FILE_LOCATION_ALLOWED_DIR%/}"
          _depth_arg=""
          if [[ -n "${SEARCH_DEPTH:-}" && "$SEARCH_DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $SEARCH_DEPTH"
          fi
          _inc_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _inc_args="${_inc_args:+$_inc_args -o }-name $_g"
          done <<< "${INCLUDE_FILES_GLOB:-}"
          [[ -z "$_inc_args" ]] && { printf 'INCLUDE_FILES_GLOB is required\n'; exit 1; }
          _ex_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args -not -name $_g"
          done <<< "${EXCLUDE_FILES_GLOB:-}"
          _any=false
          _failed=false
          set -f
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            _any=true
            _rel="${_f#./}"
            case "$_rel" in
              "$_allowed"/*) ;;
              *) printf '%s is outside %s/\n' "$_rel" "$_allowed"; _failed=true ;;
            esac
          done < <(find "$_from" $_depth_arg \( -name .git -o -name node_modules -o -name .venv -o -name .claude \) -prune -o \( $_inc_args \) $_ex_args -type f -print 2>/dev/null)
          set +f
          if [[ "$_any" == "false" ]]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no file matched %s under %s\n' "${INCLUDE_FILES_GLOB:-}" "$_from"
              exit 1
            else
              exit 0
            fi
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: SEARCH_DEPTH
            label: "Max depth"
            type: int
            required: false
            placeholder: "1"
            description: "Maximum directory depth to search. 1 = files directly inside SEARCH_ROOT. Omit for unlimited depth."
          - key: INCLUDE_FILES_GLOB
            label: Include files glob
            required: true
            type: glob
            list: true
            placeholder: '*.java'
            description: Glob pattern matched against file basenames to include (e.g. *.java, *Controller*). Provide a YAML list to match multiple globs.
          - key: EXCLUDE_FILES_GLOB
            label: Exclude files glob
            required: false
            type: glob
            list: true
            placeholder: '*Test.java'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
          - key: FILE_LOCATION_ALLOWED_DIR
            label: "Allowed directory"
            type: path
            required: true
            placeholder: "scripts"
            description: "Directory, relative to the project root, that every matching file must live under. A match found anywhere else fails."
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no file matches INCLUDE_FILES_GLOB
            type: bool
            required: true
            description: true = no file matching INCLUDE_FILES_GLOB under SEARCH_ROOT is a failure; false = it's a pass
  - group: "Claude Settings"
    scripts:
      - id: permission-mode
        name: "Permission mode"
        description: "Checks that permissions.defaultMode in the selected Claude settings file (default .claude/settings.json) matches the expected value"
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          jq -e --arg m "$CLAUDE_PERMISSION_MODE" '.permissions.defaultMode == $m' "$_f" > /dev/null
        args:
          - key: CLAUDE_PERMISSION_MODE
            label: "Expected permission mode"
            type: enum
            required: true
            enum_ref: claude-permission-mode
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
      - id: permission-entry
        name: "Permission entry"
        description: "Checks that the selected Claude settings file (default .claude/settings.json) contains a specific deny/allow/ask entry for a given tool and optional pattern"
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          _entry="$CLAUDE_PERMISSION_TOOL"
          [ -n "${CLAUDE_PERMISSION_PATTERN:-}" ] && _entry="${CLAUDE_PERMISSION_TOOL}(${CLAUDE_PERMISSION_PATTERN})"
          jq -e --arg r "$CLAUDE_PERMISSION_RULE" --arg e "$_entry" '(.permissions[$r] // []) | index($e) != null' "$_f" > /dev/null
        args:
          - key: CLAUDE_PERMISSION_RULE
            label: "Rule type"
            type: enum
            required: true
            enum_ref: claude-rule
          - key: CLAUDE_PERMISSION_TOOL
            label: "Claude tool"
            type: enum
            required: true
            enum_ref: claude-tool
          - key: CLAUDE_PERMISSION_PATTERN
            label: "Pattern (optional)"
            type: string
            required: false
            placeholder: "curl *"
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
      - id: claude-setting-value
        name: "Claude setting value"
        description: "Checks that a settings.json key (dot-separated path, picked from the curated catalog of project-enforceable Claude Code settings) equals CLAUDE_SETTING_VALUE (JSON-encoded, e.g. \"sonnet\", 30, true) in the selected settings file. Set FAIL_ON_VALUE_MISMATCH: false to forbid the value instead."
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          [[ "$CLAUDE_SETTING_KEY" =~ ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*$ ]] || { printf 'CLAUDE_SETTING_KEY contains invalid characters\n'; exit 1; }
          jq empty <<<"$CLAUDE_SETTING_VALUE" > /dev/null 2>&1 || { printf 'CLAUDE_SETTING_VALUE is not valid JSON (strings need quotes, e.g. "foo")\n'; exit 1; }
          _ok=false
          jq -e --argjson v "$CLAUDE_SETTING_VALUE" ".${CLAUDE_SETTING_KEY} == \$v" "$_f" > /dev/null 2>&1 && _ok=true
          if [[ "${FAIL_ON_VALUE_MISMATCH:-true}" == "true" ]]; then
            [[ "$_ok" == "true" ]] || { printf '%s is not %s in %s\n' "$CLAUDE_SETTING_KEY" "$CLAUDE_SETTING_VALUE" "$_f"; exit 1; }
          else
            [[ "$_ok" == "false" ]] || { printf '%s is set to forbidden value %s in %s\n' "$CLAUDE_SETTING_KEY" "$CLAUDE_SETTING_VALUE" "$_f"; exit 1; }
          fi
        args:
          - key: CLAUDE_SETTING_KEY
            label: "Setting"
            type: enum
            required: true
            enum_ref: claude-setting-key
          - key: CLAUDE_SETTING_VALUE
            label: "Expected value (JSON-encoded)"
            type: string
            required: true
            placeholder: "true"
          - key: FAIL_ON_VALUE_MISMATCH
            label: Fail on value mismatch
            type: bool
            required: false
            default: true
            description: true = fail when the setting does not equal CLAUDE_SETTING_VALUE; false = fail when it does (forbidden)
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
      - id: claude-model
        name: "Claude model"
        description: "Checks that the model key in the selected Claude settings file is pinned to the expected model alias"
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          jq -e --arg m "$CLAUDE_MODEL" '.model == $m' "$_f" > /dev/null || { printf 'model is not %s in %s\n' "$CLAUDE_MODEL" "$_f"; exit 1; }
        args:
          - key: CLAUDE_MODEL
            label: "Expected model"
            type: enum
            required: true
            enum_ref: claude-model
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
      - id: claude-env-var
        name: "Claude env var"
        description: "Checks that the env map in the selected Claude settings file declares CLAUDE_ENV_KEY with exactly CLAUDE_ENV_VALUE — these variables are injected into every command and hook Claude runs"
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          [[ "$CLAUDE_ENV_KEY" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]] || { printf 'CLAUDE_ENV_KEY contains invalid characters\n'; exit 1; }
          jq -e --arg k "$CLAUDE_ENV_KEY" --arg v "$CLAUDE_ENV_VALUE" '.env[$k] == $v' "$_f" > /dev/null || { printf 'env.%s is not "%s" in %s\n' "$CLAUDE_ENV_KEY" "$CLAUDE_ENV_VALUE" "$_f"; exit 1; }
        args:
          - key: CLAUDE_ENV_KEY
            label: "Variable name"
            type: string
            required: true
            placeholder: "NODE_ENV"
          - key: CLAUDE_ENV_VALUE
            label: "Expected value"
            type: string
            required: true
            placeholder: "development"
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
      - id: claude-hook-command
        name: "Claude hook command"
        description: "Checks that some command hook registered for CLAUDE_HOOK_EVENT in the selected Claude settings file matches CLAUDE_HOOK_PATTERN (regex). Uses the current nested hooks format: hooks.<Event>[].hooks[].command. Set FAIL_ON_HOOK_MISMATCH: false to forbid matching hooks instead."
        command: |
          _f="${CLAUDE_SETTINGS_FILE:-.claude/settings.json}"
          [ ! -f "$_f" ] && { printf 'missing: %s\n' "$_f"; exit 1; }
          _found=false
          jq -e --arg ev "$CLAUDE_HOOK_EVENT" --arg p "$CLAUDE_HOOK_PATTERN" \
            '[.hooks[$ev] // [] | .[] | (.hooks // [])[] | select(.type == "command") | .command // ""] | map(test($p)) | any' \
            "$_f" > /dev/null 2>&1 && _found=true
          if [[ "${FAIL_ON_HOOK_MISMATCH:-true}" == "true" ]]; then
            [[ "$_found" == "true" ]] || { printf 'missing: no %s hook command matches %s in %s\n' "$CLAUDE_HOOK_EVENT" "$CLAUDE_HOOK_PATTERN" "$_f"; exit 1; }
          else
            [[ "$_found" == "false" ]] || { printf 'a %s hook command matches forbidden pattern %s in %s\n' "$CLAUDE_HOOK_EVENT" "$CLAUDE_HOOK_PATTERN" "$_f"; exit 1; }
          fi
        args:
          - key: CLAUDE_HOOK_EVENT
            label: "Hook event"
            type: enum
            required: true
            enum_ref: claude-hook-event
          - key: CLAUDE_HOOK_PATTERN
            label: "Command pattern (regex)"
            type: regex
            required: true
            placeholder: "git pull"
          - key: FAIL_ON_HOOK_MISMATCH
            label: Fail when no hook matches
            type: bool
            required: false
            default: true
            description: true = fail when no registered hook command matches CLAUDE_HOOK_PATTERN; false = fail when one does (forbidden)
          - key: CLAUDE_SETTINGS_FILE
            label: Settings file
            required: false
            type: enum
            enum_ref: claude-settings-file
            description: Which Claude Code settings file to check. Defaults to .claude/settings.json (shared) when omitted.
  - group: "Package Manager Checks"
    scripts:
      - id: package-script-clean
        name: "Run package.json custom script"
        description: "Runs a named script from package.json via the selected package manager and requires it to exit cleanly. Delegates to whatever that script actually does, so the check stays in sync with the project's own definition instead of reimplementing the tool invocation (and its PATH resolution) here."
        command: |
          case "$PACKAGE_MANAGER" in
            npm|pnpm|yarn) ;;
            *) printf 'Unsupported PACKAGE_MANAGER: %s\n' "$PACKAGE_MANAGER"; exit 1 ;;
          esac
          [[ "$SCRIPT_NAME" =~ ^[A-Za-z0-9_:-]+$ ]] || { printf 'SCRIPT_NAME contains invalid characters\n'; exit 1; }
          [ -f package.json ] || { printf 'package.json not found\n'; exit 1; }
          jq -e --arg s "$SCRIPT_NAME" '.scripts[$s] != null' package.json > /dev/null 2>&1 \
            || { printf 'package.json has no "%s" script\n' "$SCRIPT_NAME"; exit 1; }
          "$PACKAGE_MANAGER" run "$SCRIPT_NAME"
        args:
          - key: PACKAGE_MANAGER
            label: Package manager
            required: true
            type: enum
            enum_ref: package-manager
          - key: SCRIPT_NAME
            label: Script name
            required: true
            type: string
            placeholder: lint
            description: "Name of the script in package.json's scripts block to run"
      - id: lockfile-in-sync
        name: "Lockfile matches package.json"
        description: "Confirms the selected package manager's lockfile is in sync with package.json, without installing into or writing to the project's working tree."
        command: |
          case "$PACKAGE_MANAGER" in
            npm|pnpm|yarn) ;;
            *) printf 'Unsupported PACKAGE_MANAGER: %s\n' "$PACKAGE_MANAGER"; exit 1 ;;
          esac
          case "$PACKAGE_MANAGER" in
            npm) _lockfile=package-lock.json ;;
            pnpm) _lockfile=pnpm-lock.yaml ;;
            yarn) _lockfile=yarn.lock ;;
          esac
          [ -f package.json ] || { printf 'package.json not found\n'; exit 1; }
          _tmp=$(mktemp -d)
          cp package.json "$_tmp"/
          [ -f "$_lockfile" ] && cp "$_lockfile" "$_tmp"/
          [ -f .npmrc ] && cp .npmrc "$_tmp"/
          [ -f .yarnrc.yml ] && cp .yarnrc.yml "$_tmp"/
          _ec=0
          case "$PACKAGE_MANAGER" in
            npm) (cd "$_tmp" && npm ci --ignore-scripts --no-audit --no-fund) > /dev/null 2>&1 || _ec=1 ;;
            pnpm) (cd "$_tmp" && pnpm install --frozen-lockfile --lockfile-only --ignore-scripts) > /dev/null 2>&1 || _ec=1 ;;
            yarn) (cd "$_tmp" && yarn install --frozen-lockfile --ignore-scripts) > /dev/null 2>&1 || _ec=1 ;;
          esac
          rm -rf "$_tmp"
          [ "$_ec" -eq 0 ] || printf '%s is missing or out of sync with package.json\n' "$_lockfile"
          exit $_ec
        args:
          - key: PACKAGE_MANAGER
            label: Package manager
            required: true
            type: enum
            enum_ref: package-manager
      - id: package-manager-install-write
        name: "Package manager install (writes to working tree)"
        description: "Runs the selected package manager's install command directly in the project, allowed to write to node_modules and update the lockfile."
        command: |
          case "$PACKAGE_MANAGER" in
            npm|pnpm|yarn) ;;
            *) printf 'Unsupported PACKAGE_MANAGER: %s\n' "$PACKAGE_MANAGER"; exit 1 ;;
          esac
          [ -f package.json ] || { printf 'package.json not found\n'; exit 1; }
          case "$PACKAGE_MANAGER" in
            npm) npm install ;;
            pnpm) pnpm install ;;
            yarn) yarn install ;;
          esac
        mutative: true
        args:
          - key: PACKAGE_MANAGER
            label: Package manager
            required: true
            type: enum
            enum_ref: package-manager
      - id: package-manager-audit
        name: "Package manager dependency audit"
        description: "Runs the selected package manager's audit command and requires no high or critical vulnerabilities."
        command: |
          case "$PACKAGE_MANAGER" in
            npm|pnpm|yarn) ;;
            *) printf 'Unsupported PACKAGE_MANAGER: %s\n' "$PACKAGE_MANAGER"; exit 1 ;;
          esac
          case "$PACKAGE_MANAGER" in
            npm) npm audit --audit-level=high ;;
            pnpm) pnpm audit --audit-level=high ;;
            yarn) yarn audit --level high ;;
          esac
        args:
          - key: PACKAGE_MANAGER
            label: Package manager
            required: true
            type: enum
            enum_ref: package-manager
rules:
  - group: General
    rules:
      - type: script_reusable
        name: "Bumfuzzle wired into pre-commit"
        description: "bumfuzzle run is called inside the pre-commit hook so checks run before every commit"
        script: file-line-match
        severity: hard-stop
        instruction: "Add a call to 'bumfuzzle run' in .githooks/pre-commit"
        args:
          FAIL_ON_FILE_NOT_FOUND: true
          FILE_PATH: .githooks/pre-commit
          REGEX_PATTERN: '.*bumfuzzle run.*'
      - type: script_reusable
        name: "Readme present"
        description: "README.md exists at the project root"
        script: file-or-dir-existence
        severity: error
        instruction: "Create README.md in the project root"
        args:
          FILE_PATH: README.md
      - type: script_reusable
        name: "No conflicting manifests at root"
        description: "At most one package manifest exists at the root"
        script: file-name-count-compare
        severity: warn
        instruction: "Remove duplicate manifest files from the project root"
        args:
          SEARCH_ROOT: "."
          SEARCH_DEPTH: 1
          FILE_NAMES: [package.json, Cargo.toml, pom.xml, go.mod, pyproject.toml]
          COMPARISON_OPERATOR: le
          COUNT_THRESHOLD: 1
      - type: script_clean
        name: "No unmanaged polyglot monorepo"
        description: "Manifests from more than one language ecosystem exist in the repository only if a recognized monorepo workspace is declared at the root (pnpm-workspace.yaml, a package.json workspaces field, a Cargo.toml [workspace] section, lerna.json, nx.json, or turbo.json) — otherwise it looks like accidental cross-ecosystem drift rather than a deliberate monorepo"
        command: |
          _ecosystems=""
          while IFS= read -r _f; do
            [ -z "$_f" ] && continue
            case "$(basename "$_f")" in
              package.json) _e=node ;;
              Cargo.toml) _e=rust ;;
              pom.xml) _e=java ;;
              go.mod) _e=go ;;
              pyproject.toml) _e=python ;;
              *) continue ;;
            esac
            case " $_ecosystems " in *" $_e "*) ;; *) _ecosystems="$_ecosystems $_e" ;; esac
          done < <(find . \( -name .git -o -name node_modules -o -name .venv -o -name vendor -o -name target -o -name dist -o -name build \) -prune -o -type f \( -name 'package.json' -o -name 'Cargo.toml' -o -name 'pom.xml' -o -name 'go.mod' -o -name 'pyproject.toml' \) -print 2>/dev/null)
          _count=$(printf '%s\n' $_ecosystems | grep -vc '^$')
          [ "$_count" -le 1 ] && exit 0
          [ -f pnpm-workspace.yaml ] && exit 0
          [ -f lerna.json ] && exit 0
          [ -f nx.json ] && exit 0
          [ -f turbo.json ] && exit 0
          [ -f package.json ] && grep -q '"workspaces"' package.json && exit 0
          [ -f Cargo.toml ] && grep -q '\[workspace\]' Cargo.toml && exit 0
          printf 'found manifests from %d ecosystems (%s) with no monorepo workspace declaration at root\n' "$_count" "$_ecosystems"
          exit 1
        severity: warn
        instruction: "Declare a workspace at root (pnpm-workspace.yaml, package.json workspaces, Cargo.toml [workspace], or an nx/turbo/lerna config), or remove the unused ecosystem's manifest"
      - type: script_reusable
        name: "No oversized files"
        description: "No file in the project exceeds 5 MiB — large binaries belong in artifact storage or Git LFS, not the repository"
        script: no-large-files
        severity: warn
        instruction: "Remove or gitignore the listed files, or raise SIZE_AMOUNT if they are intentional"
        args:
          SIZE_AMOUNT: 5
          SIZE_UNIT: 1048576
      - type: script_reusable
        name: "All symlinks valid"
        description: "Every symlink in the project resolves to an existing target inside the project — no broken or escaping links"
        script: symlinks-valid
        severity: error
        instruction: "Fix or remove the broken symlinks listed"
        args:
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No destructive commands"
        description: "Shell scripts and build files contain no destructive commands (rm -rf, git push --force, git reset --hard, git clean -f, mkfs, truncate -s 0)"
        script: files-content-scan
        severity: warn
        instruction: "Remove the destructive command, or add the file to EXCLUDE_FILES_GLOB if it is intentional"
        args:
          INCLUDE_FILES_GLOB: ["*.sh", "*.bash", "*.zsh", "Makefile", "Justfile"]
          REGEX_PATTERN: ['rm[[:space:]]+-[a-zA-Z]*r[a-zA-Z]*f', 'git[[:space:]]+push[^|;&]*(--force|[[:space:]]-f)([[:space:]]|$)', 'git[[:space:]]+reset[[:space:]]+--hard', 'git[[:space:]]+clean[[:space:]]+-[a-zA-Z]*f', '\bmkfs\b', '\btruncate[[:space:]]+-s[[:space:]]+0\b']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Shell scripts confined to scripts/"
        description: "Every .sh file in the project lives under scripts/ — no shell scripts scattered elsewhere in the tree"
        script: file-location-restriction
        severity: warn
        instruction: "Move the listed .sh file(s) into scripts/, or update this rule's FILE_LOCATION_ALLOWED_DIR if another location is intentional"
        args:
          INCLUDE_FILES_GLOB: "*.sh"
          FILE_LOCATION_ALLOWED_DIR: scripts
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Shell scripts in scripts/ compile cleanly"
        description: "Every .sh file under scripts/ passes bash -n syntax validation"
        script: file-syntax-valid
        severity: error
        instruction: "Fix the bash syntax errors reported for the listed script(s)"
        args:
          FILE_TYPE: bash
          SEARCH_ROOT: scripts
          INCLUDE_FILES_GLOB: "*.sh"
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Required directories are present"
        description: "Each required project-root directory listed in FILE_PATH exists"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create the missing directories listed"
        args:
          FILE_PATH: [tmp, export, migrations, src, scripts, docs, logs, dist, out]
      - type: script_reusable
        name: "Required files are present"
        description: "Each required file listed in FILE_PATH exists"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create the missing files listed"
        args:
          FILE_PATH: [./config, ./docs/SKILL.md]
      - type: script_reusable
        name: "VERSION file present"
        description: "A VERSION file exists at the project root — the single source of truth for the project version"
        script: file-or-dir-existence
        severity: error
        instruction: "Create a VERSION file at the project root containing the semver version"
        args:
          FILE_PATH: VERSION
      - type: script_reusable
        name: "VERSION is valid semver"
        description: "The VERSION file contains a valid semantic version line (MAJOR.MINOR.PATCH with optional pre-release/build metadata)"
        script: file-line-match
        severity: error
        instruction: "Set the VERSION file content to a semver string like 1.4.2"
        args:
          FAIL_ON_FILE_NOT_FOUND: true
          FILE_PATH: VERSION
          REGEX_PATTERN: '(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?'
      - type: script_reusable
        name: "export/openapi.yaml present"
        description: "export/openapi.yaml exists"
        script: file-or-dir-existence
        severity: warn
        instruction: "Generate and commit export/openapi.yaml"
        args:
          FILE_PATH: export/openapi.yaml
  - group: Git
    rules:
      - group: Commit Message
        rules:
          - type: script_clean
            name: "commitlint on last commit"
            description: "The last commit message satisfies commitlint (Conventional Commits structure). Needs a commitlint config in the repo."
            command: "commitlint --last"
            requires: commitlint
            severity: warn
            instruction: "Rewrite the last commit message to satisfy commitlint: git commit --amend"
          - type: script_clean
            name: "gitlint on last commit"
            description: "The last commit message satisfies gitlint formatting rules (line lengths, structure). Alternative to commitlint."
            command: "gitlint"
            requires: gitlint
            severity: warn
            instruction: "Rewrite the last commit message to satisfy gitlint: git commit --amend"
      - group: Versioning
        rules:
          - type: script_clean
            name: "No AI co-authors in history"
            description: "No commit in the repository history lists Claude as a co-author"
            command: "! git log --format='%b' | grep -qi 'co-authored-by: claude'"
            severity: error
            instruction: "Review and amend commits: git log --grep='Co-Authored-By: Claude' -i --oneline"
          - type: script_clean
            name: "No AI co-author in commit message"
            description: "The staged commit message does not contain a Co-Authored-By: Claude line"
            command: "! grep -qi 'Co-Authored-By: Claude' .git/COMMIT_EDITMSG"
            severity: hard-stop
            instruction: "Remove Co-Authored-By lines from the commit message"
          - type: script_clean
            name: "Last commit author, committer, and co-author match mandate"
            description: "The last commit's author, committer, and co-author trailer all match the project's mandated git identities, with no other co-author present"
            command: |
              _mandated_author_name="Release Manager"
              _mandated_author_email="release@archicode.ai"
              _mandated_committer_name="Release Manager"
              _mandated_committer_email="release@archicode.ai"
              _mandated_coauthor_name="Alan"
              _mandated_coauthor_email="noreply@archicode.ai"

              _an=$(git log -1 --format='%an')
              _ae=$(git log -1 --format='%ae')
              _cn=$(git log -1 --format='%cn')
              _ce=$(git log -1 --format='%ce')
              _body=$(git log -1 --format='%b')

              _failed=false

              if [[ "$_an" != "$_mandated_author_name" || "$_ae" != "$_mandated_author_email" ]]; then
                printf 'author is %s <%s>, expected %s <%s>\n' "$_an" "$_ae" "$_mandated_author_name" "$_mandated_author_email"
                _failed=true
              fi

              if [[ "$_cn" != "$_mandated_committer_name" || "$_ce" != "$_mandated_committer_email" ]]; then
                printf 'committer is %s <%s>, expected %s <%s>\n' "$_cn" "$_ce" "$_mandated_committer_name" "$_mandated_committer_email"
                _failed=true
              fi

              _mandated_trailer="Co-Authored-By: ${_mandated_coauthor_name} <${_mandated_coauthor_email}>"
              if ! grep -qF "$_mandated_trailer" <<< "$_body"; then
                printf 'missing mandated co-author trailer: %s\n' "$_mandated_trailer"
                _failed=true
              fi

              while IFS= read -r _line; do
                [[ -z "$_line" ]] && continue
                grep -qiF "co-authored-by: ${_mandated_coauthor_name} <${_mandated_coauthor_email}>" <<< "$_line" || { printf 'unauthorized co-author trailer: %s\n' "$_line"; _failed=true; }
              done < <(grep -i '^co-authored-by:' <<< "$_body")

              [[ "$_failed" == "false" ]]
            severity: error
            instruction: "Amend the last commit with the mandated author, committer, and co-author trailer, removing any other co-author"
      - group: Hooks
        rules:
          - type: script_clean
            name: "Hooks installed and checksums match"
            description: "Every file in .githooks/ is present in .git/hooks/ and their SHA-256 checksums match — no stale or tampered hooks"
            command: |
              _sha256() { command -v sha256sum >/dev/null 2>&1 && sha256sum "$@" || shasum -a 256 "$@"; }
              for f in .githooks/*; do
                [ -f "$f" ] || continue
                name=$(basename "$f")
                [ -f ".git/hooks/$name" ] || { echo "Missing: $name"; exit 1; }
                _sha256 "$f" ".git/hooks/$name" | awk '{print $1}' | sort -u | wc -l | grep -q 1 || { echo "Mismatch: $name"; exit 1; }
              done
            severity: error
            instruction: "Run: scripts/hooks.sh --force to reinstall hooks"
          - type: script_reusable
            name: "CONFIG_APPROVED guard declared"
            description: ".githooks/pre-commit references the CONFIG_APPROVED environment variable guard"
            script: file-line-match
            severity: warn
            instruction: "Add a CONFIG_APPROVED guard in .githooks/pre-commit"
            args:
              FAIL_ON_FILE_NOT_FOUND: true
              FILE_PATH: .githooks/pre-commit
              REGEX_PATTERN: '.*CONFIG_APPROVED.*'
          - type: script_reusable
            name: "DOCS_APPROVED guard declared"
            description: ".githooks/pre-commit references the DOCS_APPROVED environment variable guard"
            script: file-line-match
            severity: warn
            instruction: "Add a DOCS_APPROVED guard in .githooks/pre-commit"
            args:
              FAIL_ON_FILE_NOT_FOUND: true
              FILE_PATH: .githooks/pre-commit
              REGEX_PATTERN: '.*DOCS_APPROVED.*'
          - type: script_reusable
            name: "ENV_APPROVED guard declared"
            description: ".githooks/pre-commit references the ENV_APPROVED environment variable guard"
            script: file-line-match
            severity: warn
            instruction: "Add an ENV_APPROVED guard in .githooks/pre-commit"
            args:
              FAIL_ON_FILE_NOT_FOUND: true
              FILE_PATH: .githooks/pre-commit
              REGEX_PATTERN: '.*ENV_APPROVED.*'
      - group: Gitignore
        rules:
          - type: script_reusable
            name: ".gitignore present"
            description: ".gitignore exists at the project root"
            script: file-or-dir-existence
            severity: error
            instruction: "Create .gitignore at the project root"
            args:
              FILE_PATH: .gitignore
          - type: script_clean
            name: "No ignored files in git index"
            description: "No file currently tracked by git would be matched by .gitignore — no stale cached files that should be ignored"
            command: "! git ls-files --cached | while IFS= read -r f; do git check-ignore -q \"$f\" && echo \"$f\"; done | grep -q ."
            severity: warn
            instruction: "Run: git rm -r --cached <file> for any ignored files still tracked"
          - type: script_clean
            name: "No committed .env.* files"
            description: "No .env.* file (except .env.template) is tracked in the git index — secrets must not be committed"
            command: "! git ls-files | grep -E '^\\.env\\.' | grep -v '^\\.env\\.template$' | grep -q ."
            severity: error
            instruction: "Run: git rm --cached <file> for each tracked .env.* file, then ensure .env.* is in .gitignore"
          - type: script_clean
            name: "No contradicting .gitignore patterns"
            description: "No duplicate lines and no pattern that is both ignored and re-included (pat and !pat) in .gitignore"
            command: |
              [ ! -f .gitignore ] && exit 0
              rc=0
              dups=$(grep -vE '^(#|$)' .gitignore | sort | uniq -d)
              [ -n "$dups" ] && printf 'Duplicate patterns:\n%s\n' "$dups" && rc=1
              while IFS= read -r neg; do
                [ -z "$neg" ] && continue
                grep -qxF "${neg#!}" .gitignore && { printf 'Contradiction: both %s and %s present\n' "${neg#!}" "$neg"; rc=1; }
              done < <(grep '^!' .gitignore || true)
              exit $rc
            severity: warn
            instruction: "Remove the duplicate or contradicting patterns from .gitignore"
          - group: Ignore Patterns
            rules:
              - type: script_reusable
                name: ".DS_Store ignored"
                description: ".gitignore contains a pattern covering .DS_Store macOS metadata files"
                script: file-line-match
                severity: warn
                instruction: "Add '.DS_Store' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '.*DS_Store.*'
              - type: script_reusable
                name: ".idea/ ignored"
                description: ".gitignore contains a pattern covering the .idea/ IntelliJ project directory"
                script: file-line-match
                severity: warn
                instruction: "Add '.idea/' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '.*\.idea/.*'
              - type: script_reusable
                name: "*.iml ignored"
                description: ".gitignore contains a pattern covering *.iml IntelliJ module files"
                script: file-line-match
                severity: warn
                instruction: "Add '*.iml' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '.*\*\.iml.*'
              - type: script_reusable
                name: "*.iws ignored"
                description: ".gitignore contains a pattern covering *.iws IntelliJ workspace files"
                script: file-line-match
                severity: warn
                instruction: "Add '*.iws' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '.*\*\.iws.*'
              - type: script_reusable
                name: ".vscode/ ignored"
                description: ".gitignore contains a pattern covering .vscode/ VS Code editor settings"
                script: file-line-match
                severity: warn
                instruction: "Add '.vscode/' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '.*\.vscode/.*'
              - type: script_reusable
                name: ".env.* gitignored"
                description: ".gitignore contains a pattern excluding .env.* environment files — real secrets must not be committed"
                script: file-line-match
                severity: error
                instruction: "Add '.env.*' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '^\.env\..*'
              - type: script_reusable
                name: "tmp/ ignored"
                description: ".gitignore contains 'tmp/' so its contents are never accidentally committed"
                script: file-line-match
                severity: warn
                instruction: "Add 'tmp/' to .gitignore"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .gitignore
                  REGEX_PATTERN: '^tmp/.*'
  - group: Environment Variables
    rules:
      - type: script_reusable
        name: ".env present"
        description: ".env exists at the project root — base configuration loaded for everything, lowest override priority"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create .env at the project root with the base configuration"
        args:
          FILE_PATH: .env
      - type: script_reusable
        name: ".env.local present"
        description: ".env.local exists at the project root for machine-local overrides"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create .env.local at the project root for machine-local overrides"
        args:
          FILE_PATH: .env.local
      - type: script_reusable
        name: ".env.template present"
        description: ".env.template exists at the project root and declares all required environment variable keys"
        script: file-or-dir-existence
        severity: error
        instruction: "Create .env.template declaring all required environment variables"
        args:
          FILE_PATH: .env.template
      - type: script_clean
        name: ".env.{APP_ENV} present"
        description: "A .env file matching the current APP_ENV exists at the project root"
        command: |
          [ -z "$APP_ENV" ] && { printf 'APP_ENV is not set\n'; exit 1; }
          [ -f ".env.$APP_ENV" ] || { printf '.env.%s not found\n' "$APP_ENV"; exit 1; }
        severity: warn
        instruction: "Create a .env.<APP_ENV> file for the currently configured environment"
      - type: script_clean
        name: "All template keys in every .env.* file"
        description: "Every key declared in .env.template is present in each .env.* file — no environment is missing a declared variable"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          [ -z "$tmpl" ] && exit 0
          rc=0
          for ef in .env.*; do
            [ -f "$ef" ] && [ "$ef" != ".env.template" ] || continue
            missing=$(comm -23 <(printf '%s\n' "$tmpl") <(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort -u))
            [ -n "$missing" ] && printf 'Missing in %s: %s\n' "$ef" "$missing" && rc=1
          done
          exit $rc
        severity: error
        instruction: "Add missing keys from .env.template to each .env.* file"
      - type: script_clean
        name: "No undeclared keys in .env.* files"
        description: "Every key in each .env.* file is declared in .env.template — no undocumented variables exist in any environment"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          [ -z "$tmpl" ] && exit 0
          rc=0
          for ef in .env.*; do
            [ -f "$ef" ] && [ "$ef" != ".env.template" ] || continue
            extra=$(comm -13 <(printf '%s\n' "$tmpl") <(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort -u))
            [ -n "$extra" ] && printf 'Undeclared in %s: %s\n' "$ef" "$extra" && rc=1
          done
          exit $rc
        severity: error
        instruction: "Add undeclared keys to .env.template or remove them from .env.* files"
      - type: script_clean
        name: ".env.template values are placeholders"
        description: "All values in .env.template are uppercase placeholder strings — no real secrets committed"
        command: "[ ! -f .env.template ] && exit 0; ! grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | grep -vE '=([A-Z_][A-Z0-9_]*)?$' | grep -q ."
        severity: warn
        instruction: "Replace real values in .env.template with uppercase placeholders like MY_KEY=PLACEHOLDER"
      - type: script_clean
        name: "No empty values in .env.* files"
        description: "Every key in each .env.* file has a non-empty value — blank values indicate missing or forgotten configuration"
        command: |
          rc=0
          while IFS= read -r ef; do
            while IFS= read -r line; do
              case "$line" in ''|\#*) continue ;; esac
              val="${line#*=}"
              [ -z "${val// }" ] && printf 'Blank value in %s: %s\n' "$ef" "${line%%=*}" && rc=1
            done < "$ef"
          done < <(find . -maxdepth 1 -name '.env.*' -not -name '.env.template' -type f | sort)
          exit $rc
        severity: error
        instruction: "Set a non-empty value for every blank key in .env.* files"
      - type: script_clean
        name: "No duplicate keys in .env.* files"
        description: "Each .env.* file declares every key at most once — duplicate keys cause unpredictable precedence behavior"
        command: |
          rc=0
          while IFS= read -r ef; do
            dups=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort | uniq -d)
            [ -n "$dups" ] && printf 'Duplicate keys in %s: %s\n' "$ef" "$dups" && rc=1
          done < <(find . -maxdepth 1 -name '.env.*' -type f | sort)
          exit $rc
        severity: error
        instruction: "Remove duplicate key declarations from .env.* files"

  - group: Docker
    rules:
      - type: script_reusable
        name: "Dockerfile present"
        description: "A Dockerfile exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create a Dockerfile at the project root"
        args:
          FILE_PATH: Dockerfile
      - type: script_reusable
        name: "Compose file present"
        description: "A docker-compose*.yml file exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create docker-compose.yml at the project root"
        args:
          FILE_PATH: 'docker-compose*.yml'
      - type: script_clean
        name: "Compose files render without errors"
        description: "All docker-compose*.yml files in the project pass docker compose config — no unresolved variables or syntax errors"
        command: "find . -maxdepth 2 -name 'docker-compose*.yml' | while IFS= read -r f; do docker compose -f \"$f\" config --quiet || exit 1; done"
        severity: error
        instruction: "Run: docker compose -f <file> config to see render errors"
      - type: script_reusable
        name: "No :latest image tags"
        description: "No Docker image reference in *.yml files uses :latest — all images must be pinned to a specific version for reproducible builds"
        script: files-content-scan
        severity: error
        instruction: "Pin image tags to a specific version instead of :latest"
        args:
          INCLUDE_FILES_GLOB: '*.yml'
          REGEX_PATTERN: 'image:.*:latest'
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_clean
        name: "Docker env vars declared in .env.template"
        description: "Every environment variable referenced in Docker compose files is declared in .env.template — no undocumented container configuration"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          rc=0
          for cf in docker-compose*.yml; do
            [ -f "$cf" ] || continue
            vars=$(grep -oE '\$\{[A-Za-z_][A-Za-z0-9_]*\}|\$[A-Za-z_][A-Za-z0-9_]+' "$cf" \
                   | sed -E 's/^\$\{?//;s/\}$//' | sort -u)
            while IFS= read -r var; do
              [ -z "$var" ] && continue
              printf '%s\n' "$tmpl" | grep -qx "$var" || { printf 'Undeclared in .env.template: %s (found in %s)\n' "$var" "$cf"; rc=1; }
            done <<< "$vars"
          done
          if [ -f Dockerfile ]; then
            vars=$(grep -oE '^ARG[[:space:]]+[A-Za-z_][A-Za-z0-9_]*' Dockerfile | awk '{print $2}' | sort -u)
            while IFS= read -r var; do
              [ -z "$var" ] && continue
              printf '%s\n' "$tmpl" | grep -qx "$var" || { printf 'Undeclared in .env.template: %s (found in Dockerfile)\n' "$var"; rc=1; }
            done <<< "$vars"
          fi
          exit $rc
        severity: error
        instruction: "Declare every environment variable used in Docker files in .env.template"
      - type: script_clean
        name: "Compose name consistent with stack"
        description: "The name field in each docker-compose.<stack>.yml matches the stack name derived from the filename"
        command: |
          rc=0
          for cf in docker-compose.*.yml; do
            [ -f "$cf" ] || continue
            stack="${cf#docker-compose.}"; stack="${stack%.yml}"
            name=$(yq '.name // ""' "$cf" 2>/dev/null || true)
            [ -z "$name" ] || [ "$name" = "$stack" ] || { printf "Compose name '%s' in %s should match stack '%s'\n" "$name" "$cf" "$stack"; rc=1; }
          done
          exit $rc
        severity: warn
        instruction: "Set the 'name:' field in docker-compose.<stack>.yml to match the stack name"
      - type: script_clean
        name: "Dockerfile renders without errors"
        description: "The Dockerfile passes a syntax/lint check with no unresolved instructions or errors"
        command: |
          [ -f Dockerfile ] || exit 0
          docker build --check -f Dockerfile . > /dev/null 2>&1
        requires: docker
        severity: error
        instruction: "Run: docker build --check to see the syntax errors"
      - type: script_clean
        name: "Dockerfile only uses env variables as values"
        description: "Every ENV instruction's value is a variable reference, not a literal"
        command: |
          [ -f Dockerfile ] || exit 0
          rc=0
          while IFS= read -r line; do
            val=$(printf '%s' "$line" | sed -E 's/^ENV[[:space:]]+[A-Za-z_][A-Za-z0-9_]*[= ]//')
            printf '%s' "$val" | grep -qE '^\$\{?[A-Za-z_][A-Za-z0-9_]*\}?$' || { printf 'Hardcoded value in: %s\n' "$line"; rc=1; }
          done < <(grep -E '^ENV[[:space:]]+[A-Za-z_][A-Za-z0-9_]*[= ]' Dockerfile)
          exit $rc
        severity: warn
        instruction: "Reference a build ARG or runtime variable instead of a literal value in ENV"
      - type: script_clean
        name: "Compose only uses env variables as values"
        description: "Every environment: entry in docker-compose*.yml is a variable reference, not a literal"
        command: |
          rc=0
          for cf in docker-compose*.yml; do
            [ -f "$cf" ] || continue
            vals=$(yq '.services.*.environment[]? // (.services.*.environment | to_entries[]?.value)' "$cf" 2>/dev/null)
            while IFS= read -r v; do
              [ -z "$v" ] && continue
              printf '%s' "$v" | grep -qE '^\$\{?[A-Za-z_][A-Za-z0-9_]*\}?$' || { printf 'Hardcoded value in %s: %s\n' "$cf" "$v"; rc=1; }
            done <<< "$vals"
          done
          exit $rc
        severity: warn
        instruction: "Reference a variable (${VAR}) instead of a literal value under environment: in compose files"

  - group: Config
    rules:
      - type: script_reusable
        name: "Config file present"
        description: "config.yml exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create config.yml in the project root"
        args:
          FILE_PATH: config.yml
      - type: script_reusable
        name: "Config file is valid YAML"
        description: "config.yml can be parsed by yq without errors"
        script: file-syntax-valid
        severity: error
        instruction: "Fix YAML syntax errors in config.yml"
        args:
          FAIL_ON_FILE_NOT_FOUND: true
          FILE_TYPE: yaml
          SEARCH_ROOT: "."
          SEARCH_DEPTH: 1
          INCLUDE_FILES_GLOB: config.yml
      - type: script_clean
        name: "Config extends targets exist"
        description: "Every file path referenced by an extends field in config files exists on disk"
        command: |
          rc=0
          for cf in config*.yml; do
            [ -f "$cf" ] || continue
            ext=$(yq '.extends // ""' "$cf" 2>/dev/null || true)
            [ -z "$ext" ] && continue
            dir=$(dirname "$cf")
            [ -f "$dir/$ext" ] || { printf 'Extends target not found: %s/%s (referenced in %s)\n' "$dir" "$ext" "$cf"; rc=1; }
          done
          exit $rc
        severity: error
        instruction: "Ensure the extends target file exists at the path specified relative to the config file"
      - type: script_reusable
        name: "No empty values in config"
        description: "No key in config.yml resolves to an empty string or null — blank values indicate missing configuration"
        script: yaml-no-empty-values
        severity: error
        instruction: "Set a value for every empty key in config.yml, or remove the key"
        args:
          FILE_PATH: config.yml
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No duplicate keys in config"
        description: "No mapping in config.yml declares the same key twice — parsers silently keep only one, hiding the other value"
        script: yaml-no-duplicate-keys
        severity: error
        instruction: "Remove the duplicate key declarations from config.yml"
        args:
          FILE_PATH: config.yml
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "All config keys referenced in codebase"
        description: "Every top-level key in config.yml is referenced somewhere in the codebase — no dead configuration"
        script: config-keys-used
        severity: warn
        instruction: "Remove unused keys from config.yml, or reference them in code"
        args:
          FILE_PATH: config.yml
          FAIL_ON_FILE_NOT_FOUND: false

  - group: Privacy & Security
    rules:
      - type: script_reusable
        name: "No AWS credentials"
        description: "No file contains a hardcoded AWS access key ID"
        script: files-content-scan
        severity: error
        instruction: "Remove the AWS credentials, rotate them immediately, and load them from the environment instead"
        args:
          INCLUDE_FILES_GLOB: "*"
          REGEX_PATTERN: ['AKIA[0-9A-Z]{16}']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No private key blocks"
        description: "No file contains an unencrypted private key signature block"
        script: files-content-scan
        severity: error
        instruction: "Remove the private key from the repository, rotate it, and reference it from a secret store instead"
        args:
          INCLUDE_FILES_GLOB: "*"
          REGEX_PATTERN: ['-----BEGIN [A-Z ]*PRIVATE KEY-----']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No hardcoded API keys"
        description: "No file contains a known API-key signature or a generic quoted secret assignment"
        script: files-content-scan
        severity: error
        instruction: "Remove the hardcoded key, rotate it, and load it from the environment instead; extend EXCLUDE_FILES_GLOB for false positives"
        args:
          INCLUDE_FILES_GLOB: "*"
          EXCLUDE_FILES_GLOB: [".env.*", "*.lock", "*.min.js"]
          REGEX_PATTERN: ['sk-[A-Za-z0-9]{20,}', 'ghp_[A-Za-z0-9]{36}', 'ghs_[A-Za-z0-9]{36}', 'github_pat_[A-Za-z0-9_]{22,}', 'AIza[0-9A-Za-z_-]{35}', 'xox[baprs]-[0-9A-Za-z-]{10,}', 'glpat-[0-9A-Za-z_-]{20}', "(api_key|apikey|api_token|secret)[[:space:]]*[:=][[:space:]]*[\"'][A-Za-z0-9_/+-]{16,}[\"']"]
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No hardcoded IPs"
        description: "No file contains a literal IPv4 address"
        script: files-content-scan
        severity: warn
        instruction: "Remove the hardcoded IP and load it from configuration or the environment instead; extend EXCLUDE_FILES_GLOB for false positives"
        args:
          INCLUDE_FILES_GLOB: "*"
          EXCLUDE_FILES_GLOB: [".env.*", "*.lock", "*.min.js"]
          REGEX_PATTERN: ['([0-9]{1,3}\.){3}[0-9]{1,3}']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No hardcoded constant-style secrets"
        description: "No file assigns a literal 16+ character string to an uppercase constant-style secret/password/token/api-key name"
        script: files-content-scan
        severity: error
        instruction: "Load the value from the environment instead of assigning it as a literal"
        args:
          INCLUDE_FILES_GLOB: "*"
          EXCLUDE_FILES_GLOB: [".env.*", "*.lock", "*.min.js"]
          REGEX_PATTERN: ['[A-Z0-9_]*(SECRET|PASSWORD|TOKEN|API_KEY)[A-Z0-9_]*[[:space:]]*[:=][[:space:]]*["''][A-Za-z0-9_/+.-]{16,}["'']']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_clean
        name: "Gitleaks scan"
        description: "Gitleaks finds no hardcoded secrets, API keys, passwords, or tokens in the working tree"
        command: "gitleaks detect --redact --no-banner"
        requires: gitleaks
        severity: error
        instruction: "Remove and rotate the secrets gitleaks reports; add false positives to .gitleaksignore"
      - type: script_clean
        name: "Trufflehog scan"
        description: "Trufflehog finds no verified secrets or high-entropy strings across the working tree and git history"
        command: "trufflehog git file://. --fail --no-update"
        requires: trufflehog
        severity: error
        instruction: "Remove and rotate the secrets trufflehog reports"
      - type: script_clean
        name: "Talisman scan"
        description: "Talisman finds no secrets or oversized files across the full repository, validating outward-bound commit hygiene heuristics"
        command: "talisman --scan"
        requires: talisman
        severity: error
        instruction: "Remove and rotate the secrets talisman reports, or add accepted false positives to .talismanrc"
      - type: script_clean
        name: "Semgrep scan"
        description: "Semgrep static analysis finds no bugs or security vulnerabilities"
        command: "npx semgrep scan --config auto --error --quiet"
        requires: npx
        severity: warn
        instruction: "Fix the findings semgrep reports, or suppress false positives with a # nosemgrep comment"
      - type: script_clean
        name: "SonarQube scan"
        description: "SonarQube static analysis finds no bugs, vulnerabilities, or code smells"
        command: "npx sonar-scanner -Dsonar.login=$SONAR_TOKEN"
        requires: npx
        severity: warn
        instruction: "Fix the findings SonarQube reports, or mark accepted ones in the SonarQube UI"
      - type: script_clean
        name: "Bandit scan (Python)"
        description: "Bandit finds no common Python security vulnerabilities (eval, unvalidated subprocess, etc.)"
        command: "bandit -q -r ."
        requires: bandit
        severity: warn
        instruction: "Fix the issues bandit reports, or mark accepted ones with # nosec"
      - type: script_clean
        name: "Detect-aws-credentials scan"
        description: "Detect-aws-credentials finds AWS access keys and verifies them against locally configured credentials, catching live keys a pattern match alone can't confirm. Alternative to No AWS credentials — enable one or the other."
        command: "detect-aws-credentials --allow-missing-credentials"
        requires: detect-aws-credentials
        severity: error
        instruction: "Remove and rotate the credentials it reports"
      - type: script_clean
        name: "Detect-private-key scan"
        description: "Detect-private-key validates a found private key signature is structurally a real key, not just matching text. Alternative to No private key blocks — enable one or the other."
        command: "detect-private-key"
        requires: detect-private-key
        severity: error
        instruction: "Remove the private key from the repository, rotate it, and reference it from a secret store instead"

  - group: Naming Conventions
    rules:
      - type: script_reusable
        name: "Config-style files are kebab-case"
        description: "All .yml, .yaml, .xml and .properties file names are kebab-case"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed files to kebab-case"
        args:
          INCLUDE: ["*.yml", "*.yaml", "*.xml", "*.properties"]
          NAMING_CONVENTION: '^[a-z0-9]+([-.][a-z0-9]+)*$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Shell script files are kebab-case"
        description: "All .sh file names are kebab-case"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed files to kebab-case"
        args:
          INCLUDE: ["*.sh"]
          NAMING_CONVENTION: '^[a-z0-9]+([-.][a-z0-9]+)*$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Directories are flat lowercase"
        description: "All directory names are flat lowercase (no separators). Hidden directories and node_modules are skipped"
        script: dir-naming-scan-check
        severity: warn
        instruction: "Rename the listed directories to flat lowercase, or add them to EXCLUDE"
        args:
          FAIL_ON_FILE_NOT_FOUND: true
          NAMING_CONVENTION: '^[a-z0-9]+$'
      - type: script_reusable
        name: "Python files are snake_case"
        description: "All .py file names are snake_case"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed Python files to snake_case"
        args:
          INCLUDE: "*.py"
          NAMING_CONVENTION: '^[a-z0-9]+([_.][a-z0-9]+)*$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "TOML files are flat lowercase"
        description: "All .toml file names are flat lowercase (dots allowed via the stripped extension)"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed .toml files to flat lowercase"
        args:
          INCLUDE: "*.toml"
          NAMING_CONVENTION: '^[a-z0-9]+$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "JS/TS files are kebab-case"
        description: "All .js and .ts file names are kebab-case"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed files to kebab-case"
        args:
          INCLUDE: ["*.js", "*.ts"]
          NAMING_CONVENTION: '^[a-z0-9]+([-.][a-z0-9]+)*$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Component files are PascalCase"
        description: "All .jsx, .tsx, .vue and .svelte component file names are PascalCase"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed component files to PascalCase"
        args:
          INCLUDE: ["*.jsx", "*.tsx", "*.vue", "*.svelte"]
          NAMING_CONVENTION: '^([A-Z][a-z0-9]*)+$'
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Java/Kotlin files are PascalCase"
        description: "All .java and .kt file names are PascalCase"
        script: file-naming-scan-check
        severity: warn
        instruction: "Rename the listed Java/Kotlin files to PascalCase"
        args:
          INCLUDE: ["*.java", "*.kt"]
          NAMING_CONVENTION: '^([A-Z][a-z0-9]*)+$'
          FAIL_ON_FILE_NOT_FOUND: false

  - group: Code Quality (Linting & Formatting)
    rules:
      - group: JS & TS
        rules:
          - type: script_clean
            name: "ESLint passes"
            description: "eslint finds no code-quality violations"
            command: "npx --no-install eslint ."
            severity: error
            instruction: "Fix the violations eslint reports"
          - type: script_clean
            name: "Biome check"
            description: "biome linting and formatting pass. Alternative to ESLint + Prettier — enable one or the other"
            command: "biome ci ."
            requires: biome
            severity: warn
            instruction: "Run: biome check --write ."
          - type: script_clean
            name: "Prettier format check"
            description: "All supported files are formatted per Prettier"
            command: "prettier --check ."
            requires: prettier
            severity: warn
            instruction: "Run: prettier --write ."
          - type: script_clean
            name: "Prettier run edit"
            description: "Prettier reformats all supported files in place. Alternative to the check-only 'Prettier format check' — enable one or the other, not both"
            command: "prettier --write ."
            requires: prettier
            severity: warn
            mutative: true
            instruction: "Review the changes Prettier made before committing"
      - group: Python
        rules:
          - type: script_clean
            name: "ruff lint"
            description: "ruff finds no lint errors (recommended: subsumes flake8 and isort, and most style checks)"
            command: "ruff check --no-cache ."
            requires: ruff
            severity: error
            instruction: "Run: ruff check --fix ."
          - type: script_clean
            name: "ruff format check"
            description: "All Python files are formatted per ruff-format (black-aligned; recommended over black)"
            command: "ruff format --check --no-cache ."
            requires: ruff
            severity: warn
            instruction: "Run: ruff format ."
          - type: script_clean
            name: "flake8 lint"
            description: "flake8 finds no PEP 8 or logical errors. Legacy alternative — prefer ruff, which subsumes it"
            command: "flake8 ."
            requires: flake8
            severity: warn
            instruction: "Fix the style violations flake8 reports"
          - type: script_clean
            name: "black format check"
            description: "All Python files are formatted per black. Legacy alternative — prefer ruff format"
            command: "black --check ."
            requires: black
            severity: warn
            instruction: "Run: black ."
          - type: script_clean
            name: "isort import order check"
            description: "Python import statements are sorted per isort. Legacy alternative — prefer ruff, which subsumes it"
            command: "isort --check-only ."
            requires: isort
            severity: warn
            instruction: "Run: isort ."
      - group: JVM
        rules:
          - type: script_clean
            name: "Checkstyle passes"
            description: "Checkstyle finds no JVM codestyle or formatting violations (requires the Checkstyle Gradle plugin)"
            command: |
              [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
              ./gradlew checkstyleMain
            severity: warn
            instruction: "Fix the violations Checkstyle reports"
      - type: script_clean
        name: "No typos in source"
        description: "The typos spell-checker finds no structural typos in source code and docs"
        command: "typos"
        requires: typos
        severity: warn
        instruction: "Fix the typos reported, or mark false positives in the typos config"
      - type: script_clean
        name: "Oxipng PNG compression"
        description: "oxipng losslessly recompresses every .png file in place to keep asset size lean"
        command: |
          _failed=false
          while IFS= read -r _f; do
            [ -z "$_f" ] && continue
            oxipng -o 4 -q "$_f" || _failed=true
          done < <(find . \( -name .git -o -name node_modules \) -prune -o -name '*.png' -type f -print 2>/dev/null)
          [ "$_failed" = "false" ]
        requires: oxipng
        severity: warn
        mutative: true
        instruction: "Review the recompressed PNG files before committing"
      - type: script_reusable
        name: "No merge-conflict markers"
        description: "No file in the staged diff contains leftover merge-conflict markers (<<<<<<<, =======, >>>>>>>)"
        script: git-diff-content-scan
        severity: error
        instruction: "Resolve the conflict and remove the marker lines"
        args:
          REGEX_PATTERN: ['^<<<<<<< ', '^=======$', '^>>>>>>> ']
      - type: script_clean
        name: "No trailing whitespace in diff"
        description: "No trailing whitespace or whitespace errors exist in staged changes"
        command: "git diff --cached --check"
        severity: warn
        instruction: "Fix the whitespace issues git reports in the diff, then re-stage"

  - group: Type Checking
    rules:
      - type: script_clean
        name: "Mypy type check (Python)"
        description: "Mypy static type checks pass against the project's type hints"
        command: "mypy --cache-dir=/dev/null ."
        requires: mypy
        severity: warn
        instruction: "Fix the type errors mypy reports"
      - type: script_clean
        name: "TypeScript type check"
        description: "TypeScript compiler reports no type errors"
        command: "npx tsc --noEmit -p tsconfig.json"
        requires: npx
        severity: warn
        instruction: "Fix the type errors tsc reports"

  - group: Documentation Coverage
    rules:
      - type: script_reusable
        name: "Prose lint on docs"
        description: "proselint finds no poor phrasing, cliches, or spelling irregularities in Markdown docs"
        script: run-tool-over-matched-files
        requires: proselint
        severity: warn
        instruction: "Fix the phrasing issues proselint reports in the listed Markdown files"
        args:
          INCLUDE_FILES_GLOB: "*.md"
          TOOL_COMMAND: proselint
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_clean
        name: "Docstring coverage (Python)"
        description: "interrogate reports sufficient docstring coverage on functions and classes"
        command: "interrogate -q ."
        requires: interrogate
        severity: warn
        instruction: "Add docstrings to the undocumented functions/classes: interrogate -v ."
      - type: script_clean
        name: "Javadoc coverage (JVM)"
        description: "./gradlew javadoc exits cleanly (requires doclint configured to fail on missing or invalid Javadoc comments)"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew javadoc --no-daemon
        severity: warn
        instruction: "Add the missing Javadoc comments ./gradlew javadoc reports"

  - group: SQL
    rules:
      - type: script_reusable
        name: "SQL files pass sqlfluff"
        description: "All .sql files pass sqlfluff linting (ANSI dialect by default)"
        script: run-tool-over-matched-files
        requires: sqlfluff
        severity: warn
        instruction: "Fix the SQL lint issues sqlfluff reports, or set your dialect in the project's sqlfluff config"
        args:
          INCLUDE_FILES_GLOB: "*.sql"
          TOOL_COMMAND: "sqlfluff lint --dialect ansi"
          FAIL_ON_FILE_NOT_FOUND: false

  - group: Build & Compilation
    rules:
      - type: script_clean
        name: "Python files parse"
        description: "Every .py file parses into a valid abstract syntax tree (read-only equivalent of check-ast)"
        command: |
          _failed=false
          while IFS= read -r _f; do
            [ -z "$_f" ] && continue
            python3 -c "import ast,sys; ast.parse(open(sys.argv[1]).read())" "$_f" 2>/dev/null || { printf '%s has syntax errors\n' "$_f"; _failed=true; }
          done < <(find . \( -name .git -o -name node_modules -o -name .venv \) -prune -o -name '*.py' -type f -print 2>/dev/null)
          [ "$_failed" = "false" ]
        requires: python3
        severity: error
        instruction: "Fix the Python syntax errors in the listed files"
      - type: script_clean
        name: "Python package builds"
        description: "pyproject-build produces a distribution without error"
        command: "pyproject-build"
        requires: pyproject-build
        severity: error
        instruction: "Fix the build errors reported by: pyproject-build"
      - type: script_reusable
        name: "Run package.json build script"
        description: "Runs the project's own build script through the configured package manager and requires it to exit cleanly"
        script: package-script-clean
        severity: error
        instruction: "Run: pnpm run build"
        args:
          PACKAGE_MANAGER: pnpm
          SCRIPT_NAME: build
      - type: script_clean
        name: "Next.js production build (JS/TS)"
        description: "next build exits cleanly — the production build is not broken (slow; enable when build breakage must block commits)"
        command: "pnpm exec next build"
        requires: pnpm
        severity: error
        instruction: "Fix the build errors reported by: pnpm exec next build"
      - type: script_clean
        name: "Vercel build (JS/TS)"
        description: "vercel build exits cleanly — the Vercel production build is not broken (slow; enable when build breakage must block commits)"
        command: "pnpm exec vercel build"
        requires: pnpm
        severity: error
        instruction: "Fix the build errors reported by: pnpm exec vercel build"
      - type: script_clean
        name: "Maven project compiles (JVM)"
        description: "mvn compile -q exits cleanly"
        command: "mvn compile -q"
        requires: mvn
        severity: error
        instruction: "Fix the compilation errors reported by: mvn compile"
      - type: script_clean
        name: "Gradle project builds (JVM)"
        description: "./gradlew build exits cleanly"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew build -q --no-daemon
        severity: error
        instruction: "Fix the build errors reported by: ./gradlew build"
      - type: script_clean
        name: "Gradle project compiles (JVM)"
        description: "./gradlew compileJava compileTestJava exits cleanly"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew compileJava compileTestJava -q --no-daemon
        severity: error
        instruction: "Fix the compilation errors reported by: ./gradlew compileJava compileTestJava"
      - type: script_clean
        name: "Generate OpenAPI spec (JVM)"
        description: "./gradlew generateOpenApiDocs generates the OpenAPI specification document from the Spring application"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew generateOpenApiDocs --no-daemon
        severity: warn
        mutative: true
        instruction: "Review the generated OpenAPI spec changes before committing"
      - type: script_reusable
        name: "Gradle wrapper present"
        description: "The gradlew wrapper script exists — builds must not depend on a locally installed gradle"
        script: file-or-dir-existence
        severity: error
        instruction: "Run: gradle wrapper, and commit the generated files"
        args:
          FILE_PATH: gradlew
      - type: script_reusable
        name: "No bare gradle invocations"
        description: "Scripts and CI files invoke ./gradlew, never a bare gradle binary"
        script: files-content-scan
        severity: warn
        instruction: "Replace bare gradle invocations with ./gradlew"
        args:
          INCLUDE_FILES_GLOB: ["*.sh", "*.yml", "*.yaml", "Makefile", "Justfile"]
          REGEX_PATTERN: ['(^|[[:space:]])gradle[[:space:]]']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Run package.json ci script"
        description: "Runs the project's own ci script through its package manager and requires it to exit cleanly"
        script: package-script-clean
        severity: error
        instruction: "Run: pnpm run ci"
        args:
          PACKAGE_MANAGER: pnpm
          SCRIPT_NAME: ci

  - group: Tests & Verification
    rules:
      - type: script_clean
        name: "Pytest suite passes (Python)"
        description: "pytest -q exits cleanly"
        command: "pytest -q"
        requires: pytest
        severity: error
        instruction: "Fix the failing tests reported by: pytest"
      - type: script_reusable
        name: "Run package.json test script"
        description: "Runs the project's own test script through its package manager and requires it to exit cleanly"
        script: package-script-clean
        severity: error
        instruction: "Run: npm run test"
        args:
          PACKAGE_MANAGER: npm
          SCRIPT_NAME: test
      - type: script_clean
        name: "Maven tests pass (JVM)"
        description: "mvn test -q exits cleanly"
        command: "mvn test -q"
        requires: mvn
        severity: error
        instruction: "Fix the failing tests reported by: mvn test"
      - type: script_clean
        name: "Gradle tests pass (JVM)"
        description: "./gradlew test --no-daemon exits cleanly"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew test --no-daemon
        severity: error
        instruction: "Fix the failing tests reported by: ./gradlew test"

  - group: Installation & Dependencies
    rules:
      - type: script_reusable
        name: "Lockfile matches package.json"
        description: "The configured package manager's lockfile is in sync with package.json — no drifted or missing lockfile records. Runs against a temp copy so the working tree is never written to"
        script: lockfile-in-sync
        requires: pnpm
        severity: error
        instruction: "Run: pnpm install to update the lockfile, then commit it"
        args:
          PACKAGE_MANAGER: pnpm
      - type: script_reusable
        name: "Package manager install"
        description: "The configured package manager's install resolves dependencies successfully and updates the lockfile. Alternative to the check-only 'Lockfile matches package.json' — enable one or the other, not both"
        script: package-manager-install-write
        requires: pnpm
        severity: warn
        instruction: "Review the lockfile and node_modules changes install made before committing"
        args:
          PACKAGE_MANAGER: pnpm
      - type: script_reusable
        name: "Dependency audit"
        description: "The configured package manager's audit finds no high or critical vulnerabilities in dependencies"
        script: package-manager-audit
        requires: pnpm
        severity: warn
        instruction: "Update the vulnerable dependencies the audit reports"
        args:
          PACKAGE_MANAGER: pnpm
      - type: script_clean
        name: "Depcheck unused dependency scan"
        description: "depcheck finds no unused dependencies in package.json. Complements Knip's own dependency coverage with a different detection heuristic"
        command: "npx depcheck"
        requires: npx
        severity: warn
        instruction: "Remove the unused dependencies depcheck reports, or add accepted false positives to a depcheck config"
      - type: script_clean
        name: "Knip dead export detection"
        description: "No unused exported symbols, files, or dependencies (requires a check:dead script running knip in package.json)"
        command: "pnpm run check:dead"
        requires: pnpm
        severity: warn
        instruction: "Remove the unused exports/files/dependencies knip reports"
      - type: script_clean
        name: "OWASP dependency check (Maven)"
        description: "mvn dependency-check:check finds no known vulnerabilities in dependencies"
        command: "mvn dependency-check:check"
        requires: mvn
        severity: warn
        instruction: "Update the vulnerable dependencies OWASP dependency-check reports"
      - type: script_clean
        name: "OWASP dependency check (Gradle)"
        description: "./gradlew dependencyCheckAnalyze finds no known vulnerabilities in dependencies"
        command: |
          [ -x ./gradlew ] || { printf 'gradlew not found or not executable\n'; exit 1; }
          ./gradlew dependencyCheckAnalyze --no-daemon
        severity: warn
        instruction: "Update the vulnerable dependencies OWASP dependency-check reports"
      - type: script_clean
        name: "Poetry lockfile in sync"
        description: "poetry.lock is in sync with pyproject.toml"
        command: "poetry check --lock"
        requires: poetry
        severity: error
        instruction: "Run: poetry lock, then commit the updated lockfile"
      - type: script_clean
        name: "Pip-audit dependency scan"
        description: "pip-audit finds no known vulnerabilities in installed dependencies"
        command: "pip-audit"
        requires: pip-audit
        severity: warn
        instruction: "Run: pip-audit --fix, or update the vulnerable dependencies"
      - type: script_clean
        name: "Vulture dead code detection"
        description: "vulture finds no unused code, functions, or imports"
        command: "vulture ."
        requires: vulture
        severity: warn
        instruction: "Remove the unused code vulture reports, or add false positives to a vulture whitelist"

  - group: Bundle & Debug Hygiene
    rules:
      - type: script_reusable
        name: "No oversized JS chunks"
        description: "No single built JS chunk in .next/static exceeds 500 KiB"
        script: file-or-dir-size-compare
        severity: warn
        instruction: "Split the oversized chunk (dynamic imports) or trim its dependencies"
        args:
          FILE_PATH: '.next/static/**/*.js'
          COMPARISON_OPERATOR: le
          SIZE_AMOUNT: 500
          SIZE_UNIT: 1024
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "Total static JS under limit"
        description: "The total size of .next/static stays under 3 MiB"
        script: file-or-dir-size-compare
        severity: warn
        instruction: "Reduce the total bundle size: analyze with ANALYZE=true next build"
        args:
          FILE_PATH: '.next/static'
          COMPARISON_OPERATOR: le
          SIZE_AMOUNT: 3
          SIZE_UNIT: 1048576
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No console debug statements"
        description: "No .js, .ts, .jsx, or .tsx file contains forgotten debug statements (console.log, console.debug, or a bare debugger statement)"
        script: files-content-scan
        severity: error
        instruction: "Remove the debug statements from the listed files"
        args:
          INCLUDE_FILES_GLOB: ["*.js", "*.ts", "*.jsx", "*.tsx"]
          REGEX_PATTERN: ['console\.(log|debug)\(', '(^|[[:space:]])debugger([[:space:]]|;|$)']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No System.out debug statements"
        description: "No .java or .kt file contains forgotten debug statements (System.out.print, System.err.print, or printStackTrace)"
        script: files-content-scan
        severity: error
        instruction: "Remove the debug statements from the listed files, and use the project's logger instead"
        args:
          INCLUDE_FILES_GLOB: ["*.java", "*.kt"]
          REGEX_PATTERN: ['System\.(out|err)\.print', 'printStackTrace\(\)']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false
      - type: script_reusable
        name: "No Python debug statements"
        description: "No .py file contains forgotten debug statements (breakpoint(), pdb.set_trace, import pdb)"
        script: files-content-scan
        severity: error
        instruction: "Remove the debug statements from the listed files"
        args:
          INCLUDE_FILES_GLOB: "*.py"
          REGEX_PATTERN: ['\bbreakpoint\(\)', 'pdb\.set_trace', '(^|[[:space:]])import[[:space:]]+pdb\b']
          FAIL_ON_NO_MATCHING_FILE: false
          FAIL_ON_FILE_NOT_FOUND: false

  - group: Claude Settings
    rules:
      - type: script_reusable
        name: ".claude/ directory gitignored"
        description: ".gitignore contains '.claude/' so local Claude Code settings and memory are never committed"
        script: file-line-match
        severity: error
        instruction: "Add '.claude/' to .gitignore"
        args:
          FAIL_ON_FILE_NOT_FOUND: true
          FILE_PATH: .gitignore
          REGEX_PATTERN: '.*\.claude/.*'
      - group: Shared Settings
        rules:
          - type: script_reusable
            name: "Shared Claude settings present"
            description: ".claude/settings.json exists — project-level Claude Code settings are configured"
            script: file-or-dir-existence
            severity: warn
            instruction: "Create .claude/settings.json with the desired Claude Code configuration"
            args:
              FILE_PATH: .claude/settings.json
          - group: Model & Thinking
            rules:
              - type: script_reusable
                name: "Model pinned to sonnet"
                description: "The model key in .claude/settings.json pins the default model to sonnet"
                script: claude-model
                severity: warn
                instruction: "Set \"model\": \"sonnet\" in .claude/settings.json"
                args:
                  CLAUDE_MODEL: sonnet
              - type: script_reusable
                name: "Always thinking enabled"
                description: "alwaysThinkingEnabled in .claude/settings.json is true — extended thinking is on by default for every session"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"alwaysThinkingEnabled\": true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: alwaysThinkingEnabled
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "Effort level is high"
                description: "effortLevel in .claude/settings.json is high — thinking depth persists across sessions"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"effortLevel\": \"high\" in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: effortLevel
                  CLAUDE_SETTING_VALUE: '"high"'
              - type: script_reusable
                name: "sonnet in the model allowlist"
                description: "availableModels in .claude/settings.json lists sonnet — the pinned default model is also offered in the model picker"
                script: json-array-contains
                severity: warn
                instruction: "Add \"sonnet\" to availableModels in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: availableModels
                  EXPECTED_VALUE: '"sonnet"'
          - group: Permissions & Security
            rules:
              - type: script_reusable
                name: "Permission mode is set to bypassPermissions"
                description: "permissions.defaultMode in .claude/settings.json is set to bypassPermissions"
                script: permission-mode
                severity: error
                instruction: "Set permissions.defaultMode to bypassPermissions in .claude/settings.json"
                args:
                  CLAUDE_PERMISSION_MODE: bypassPermissions
              - type: script_reusable
                name: "Deny all curl commands"
                description: ".claude/settings.json denies Bash(curl *) — curl is blocked from Claude tools"
                script: permission-entry
                severity: error
                instruction: "Add 'Bash(curl *)' to permissions.deny in .claude/settings.json"
                args:
                  CLAUDE_PERMISSION_RULE: deny
                  CLAUDE_PERMISSION_TOOL: Bash
                  CLAUDE_PERMISSION_PATTERN: "curl *"
              - type: script_reusable
                name: "Deny all wget commands"
                description: ".claude/settings.json denies Bash(wget *) — wget is blocked from Claude tools"
                script: permission-entry
                severity: error
                instruction: "Add 'Bash(wget *)' to permissions.deny in .claude/settings.json"
                args:
                  CLAUDE_PERMISSION_RULE: deny
                  CLAUDE_PERMISSION_TOOL: Bash
                  CLAUDE_PERMISSION_PATTERN: "wget *"
              - type: script_reusable
                name: "Forbid 'Agent' skill usage"
                description: "'Agent' tool responsible for spawning new sub-agents is denied in .claude/settings.json"
                script: permission-entry
                severity: error
                instruction: "Add 'Agent' to permissions.deny in .claude/settings.json"
                args:
                  CLAUDE_PERMISSION_RULE: deny
                  CLAUDE_PERMISSION_TOOL: Agent
              - type: script_reusable
                name: "Forbid 'Skill' skill usage"
                description: "'Skill' tool responsible for invoking and proposing skills is denied in .claude/settings.json"
                script: permission-entry
                severity: error
                instruction: "Add 'Skill' to permissions.deny in .claude/settings.json"
                args:
                  CLAUDE_PERMISSION_RULE: deny
                  CLAUDE_PERMISSION_TOOL: Skill
              - type: script_reusable
                name: "No additional directories granted"
                description: "permissions.additionalDirectories is absent from .claude/settings.json — file access stays confined to the project root"
                script: json-path-exists
                severity: warn
                instruction: "Remove permissions.additionalDirectories from .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: false
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: permissions.additionalDirectories
                  FAIL_ON_KEY_ABSENCE: false
          - group: Hooks
            rules:
              - type: script_reusable
                name: "Hooks not globally disabled"
                description: "disableAllHooks in .claude/settings.json is not true — lifecycle hooks and the custom status line stay active"
                script: claude-setting-value
                severity: error
                instruction: "Remove \"disableAllHooks\": true from .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: disableAllHooks
                  CLAUDE_SETTING_VALUE: "true"
                  FAIL_ON_VALUE_MISMATCH: false
              - type: script_reusable
                name: "SessionStart syncs the repo"
                description: "A SessionStart command hook in .claude/settings.json runs git pull so every session starts from the latest code"
                script: claude-hook-command
                severity: warn
                instruction: "Add a SessionStart hook running 'git pull' to hooks in .claude/settings.json"
                args:
                  CLAUDE_HOOK_EVENT: SessionStart
                  CLAUDE_HOOK_PATTERN: "git pull"
              - type: script_reusable
                name: "Custom status line configured"
                description: "statusLine.command in .claude/settings.json is set — the project renders its own status line in every session"
                script: json-path-exists
                severity: warn
                instruction: "Set statusLine to {\"type\": \"command\", \"command\": \"<script>\"} in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: statusLine.command
                  FAIL_ON_KEY_ABSENCE: true
          - group: Environment
            rules:
              - type: script_reusable
                name: "NODE_ENV injected as development"
                description: "env.NODE_ENV in .claude/settings.json is development — every command and hook Claude runs inherits it"
                script: claude-env-var
                severity: warn
                instruction: "Set env.NODE_ENV to development in .claude/settings.json"
                args:
                  CLAUDE_ENV_KEY: NODE_ENV
                  CLAUDE_ENV_VALUE: development
          - group: Sandbox & Network
            rules:
              - type: script_reusable
                name: "Sandbox enabled"
                description: "sandbox.enabled in .claude/settings.json is true — Bash commands run with OS-level filesystem and network isolation"
                script: claude-setting-value
                severity: error
                instruction: "Set sandbox.enabled to true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: sandbox.enabled
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "Sandboxed commands auto-allowed"
                description: "sandbox.autoAllowBashIfSandboxed in .claude/settings.json is true — isolated commands skip permission prompts"
                script: claude-setting-value
                severity: warn
                instruction: "Set sandbox.autoAllowBashIfSandboxed to true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: sandbox.autoAllowBashIfSandboxed
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "git excluded from the sandbox"
                description: "sandbox.excludedCommands in .claude/settings.json lists git — git runs outside the sandbox boundary"
                script: json-array-contains
                severity: warn
                instruction: "Add \"git\" to sandbox.excludedCommands in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: sandbox.excludedCommands
                  EXPECTED_VALUE: '"git"'
              - type: script_reusable
                name: "github.com reachable from the sandbox"
                description: "sandbox.network.allowedDomains in .claude/settings.json lists github.com — git-over-HTTPS and the gh CLI keep working inside the sandbox"
                script: json-array-contains
                severity: warn
                instruction: "Add \"github.com\" to sandbox.network.allowedDomains in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: sandbox.network.allowedDomains
                  EXPECTED_VALUE: '"github.com"'
          - group: Git Integration
            rules:
              - type: script_reusable
                name: "Git instructions included"
                description: "includeGitInstructions in .claude/settings.json is true — the built-in git workflow rules stay in the system prompt"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"includeGitInstructions\": true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: includeGitInstructions
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "Commit attribution is the Alan trailer"
                description: "attribution.commit in .claude/settings.json is the project's mandated trailer, replacing the default Claude co-author line"
                script: claude-setting-value
                severity: error
                instruction: "Set attribution.commit to \"Co-Authored-By: Alan <noreply@archicode.ai>\" in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: attribution.commit
                  CLAUDE_SETTING_VALUE: '"Co-Authored-By: Alan <noreply@archicode.ai>"'
          - group: Memory & Retention
            rules:
              - type: script_reusable
                name: "Auto memory enabled"
                description: "autoMemoryEnabled in .claude/settings.json is true — Claude persists learned project context across sessions"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"autoMemoryEnabled\": true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: autoMemoryEnabled
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "Transcript retention is 30 days"
                description: "cleanupPeriodDays in .claude/settings.json is 30 — session transcripts are kept 30 days before startup cleanup"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"cleanupPeriodDays\": 30 in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: cleanupPeriodDays
                  CLAUDE_SETTING_VALUE: "30"
              - type: script_reusable
                name: "File checkpointing enabled"
                description: "fileCheckpointingEnabled in .claude/settings.json is true — files are snapshotted before edits so /rewind can restore them"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"fileCheckpointingEnabled\": true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: fileCheckpointingEnabled
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "Vendored CLAUDE.md files excluded"
                description: "claudeMdExcludes in .claude/settings.json lists node_modules/** — CLAUDE.md files shipped inside installed dependencies never load into context"
                script: json-array-contains
                severity: warn
                instruction: "Add \"node_modules/**\" to claudeMdExcludes in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: claudeMdExcludes
                  EXPECTED_VALUE: '"node_modules/**"'
          - group: MCP & Plugins
            rules:
              - type: script_reusable
                name: "Project MCP servers auto-approved"
                description: "enableAllProjectMcpServers in .claude/settings.json is true — servers declared in .mcp.json connect without prompting"
                script: claude-setting-value
                severity: warn
                instruction: "Set \"enableAllProjectMcpServers\": true in .claude/settings.json"
                args:
                  CLAUDE_SETTING_KEY: enableAllProjectMcpServers
                  CLAUDE_SETTING_VALUE: "true"
              - type: script_reusable
                name: "github MCP server allowlisted"
                description: "enabledMcpjsonServers in .claude/settings.json lists github — the .mcp.json server named github is approved explicitly by name"
                script: json-array-contains
                severity: warn
                instruction: "Add \"github\" to enabledMcpjsonServers in .claude/settings.json"
                args:
                  FAIL_ON_FILE_NOT_FOUND: true
                  FILE_PATH: .claude/settings.json
                  JSON_PATH: enabledMcpjsonServers
                  EXPECTED_VALUE: '"github"'
enums:
  - id: file-naming-convention
    name: "File naming convention"
    description: "Regex patterns for identifier naming conventions — validates symbol casing across source code, configs, and file names. Underscore/hyphen-based variants additionally permit '.' as a separator character."
    type: regex
    values:
      - name: camelCase
        value: "^[a-z]+([A-Z][a-z0-9]*)*$"
        description: "First word lowercase, subsequent words capitalized, no separators. Also known as lowerCamelCase or dromedaryCase. Used for local variables and functions in JavaScript, Java, TypeScript."
      - name: PascalCase
        value: "^([A-Z][a-z0-9]*)+$"
        description: "Every word capitalized, no separators. Also known as UpperCamelCase or CapitalCamelCase. Used for class names in almost all languages and React components."
      - name: snake_case
        value: "^[a-z0-9]+([_.][a-z0-9]+)*$"
        description: "All words lowercase, separated by underscores (_). Also known as pothole_case or c_case. Used for variables and functions in Python, Ruby, C++, and SQL column names."
      - name: kebab-case
        value: "^[a-z0-9]+([-.][a-z0-9]+)*$"
        description: "All words lowercase, separated by hyphens (-). Also known as spinal-case, dash-case, or lisp-case. Used for URL slugs, CSS class names, and HTML tags."
      - name: SCREAMING_SNAKE_CASE
        value: "^[A-Z0-9]+([_.][A-Z0-9]+)*$"
        description: "All uppercase letters, separated by underscores. Also known as CONSTANT_CASE or MACRO_CASE. Used for global constants, configuration environment variables (.env), and macros."
      - name: Camel_Snake_Case
        value: "^[a-z0-9]+([_.][A-Z][a-z0-9]*)*$"
        description: "First word lowercase, subsequent words capitalized, separated by underscores. Rare; occasionally used in specific API properties or testing frameworks."
      - name: Pascal_Snake_Case
        value: "^[A-Z][a-z0-9]*([_.][A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by underscores. Also known as Ada_Case. Default naming convention in Ada and legacy Java packages."
      - name: Train-Case
        value: "^[A-Z][a-z0-9]*([-.][A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by hyphens. Also known as HTTP-Header-Case. Standard format for HTTP Header keys."
      - name: SCREAMING-KEBAB-CASE
        value: "^[A-Z0-9]+([-.][A-Z0-9]+)*$"
        description: "All uppercase letters, separated by hyphens. Also known as COBOL-CASE. Used in legacy programming languages like COBOL and mainframe systems."
      - name: Capitalized kebab-case
        value: "^[A-Z][a-z0-9]*([-.][a-z0-9]+)*$"
        description: "First word capitalized, remaining words lowercase, separated by hyphens (dots also permitted as separators). Distinct from Train-Case, which capitalizes every word."
      - name: Capitalized snake_case
        value: "^[A-Z][a-z0-9]*([_.][a-z0-9]+)*$"
        description: "First word capitalized, remaining words lowercase, separated by underscores (dots also permitted as separators). Distinct from Pascal_Snake_Case, which capitalizes every word."
      - name: flatcase
        value: "^[a-z0-9]+$"
        description: "No spaces, no symbols. All lowercase, completely smashed together with no separation. Also known as flat lowercase, lowercase, or mumblecase. Used for HTML tags/attributes and package names in Java/Go (e.g., package main)."
      - name: UPPERFLATCASE
        value: "^[A-Z0-9]+$"
        description: "No spaces, no symbols. All uppercase, smashed together. Also known as UPPERCASE. Used for system commands or legacy database restrictions."
      - name: Title Case
        value: "^[A-Z][a-z0-9]*( [A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by spaces. Used for UI labels, button text, menu items, and display strings — not valid as a code identifier in most languages."


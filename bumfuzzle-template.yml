scripts:
  - group: "Claude Settings"
    scripts:
      - id: permission-mode
        name: "Permission mode"
        description: "Checks that permissions.defaultMode in .claude/settings.json matches the expected value"
        command: |
          [ ! -f .claude/settings.json ] && exit 1
          jq -e --arg m "$MODE" '.permissions.defaultMode == $m' .claude/settings.json > /dev/null
        args:
          - key: MODE
            label: "Expected permission mode"
            type: enum
            required: true
            enum_ref: claude-permission-mode

      - id: permission-entry
        name: "Permission entry"
        description: "Checks that .claude/settings.json contains a specific deny/allow/ask entry for a given tool and optional pattern"
        command: |
          [ ! -f .claude/settings.json ] && exit 1
          _entry="$TOOL"
          [ -n "${PATTERN:-}" ] && _entry="${TOOL}(${PATTERN})"
          jq -e --arg r "$RULE" --arg e "$_entry" '(.permissions[$r] // []) | index($e) != null' .claude/settings.json > /dev/null
        args:
          - key: RULE
            label: "Rule type"
            type: enum
            required: true
            enum_ref: claude-rule
          - key: TOOL
            label: "Claude tool"
            type: enum
            required: true
            enum_ref: claude-tool
          - key: PATTERN
            label: "Pattern (optional)"
            type: string
            required: false
            placeholder: "curl *"

  - group: "File Meta Checks"
    scripts:
      - id: file-or-dir-existence
        name: "File or directory existence"
        description: "Checks whether a file or directory exists at the given path."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          if [[ "$FILE_PATH" == *"**/"* ]]; then
            _root="${FILE_PATH%%\*\*/*}"
            _hit=$(find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" 2>/dev/null | head -1)
          elif [[ "$FILE_PATH" == */* ]]; then
            _hit=$(find "." -path "./$FILE_PATH" 2>/dev/null | head -1)
          else
            _hit=$(find "." -name "$FILE_PATH" 2>/dev/null | head -1)
          fi
          if [[ "$EXPECT" == "present" ]]; then
            [[ -n "$_hit" ]] || { printf 'FAIL: %s not found (expected present)\n' "$FILE_PATH"; exit 1; }
          else
            [[ -z "$_hit" ]] || { printf 'FAIL: %s exists (expected absent)\n' "$FILE_PATH"; exit 1; }
          fi
        args:
          - key: FILE_PATH
            label: "File or directory path"
            type: path
            required: true
            placeholder: "README.md"
          - arg_ref: expect-presence
      - id: yaml-valid
        name: "YAML valid"
        description: "Checks that all files matching FILE_PATH (glob-capable) parse as valid YAML. Every matched file must pass; no matches is a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            yq '.' "$_f" > /dev/null 2>&1 || { printf 'FAIL: %s is not valid YAML\n' "$_f"; _failed=true; }
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: "YAML file path or glob"
            type: path
            required: true
            placeholder: "config.yml"
      - id: json-valid
        name: "JSON valid"
        description: "Checks that all files matching FILE_PATH (glob-capable) parse as valid JSON. Every matched file must pass; no matches is a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            jq empty "$_f" > /dev/null 2>&1 || { printf 'FAIL: %s is not valid JSON\n' "$_f"; _failed=true; }
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: "JSON file path or glob"
            type: path
            required: true
            placeholder: "package.json"
      - id: bash-valid
        name: "Bash valid"
        description: "Checks that all files matching FILE_PATH (glob-capable) pass bash -n syntax validation. Every matched file must pass; no matches is a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _failed=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            bash -n "$_f" 2>/dev/null || { printf 'FAIL: %s has bash syntax errors\n' "$_f"; _failed=true; }
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: "Shell script path or glob"
            type: path
            required: true
            placeholder: "scripts/deploy.sh"
      - id: file-names-match
        name: "File names match"
        description: "Checks that all file basenames matching includeFilesGlob (and not matching excludeFilesGlob) satisfy the checkPattern regex. Searches under 'from' up to 'depth' levels deep. depth 1 means files directly inside 'from'; omit for unlimited depth. excludeFilesGlob matches on filename only, not full path."
        command: |
          [[ "$FROM" =~ \.\. ]] && { printf 'FROM must not contain ..\n'; exit 1; }
          _depth_arg=""
          if [[ -n "$DEPTH" && "$DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $DEPTH"
          fi
          _from="${FROM:-.}"
          _exclude_args=""
          if [[ -n "$EXCLUDE_FILES_GLOB" ]]; then
            _exclude_args="-not -name $EXCLUDE_FILES_GLOB"
          fi
          _failed=false
          while IFS= read -r _f; do
            _base=$(basename "$_f")
            if ! echo "$_base" | grep -qE "$CHECK_PATTERN"; then
              printf 'FAIL: %s does not match %s\n' "$_f" "$CHECK_PATTERN"
              _failed=true
            fi
          done < <(find "$_from" $_depth_arg -name "$INCLUDE_FILES_GLOB" $_exclude_args -type f 2>/dev/null)
          [[ "$_failed" == "false" ]]
        args:
          - arg_ref: search-from
          - arg_ref: search-depth
          - arg_ref: include-files-glob
          - arg_ref: exclude-files-glob
          - key: CHECK_PATTERN
            label: "Check pattern"
            type: string
            required: true
            placeholder: "^[A-Z][a-zA-Z0-9]+\\.java$"
            description: "Regex applied to each matched file's basename. Files not matching will fail the check."

      - id: file-naming-convention-check
        name: "File naming convention check"
        description: "Checks that all file basenames matching includeFilesGlob (and not matching excludeFilesGlob) comply with the selected naming convention (or don't, if EXPECT: no_match). Searches under 'from' up to 'depth' levels deep. depth 1 means files directly inside 'from'; omit for unlimited depth. excludeFilesGlob matches on filename only, not full path. Every matched file must comply. ON_NO_MATCH controls whether zero matches is a fail (default) or a pass."
        command: |
          [[ "$FROM" =~ \.\. ]] && { printf 'FROM must not contain ..\n'; exit 1; }
          _depth_arg=""
          if [[ -n "$DEPTH" && "$DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $DEPTH"
          fi
          _from="${FROM:-.}"
          _exclude_args=""
          if [[ -n "$EXCLUDE_FILES_GLOB" ]]; then
            _exclude_args="-not -name $EXCLUDE_FILES_GLOB"
          fi
          _failed=false
          _any=false
          while IFS= read -r _f; do
            _any=true
            _base=$(basename "$_f")
            _match=false
            echo "$_base" | grep -qE "$CASE" && _match=true
            if [[ "${EXPECT:-match}" == "match" ]]; then
              if [[ "$_match" == "false" ]]; then
                printf 'FAIL: %s does not match naming convention %s\n' "$_f" "$CASE"
                _failed=true
              fi
            else
              if [[ "$_match" == "true" ]]; then
                printf 'FAIL: %s unexpectedly matches naming convention %s\n' "$_f" "$CASE"
                _failed=true
              fi
            fi
          done < <(find "$_from" $_depth_arg -name "$INCLUDE_FILES_GLOB" $_exclude_args -type f 2>/dev/null)
          if [[ "$_any" == "false" && "${ON_NO_MATCH:-fail}" == "fail" ]]; then
            printf 'FAIL: no files matched %s under %s\n' "$INCLUDE_FILES_GLOB" "$_from"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - arg_ref: search-from
          - arg_ref: search-depth
          - arg_ref: include-files-glob
          - arg_ref: exclude-files-glob
          - key: CASE
            label: "Naming convention"
            type: enum
            required: true
            enum_ref: file-naming-convention
          - arg_ref: expect
          - arg_ref: on-no-match

      - id: file-or-dir-size-compare
        name: "File or directory size"
        description: "Checks that all files/directories matching FILE_PATH (glob-capable) satisfy AMOUNT UNIT compared via OPERATOR (e.g. AMOUNT=5, UNIT=MiB, OPERATOR=le means every match must be <= 5 MiB). Directories are measured as their recursive total size. Every match must comply. ON_NO_MATCH controls whether zero matches is a fail (default) or a pass."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          case "$OPERATOR" in lt|le|eq|ge|gt) ;; *) printf 'Unrecognized OPERATOR %s\n' "$OPERATOR"; exit 1 ;; esac
          _threshold=$((10#$AMOUNT * UNIT))
          _failed=false
          _any=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            _any=true
            if [[ -d "$_f" ]]; then
              _size=$(( $(du -sk "$_f" 2>/dev/null | awk '{print $1}') * 1024 ))
            else
              _size=$(stat -f%z "$_f" 2>/dev/null || stat -c%s "$_f" 2>/dev/null)
            fi
            _ok=false
            case "$OPERATOR" in
              lt) [[ "$_size" -lt "$_threshold" ]] && _ok=true ;;
              le) [[ "$_size" -le "$_threshold" ]] && _ok=true ;;
              eq) [[ "$_size" -eq "$_threshold" ]] && _ok=true ;;
              ge) [[ "$_size" -ge "$_threshold" ]] && _ok=true ;;
              gt) [[ "$_size" -gt "$_threshold" ]] && _ok=true ;;
            esac
            if [[ "$_ok" == "false" ]]; then
              printf 'FAIL: %s size %s does not satisfy %s %s\n' "$_f" "$_size" "$OPERATOR" "$_threshold"
              _failed=true
            fi
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" 2>/dev/null
            else
              find "." -name "$FILE_PATH" 2>/dev/null
            fi
          )
          if [[ "$_any" == "false" && "${ON_NO_MATCH:-fail}" == "fail" ]]; then
            printf 'FAIL: no files matched %s\n' "$FILE_PATH"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: "File or directory path or glob"
            type: path
            required: true
            placeholder: "**/*.log"
          - key: OPERATOR
            label: "Operator"
            type: enum
            required: true
            enum_ref: comparison-operator
          - key: AMOUNT
            label: "Amount"
            type: integer
            required: true
            placeholder: "5"
          - key: UNIT
            label: "Unit"
            type: enum
            required: true
            enum_ref: size-unit
          - arg_ref: on-no-match

      - id: json-path-value
        name: "JSON path value"
        description: "Checks that a dot-separated key path in a JSON file resolves to VALUE (JSON-encoded, e.g. \"foo\", 42, true, null). Passes if at least one file matching FILE_PATH (glob-capable) satisfies it; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          [[ "$JSON_PATH" =~ ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*$ ]] || { printf 'JSON_PATH contains invalid characters (each segment must start with a letter or underscore)\n'; exit 1; }
          jq empty <<<"$VALUE" > /dev/null 2>&1 || { printf 'VALUE is not valid JSON (strings need quotes, e.g. "foo")\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            jq -e --argjson v "$VALUE" ".${JSON_PATH} == \$v" "$_f" > /dev/null 2>&1 && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "JSON file path or glob"
            type: path
            required: true
            placeholder: "package.json"
          - key: JSON_PATH
            label: "Key path (dot-separated)"
            type: string
            required: true
            placeholder: "a.b.c"
          - key: VALUE
            label: "Expected value (JSON-encoded)"
            type: string
            required: true
            placeholder: '"foo"'
          - arg_ref: expect

      - id: yaml-path-value
        name: "YAML path value"
        description: "Checks that a dot-separated key path in a YAML file resolves to VALUE (JSON-encoded, e.g. \"foo\", 42, true, null). Passes if at least one file matching FILE_PATH (glob-capable) satisfies it; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          [[ "$YAML_PATH" =~ ^[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*$ ]] || { printf 'YAML_PATH contains invalid characters (each segment must start with a letter or underscore)\n'; exit 1; }
          jq empty <<<"$VALUE" > /dev/null 2>&1 || { printf 'VALUE is not valid JSON (strings need quotes, e.g. "foo")\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            yq -o=json "$_f" 2>/dev/null | jq -e --argjson v "$VALUE" ".${YAML_PATH} == \$v" > /dev/null 2>&1 && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "YAML file path or glob"
            type: path
            required: true
            placeholder: "config.yml"
          - key: YAML_PATH
            label: "Key path (dot-separated)"
            type: string
            required: true
            placeholder: "a.b.c"
          - key: VALUE
            label: "Expected value (JSON-encoded)"
            type: string
            required: true
            placeholder: '"foo"'
          - arg_ref: expect

  - group: "File Content Checks"
    scripts:
      - id: file-line-contains
        name: "File line contains"
        description: "Checks that a regex pattern matches (or does not match) a substring of at least one line in a file. Defaults to match; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            grep -qE "$PATTERN" "$_f" 2>/dev/null && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "File path or glob"
            type: path
            required: true
            placeholder: ".gitignore"
          - key: PATTERN
            label: "Pattern (regex)"
            type: regex
            required: true
            placeholder: '\.DS_Store'
          - arg_ref: expect

      - id: file-line-match
        name: "File line match"
        description: "Checks that a regex pattern matches (or does not match) an entire line in a file. Defaults to match; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            grep -qxE "$PATTERN" "$_f" 2>/dev/null && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "File path or glob"
            type: path
            required: true
            placeholder: ".gitignore"
          - key: PATTERN
            label: "Pattern (regex)"
            type: regex
            required: true
            placeholder: '\.DS_Store'
          - arg_ref: expect

      - id: file-word-match
        name: "File word match"
        description: "Checks that a regex pattern matches (or does not match) a whole word in a file. Defaults to match; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            grep -qwE "$PATTERN" "$_f" 2>/dev/null && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "File path or glob"
            type: path
            required: true
            placeholder: ".gitignore"
          - key: PATTERN
            label: "Pattern (regex)"
            type: regex
            required: true
            placeholder: "TODO"
          - arg_ref: expect

      - id: file-content-match
        name: "File content match"
        description: "Checks that a regex pattern matches (or does not match) anywhere across a file's whole content, not line-by-line. Passes if at least one file matching FILE_PATH (glob-capable) satisfies it; set EXPECT: no_match to invert."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          _found=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            PATTERN="$PATTERN" perl -0777 -ne 'exit(/$ENV{PATTERN}/ ? 0 : 1)' "$_f" 2>/dev/null && _found=true && break
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" -type f 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" -type f 2>/dev/null
            else
              find "." -name "$FILE_PATH" -type f 2>/dev/null
            fi
          )
          if [[ "${EXPECT:-match}" == "match" ]]; then $_found; else ! $_found; fi
        args:
          - key: FILE_PATH
            label: "File path or glob"
            type: path
            required: true
            placeholder: "*.md"
          - key: PATTERN
            label: "Pattern (regex, multi-line)"
            type: regex
            required: true
            placeholder: '(?s)Copyright.*\d{4}'
          - arg_ref: expect

rules:
  - group: Bumfuzzle
    rules:
      - type: script_reusable
        name: "Preflight wired into pre-commit"
        description: "preflight.sh is called inside the pre-commit hook so checks run before every commit"
        script: file-line-contains
        severity: hard-stop
        instruction: "Add a call to preflight.sh in .githooks/pre-commit"
        args:
          FILE_PATH: .githooks/pre-commit
          PATTERN: preflight
      - type: script_reusable
        name: "bumfuzzle.yml parses cleanly"
        description: "bumfuzzle.yml is syntactically valid YAML — yq can parse it without errors"
        script: yaml-valid
        severity: hard-stop
        instruction: "Fix YAML syntax errors in bumfuzzle.yml"
        args:
          FILE_PATH: bumfuzzle.yml
      - type: script_clean
        name: "bumfuzzle.yml validation rules are well-formed"
        description: "Every rule under .validation.* has a boolean enabled (if set), a valid severity (if set), only lists for sequence fields, and selected_hints that reference existing hint keys"
        command: |
          ok=true
          while IFS= read -r rule; do
            [[ -z "${rule// }" || "$rule" == "null" ]] && continue
            enabled_type=$(yq ".validation.\"${rule}\".enabled | type" bumfuzzle.yml 2>/dev/null)
            if [[ "$enabled_type" != "null" && "$enabled_type" != "!!null" && "$enabled_type" != "!!bool" ]]; then
              echo "validation.$rule.enabled must be a boolean, got $enabled_type"
              ok=false
            fi
            sev=$(yq ".validation.\"${rule}\".severity // \"\"" bumfuzzle.yml 2>/dev/null || true)
            if [[ -n "$sev" && "$sev" != "null" ]]; then
              case "$sev" in warn|error|hard-stop) ;;
                *) echo "validation.$rule.severity '$sev' is invalid (valid: warn, error, hard-stop)"; ok=false ;;
              esac
            fi
            for field in selected_hints files dirs patterns checks; do
              field_type=$(yq ".validation.\"${rule}\".\"${field}\" | type" bumfuzzle.yml 2>/dev/null)
              if [[ "$field_type" != "null" && "$field_type" != "!!null" && "$field_type" != "!!seq" ]]; then
                echo "validation.$rule.$field must be a list, got $field_type"
                ok=false
              fi
            done
          done < <(yq '.validation | keys | .[]' bumfuzzle.yml 2>/dev/null || true)
          [[ "$ok" == true ]]
        severity: hard-stop
        instruction: "Fix the reported validation rule fields in bumfuzzle.yml"
      - type: script_clean
        name: "bumfuzzle.yml env.vars is a list"
        description: "If env.vars is defined in bumfuzzle.yml it must be a YAML sequence, not a scalar or map"
        command: |
          t=$(yq '.env.vars | type' bumfuzzle.yml 2>/dev/null)
          [[ "$t" == "null" || "$t" == "!!null" || "$t" == "!!seq" ]]
        severity: hard-stop
        instruction: "Change env.vars in bumfuzzle.yml to a list (or remove it)"

  - group: General
    rules:
      - type: script_reusable
        name: "Readme present"
        description: "README.md exists at the project root"
        script: file-or-dir-existence
        severity: error
        instruction: "Create README.md in the project root"
        args:
          FILE_PATH: README.md
          EXPECT: present
      - type: script_clean
        name: "Single manifest file"
        description: "At most one package manifest (package.json, Cargo.toml, go.mod, etc.) exists at the root — multiple manifests indicate a misconfigured or hybrid project"
        command: "test $(find . -maxdepth 1 \\( -name 'package.json' -o -name 'Cargo.toml' -o -name 'pom.xml' -o -name 'go.mod' -o -name 'pyproject.toml' \\) | wc -l | tr -d ' ') -le 1"
        severity: warn
        instruction: "Remove duplicate manifest files from the project root"

  - group: Git
    rules:
      - group: Versioning
        rules:
          - type: script_clean
            name: "No AI co-authors in history"
            description: "No commit in the repository history lists Claude as a co-author"
            command: "! git log --format='%b' | grep -qi 'co-authored-by: claude'"
            severity: error
            instruction: "Review and amend commits: git log --grep='Co-Authored-By: Claude' -i --oneline"
          - type: script_reusable
            name: "No AI co-author in commit message"
            description: "The staged commit message does not contain a Co-Authored-By: Claude line"
            script: file-line-contains
            severity: hard-stop
            instruction: "Remove Co-Authored-By lines from the commit message"
            args:
              FILE_PATH: .git/COMMIT_EDITMSG
              PATTERN: 'Co-Authored-By: Claude'
              EXPECT: no_match
      - group: Hooks
        rules:
          - type: script_clean
            name: "Hooks installed and checksums match"
            description: "Every file in .githooks/ is present in .git/hooks/ and their SHA-256 checksums match — no stale or tampered hooks"
            command: |
              _sha256() { command -v sha256sum >/dev/null 2>&1 && sha256sum "$@" || shasum -a 256 "$@"; }
              for f in .githooks/*; do
                [ -f "$f" ] || continue
                name=$(basename "$f")
                [ -f ".git/hooks/$name" ] || { echo "Missing: $name"; exit 1; }
                _sha256 "$f" ".git/hooks/$name" | awk '{print $1}' | sort -u | wc -l | grep -q 1 || { echo "Mismatch: $name"; exit 1; }
              done
            severity: error
            instruction: "Run: scripts/hooks.sh --force to reinstall hooks"
          - type: script_reusable
            name: "CONFIG_APPROVED guard declared"
            description: ".githooks/pre-commit references the CONFIG_APPROVED environment variable guard"
            script: file-line-contains
            severity: warn
            instruction: "Add a CONFIG_APPROVED guard in .githooks/pre-commit"
            args:
              FILE_PATH: .githooks/pre-commit
              PATTERN: CONFIG_APPROVED
          - type: script_reusable
            name: "DOCS_APPROVED guard declared"
            description: ".githooks/pre-commit references the DOCS_APPROVED environment variable guard"
            script: file-line-contains
            severity: warn
            instruction: "Add a DOCS_APPROVED guard in .githooks/pre-commit"
            args:
              FILE_PATH: .githooks/pre-commit
              PATTERN: DOCS_APPROVED
          - type: script_reusable
            name: "ENV_APPROVED guard declared"
            description: ".githooks/pre-commit references the ENV_APPROVED environment variable guard"
            script: file-line-contains
            severity: warn
            instruction: "Add an ENV_APPROVED guard in .githooks/pre-commit"
            args:
              FILE_PATH: .githooks/pre-commit
              PATTERN: ENV_APPROVED
      - group: Gitignore
        rules:
          - type: script_reusable
            name: ".gitignore present"
            description: ".gitignore exists at the project root"
            script: file-or-dir-existence
            severity: error
            instruction: "Create .gitignore at the project root"
            args:
              FILE_PATH: .gitignore
              EXPECT: present
          - type: script_clean
            name: "bumfuzzle extra patterns gitignored"
            description: "Every extra pattern declared in bumfuzzle.yml under gitignore.extra_patterns is also listed in .gitignore"
            command: |
              count=$(yq '.gitignore.extra_patterns | length' bumfuzzle.yml 2>/dev/null || echo 0)
              [[ "${count}" =~ ^[0-9]+$ ]] || count=0
              [ "$count" -eq 0 ] && exit 0
              rc=0
              while IFS= read -r pat; do
                grep -qF "$pat" .gitignore 2>/dev/null || { echo "Missing from .gitignore: $pat"; rc=1; }
              done < <(yq '.gitignore.extra_patterns[]' bumfuzzle.yml 2>/dev/null)
              exit $rc
            severity: warn
            instruction: "Add the missing pattern to .gitignore, or remove it from gitignore.extra_patterns in bumfuzzle.yml"
          - type: script_clean
            name: "No ignored files in git index"
            description: "No file currently tracked by git would be matched by .gitignore — no stale cached files that should be ignored"
            command: "! git ls-files --cached | while IFS= read -r f; do git check-ignore -q \"$f\" && echo \"$f\"; done | grep -q ."
            severity: warn
            instruction: "Run: git rm -r --cached <file> for any ignored files still tracked"
          - type: script_clean
            name: "No committed .env.* files"
            description: "No .env.* file (except .env.template) is tracked in the git index — secrets must not be committed"
            command: "! git ls-files | grep -E '^\\.env\\.' | grep -v '^\\.env\\.template$' | grep -q ."
            severity: error
            instruction: "Run: git rm --cached <file> for each tracked .env.* file, then ensure .env.* is in .gitignore"
          - group: Ignore Patterns
            rules:
              - type: script_reusable
                name: ".DS_Store ignored"
                description: ".gitignore contains a pattern covering .DS_Store macOS metadata files"
                script: file-line-contains
                severity: warn
                instruction: "Add '.DS_Store' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: 'DS_Store'
              - type: script_reusable
                name: ".idea/ ignored"
                description: ".gitignore contains a pattern covering the .idea/ IntelliJ project directory"
                script: file-line-contains
                severity: warn
                instruction: "Add '.idea/' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '\.idea/'
              - type: script_reusable
                name: "*.iml ignored"
                description: ".gitignore contains a pattern covering *.iml IntelliJ module files"
                script: file-line-contains
                severity: warn
                instruction: "Add '*.iml' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '\*\.iml'
              - type: script_reusable
                name: "*.iws ignored"
                description: ".gitignore contains a pattern covering *.iws IntelliJ workspace files"
                script: file-line-contains
                severity: warn
                instruction: "Add '*.iws' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '\*\.iws'
              - type: script_reusable
                name: ".vscode/ ignored"
                description: ".gitignore contains a pattern covering .vscode/ VS Code editor settings"
                script: file-line-contains
                severity: warn
                instruction: "Add '.vscode/' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '\.vscode/'
              - type: script_reusable
                name: ".env.* gitignored"
                description: ".gitignore contains a pattern excluding .env.* environment files — real secrets must not be committed"
                script: file-line-contains
                severity: error
                instruction: "Add '.env.*' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '^\.env\.'
              - type: script_reusable
                name: "tmp/ ignored"
                description: ".gitignore contains 'tmp/' so its contents are never accidentally committed"
                script: file-line-contains
                severity: warn
                instruction: "Add 'tmp/' to .gitignore"
                args:
                  FILE_PATH: .gitignore
                  PATTERN: '^tmp/'

  - group: Environment Variables
    rules:
      - type: script_reusable
        name: ".env.template present"
        description: ".env.template exists at the project root and declares all required environment variable keys"
        script: file-or-dir-existence
        severity: error
        instruction: "Create .env.template declaring all required environment variables"
        args:
          FILE_PATH: .env.template
          EXPECT: present
      - type: script_clean
        name: "All template keys in every .env.* file"
        description: "Every key declared in .env.template is present in each .env.* file — no environment is missing a declared variable"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          [ -z "$tmpl" ] && exit 0
          rc=0
          for ef in .env.*; do
            [ -f "$ef" ] && [ "$ef" != ".env.template" ] || continue
            missing=$(comm -23 <(printf '%s\n' "$tmpl") <(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort -u))
            [ -n "$missing" ] && printf 'Missing in %s: %s\n' "$ef" "$missing" && rc=1
          done
          exit $rc
        severity: error
        instruction: "Add missing keys from .env.template to each .env.* file"
      - type: script_clean
        name: "No undeclared keys in .env.* files"
        description: "Every key in each .env.* file is declared in .env.template — no undocumented variables exist in any environment"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          [ -z "$tmpl" ] && exit 0
          rc=0
          for ef in .env.*; do
            [ -f "$ef" ] && [ "$ef" != ".env.template" ] || continue
            extra=$(comm -13 <(printf '%s\n' "$tmpl") <(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort -u))
            [ -n "$extra" ] && printf 'Undeclared in %s: %s\n' "$ef" "$extra" && rc=1
          done
          exit $rc
        severity: error
        instruction: "Add undeclared keys to .env.template or remove them from .env.* files"
      - type: script_clean
        name: ".env.template values are placeholders"
        description: "All values in .env.template are uppercase placeholder strings — no real secrets committed"
        command: "[ ! -f .env.template ] && exit 0; ! grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | grep -vE '=([A-Z_][A-Z0-9_]*)?$' | grep -q ."
        severity: warn
        instruction: "Replace real values in .env.template with uppercase placeholders like MY_KEY=PLACEHOLDER"
      - type: script_clean
        name: "No empty values in .env.* files"
        description: "Every key in each .env.* file has a non-empty value — blank values indicate missing or forgotten configuration"
        command: |
          rc=0
          while IFS= read -r ef; do
            while IFS= read -r line; do
              case "$line" in ''|\#*) continue ;; esac
              val="${line#*=}"
              [ -z "${val// }" ] && printf 'Blank value in %s: %s\n' "$ef" "${line%%=*}" && rc=1
            done < "$ef"
          done < <(find . -maxdepth 1 -name '.env.*' -not -name '.env.template' -type f | sort)
          exit $rc
        severity: error
        instruction: "Set a non-empty value for every blank key in .env.* files"
      - type: script_clean
        name: "No duplicate keys in .env.* files"
        description: "Each .env.* file declares every key at most once — duplicate keys cause unpredictable precedence behavior"
        command: |
          rc=0
          while IFS= read -r ef; do
            dups=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$ef" | cut -d= -f1 | sort | uniq -d)
            [ -n "$dups" ] && printf 'Duplicate keys in %s: %s\n' "$ef" "$dups" && rc=1
          done < <(find . -maxdepth 1 -name '.env.*' -type f | sort)
          exit $rc
        severity: error
        instruction: "Remove duplicate key declarations from .env.* files"

  - group: Docker
    rules:
      - type: script_reusable
        name: "Dockerfile present"
        description: "A Dockerfile exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create a Dockerfile at the project root"
        args:
          FILE_PATH: Dockerfile
          EXPECT: present
      - type: script_clean
        name: "Compose files render without errors"
        description: "All docker-compose*.yml files in the project pass docker compose config — no unresolved variables or syntax errors"
        command: "find . -maxdepth 2 -name 'docker-compose*.yml' | while IFS= read -r f; do docker compose -f \"$f\" config --quiet || exit 1; done"
        severity: error
        instruction: "Run: docker compose -f <file> config to see render errors"
      - type: script_reusable
        name: "No :latest image tags"
        description: "No Docker image reference in *.yml files uses :latest — all images must be pinned to a specific version for reproducible builds"
        script: file-line-contains
        severity: error
        instruction: "Pin image tags to a specific version instead of :latest"
        args:
          FILE_PATH: '*.yml'
          PATTERN: 'image:.*:latest'
          EXPECT: no_match
      - type: script_clean
        name: "Docker env vars declared in .env.template"
        description: "Every environment variable referenced in Docker compose files is declared in .env.template — no undocumented container configuration"
        command: |
          [ ! -f .env.template ] && exit 0
          tmpl=$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env.template | cut -d= -f1 | sort -u)
          rc=0
          for cf in docker-compose*.yml; do
            [ -f "$cf" ] || continue
            vars=$(grep -oE '\$\{[A-Za-z_][A-Za-z0-9_]*\}|\$[A-Za-z_][A-Za-z0-9_]+' "$cf" \
                   | sed -E 's/^\$\{?//;s/\}$//' | sort -u)
            while IFS= read -r var; do
              [ -z "$var" ] && continue
              printf '%s\n' "$tmpl" | grep -qx "$var" || { printf 'Undeclared in .env.template: %s (found in %s)\n' "$var" "$cf"; rc=1; }
            done <<< "$vars"
          done
          exit $rc
        severity: error
        instruction: "Declare every environment variable used in Docker files in .env.template"
      - type: script_clean
        name: "Compose name consistent with stack"
        description: "The name field in each docker-compose.<stack>.yml matches the stack name derived from the filename"
        command: |
          rc=0
          for cf in docker-compose.*.yml; do
            [ -f "$cf" ] || continue
            stack="${cf#docker-compose.}"; stack="${stack%.yml}"
            name=$(yq '.name // ""' "$cf" 2>/dev/null || true)
            [ -z "$name" ] || [ "$name" = "$stack" ] || { printf "Compose name '%s' in %s should match stack '%s'\n" "$name" "$cf" "$stack"; rc=1; }
          done
          exit $rc
        severity: warn
        instruction: "Set the 'name:' field in docker-compose.<stack>.yml to match the stack name"

  - group: Config
    rules:
      - type: script_reusable
        name: "Config file present"
        description: "config.yml exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create config.yml in the project root"
        args:
          FILE_PATH: config.yml
          EXPECT: present
      - type: script_reusable
        name: "Config file is valid YAML"
        description: "config.yml can be parsed by yq without errors"
        script: yaml-valid
        severity: error
        instruction: "Fix YAML syntax errors in config.yml"
        args:
          FILE_PATH: config.yml
      - type: script_clean
        name: "Config extends targets exist"
        description: "Every file path referenced by an extends field in config files exists on disk"
        command: |
          rc=0
          for cf in config*.yml; do
            [ -f "$cf" ] || continue
            ext=$(yq '.extends // ""' "$cf" 2>/dev/null || true)
            [ -z "$ext" ] && continue
            dir=$(dirname "$cf")
            [ -f "$dir/$ext" ] || { printf 'Extends target not found: %s/%s (referenced in %s)\n' "$dir" "$ext" "$cf"; rc=1; }
          done
          exit $rc
        severity: error
        instruction: "Ensure the extends target file exists at the path specified relative to the config file"

  - group: Scaffolding
    rules:
      - type: script_reusable
        name: "tmp/ directory present"
        description: "The tmp/ directory exists at the project root for ephemeral, non-tracked scratch files"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create the tmp/ directory"
        args:
          FILE_PATH: tmp
          EXPECT: present
      - type: script_reusable
        name: "Export/ directory present"
        description: "The Export/ directory exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create the Export/ directory"
        args:
          FILE_PATH: Export
          EXPECT: present
      - type: script_reusable
        name: "Logs/ directory present"
        description: "The Logs/ directory exists at the project root"
        script: file-or-dir-existence
        severity: warn
        instruction: "Create the Logs/ directory"
        args:
          FILE_PATH: Logs
          EXPECT: present

  - group: Claude Settings
    rules:
      - type: script_reusable
        name: ".claude/ directory gitignored"
        description: ".gitignore contains '.claude/' so local Claude Code settings and memory are never committed"
        script: file-line-contains
        severity: error
        instruction: "Add '.claude/' to .gitignore"
        args:
          FILE_PATH: .gitignore
          PATTERN: '\.claude/'
      - group: Shared Settings
        rules:
          - type: script_reusable
            name: "Shared Claude settings present"
            description: ".claude/settings.json exists — project-level Claude Code settings are configured"
            script: file-or-dir-existence
            severity: warn
            instruction: "Create .claude/settings.json with the desired Claude Code configuration"
            args:
              FILE_PATH: .claude/settings.json
              EXPECT: present
          - type: script_reusable
            name: "Permission mode is set to bypassPermissions"
            description: "permissions.defaultMode in .claude/settings.json is set to bypassPermissions"
            script: permission-mode
            severity: error
            instruction: "Set permissions.defaultMode to bypassPermissions in .claude/settings.json"
            args:
              MODE: bypassPermissions
          - type: script_reusable
            name: "Deny all curl commands"
            description: ".claude/settings.json denies Bash(curl *) — curl is blocked from Claude tools"
            script: permission-entry
            severity: error
            instruction: "Add 'Bash(curl *)' to permissions.deny in .claude/settings.json"
            args:
              RULE: deny
              TOOL: Bash
              PATTERN: "curl *"
          - type: script_reusable
            name: "Deny all wget commands"
            description: ".claude/settings.json denies Bash(wget *) — wget is blocked from Claude tools"
            script: permission-entry
            severity: error
            instruction: "Add 'Bash(wget *)' to permissions.deny in .claude/settings.json"
            args:
              RULE: deny
              TOOL: Bash
              PATTERN: "wget *"
          - type: script_reusable
            name: "Forbid 'Agent' skill usage"
            description: "'Agent' tool responsible for spawning new sub-agents is denied in .claude/settings.json"
            script: permission-entry
            severity: error
            instruction: "Add 'Agent' to permissions.deny in .claude/settings.json"
            args:
              RULE: deny
              TOOL: Agent
          - type: script_reusable
            name: "Forbid 'Skill' skill usage"
            description: "'Skill' tool responsible for invoking and proposing skills is denied in .claude/settings.json"
            script: permission-entry
            severity: error
            instruction: "Add 'Skill' to permissions.deny in .claude/settings.json"
            args:
              RULE: deny
              TOOL: Skill
      - group: Local Settings
        rules:
          - type: script_reusable
            name: "Local Claude settings present"
            description: ".claude/settings.local.json exists — machine-local Claude Code settings are configured"
            script: file-or-dir-existence
            severity: warn
            instruction: "Create .claude/settings.local.json with machine-specific Claude Code configuration"
            args:
              FILE_PATH: .claude/settings.local.json
              EXPECT: present

arg-templates:
  - id: expect-presence
    key: EXPECT
    label: "Expect"
    type: enum
    required: true
    enum_ref: presence-values
  - id: expect
    key: EXPECT
    label: "Expect"
    type: enum
    required: false
    enum_ref: match-value
  - id: on-no-match
    key: ON_NO_MATCH
    label: "When zero files are found"
    type: enum
    required: false
    enum_ref: no-match-policy
  - id: search-from
    key: FROM
    label: "Search root"
    type: path
    required: false
    placeholder: "."
    description: "Directory to search from. Defaults to . (project root)."
  - id: search-depth
    key: DEPTH
    label: "Max depth"
    type: integer
    required: false
    placeholder: "1"
    description: "Maximum directory depth to search. 1 = files directly inside FROM. Omit for unlimited depth."
  - id: include-files-glob
    key: INCLUDE_FILES_GLOB
    label: "Include files glob"
    type: string
    required: true
    placeholder: "*.java"
    description: "Glob pattern matched against file basenames to include (e.g. *.java, *Controller*)."
  - id: exclude-files-glob
    key: EXCLUDE_FILES_GLOB
    label: "Exclude files glob"
    type: string
    required: false
    placeholder: "*Test.java"
    description: "Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path."

enums:
  - id: file-naming-convention
    name: "File naming convention"
    description: "Regex patterns for identifier naming conventions — validates symbol casing across source code, configs, and file names. Underscore/hyphen-based variants additionally permit '.' as a separator character."
    values:
      - name: camelCase
        value: "^[a-z]+([A-Z][a-z0-9]*)*$"
        description: "First word lowercase, subsequent words capitalized, no separators. Also known as lowerCamelCase or dromedaryCase. Used for local variables and functions in JavaScript, Java, TypeScript."
      - name: PascalCase
        value: "^([A-Z][a-z0-9]*)+$"
        description: "Every word capitalized, no separators. Also known as UpperCamelCase or CapitalCamelCase. Used for class names in almost all languages and React components."
      - name: snake_case
        value: "^[a-z0-9]+([_.][a-z0-9]+)*$"
        description: "All words lowercase, separated by underscores (_). Also known as pothole_case or c_case. Used for variables and functions in Python, Ruby, C++, and SQL column names."
      - name: kebab-case
        value: "^[a-z0-9]+([-.][a-z0-9]+)*$"
        description: "All words lowercase, separated by hyphens (-). Also known as spinal-case, dash-case, or lisp-case. Used for URL slugs, CSS class names, and HTML tags."
      - name: SCREAMING_SNAKE_CASE
        value: "^[A-Z0-9]+([_.][A-Z0-9]+)*$"
        description: "All uppercase letters, separated by underscores. Also known as CONSTANT_CASE or MACRO_CASE. Used for global constants, configuration environment variables (.env), and macros."
      - name: Camel_Snake_Case
        value: "^[a-z0-9]+([_.][A-Z][a-z0-9]*)*$"
        description: "First word lowercase, subsequent words capitalized, separated by underscores. Rare; occasionally used in specific API properties or testing frameworks."
      - name: Pascal_Snake_Case
        value: "^[A-Z][a-z0-9]*([_.][A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by underscores. Also known as Ada_Case. Default naming convention in Ada and legacy Java packages."
      - name: Train-Case
        value: "^[A-Z][a-z0-9]*([-.][A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by hyphens. Also known as HTTP-Header-Case. Standard format for HTTP Header keys."
      - name: SCREAMING-KEBAB-CASE
        value: "^[A-Z0-9]+([-.][A-Z0-9]+)*$"
        description: "All uppercase letters, separated by hyphens. Also known as COBOL-CASE. Used in legacy programming languages like COBOL and mainframe systems."
      - name: Capitalized kebab-case
        value: "^[A-Z][a-z0-9]*([-.][a-z0-9]+)*$"
        description: "First word capitalized, remaining words lowercase, separated by hyphens (dots also permitted as separators). Distinct from Train-Case, which capitalizes every word."
      - name: Capitalized snake_case
        value: "^[A-Z][a-z0-9]*([_.][a-z0-9]+)*$"
        description: "First word capitalized, remaining words lowercase, separated by underscores (dots also permitted as separators). Distinct from Pascal_Snake_Case, which capitalizes every word."
      - name: flatcase
        value: "^[a-z0-9]+$"
        description: "No spaces, no symbols. All lowercase, completely smashed together with no separation. Also known as flat lowercase, lowercase, or mumblecase. Used for HTML tags/attributes and package names in Java/Go (e.g., package main)."
      - name: UPPERFLATCASE
        value: "^[A-Z0-9]+$"
        description: "No spaces, no symbols. All uppercase, smashed together. Also known as UPPERCASE. Used for system commands or legacy database restrictions."
      - name: Title Case
        value: "^[A-Z][a-z0-9]*( [A-Z][a-z0-9]*)*$"
        description: "Every word capitalized, separated by spaces. Used for UI labels, button text, menu items, and display strings — not valid as a code identifier in most languages."


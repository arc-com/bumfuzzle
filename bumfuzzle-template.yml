  - id: environments
    name: "App Environments"
    description: "Application deployment environments"
    values:
      - development
      - staging
      - production

  - group: Claude Settings
    enums:
      - id: claude-permission-mode
        name: "Claude permission mode"
        description: "Valid values for permissions.defaultMode in .claude/settings.json"
        values:
          - name: Default
            value: default
            description: "Asks you before doing anything"
          - name: "Accept edits"
            value: acceptEdits
            description: "Changes files freely, but asks before running commands"
          - name: Plan
            value: plan
            description: "Looks at code and plans, but cannot change files"
          - name: Auto
            value: auto
            description: "AI automatically decides if a task is safe to run"
          - name: "Don't ask"
            value: dontAsk
            description: "Blocks everything unless you already allowed it"
          - name: "Bypass permissions"
            value: bypassPermissions
            description: "Runs everything instantly without asking"
      - id: claude-rule
        name: "Claude rule"
        description: "Permission rule types: deny blocks, allow auto-approves, ask always prompts"
        values:
          - name: Deny
            value: deny
            description: "Blocks the action instantly; the tool is hidden or rejected without asking"
          - name: Allow
            value: allow
            description: "Auto-approves the action silently without a prompt"
          - name: Ask
            value: ask
            description: "Always interrupts and prompts you for confirmation before executing"
      - id: claude-tool
        name: "Claude tool"
        description: "Claude Code tool names used in permission patterns"
        values:
          - name: Bash
            value: Bash
            description: "Matches every single terminal/shell command execution"
          - name: Read
            value: Read
            description: "Matches any command or tool trying to read files"
          - name: Edit
            value: Edit
            description: "Matches partial tool updates to existing files"
          - name: Write
            value: Write
            description: "Matches creating or completely rewriting whole files"
          - name: WebFetch
            value: WebFetch
            description: "Matches outbound internet or API network requests"
          - name: Agent
            value: Agent
            description: "Matches the spawning of subagents (e.g., Agent(Plan), Agent(Explore))"
          - name: Skill
            value: Skill
            description: "Matches invocations of named slash-command skills"
      - id: claude-default-shell
        name: "Claude default shell"
        description: "Valid values for the defaultShell key — the shell used for input-box ! commands (only these two are documented)"
        values:
          - name: bash
            value: bash
            description: "Bash — default on macOS and Linux"
          - name: powershell
            value: powershell
            description: "Windows PowerShell"
      - id: claude-editor-mode
        name: "Claude editor mode"
        description: "Valid values for the editorMode key — key binding mode for the input prompt"
        values:
          - name: Normal
            value: normal
            description: "Standard readline-style key bindings"
          - name: Vim
            value: vim
            description: "Vim-style modal key bindings in the input prompt"
      - id: claude-settings-file
        name: "Claude settings file"
        description: "Project-scope Claude Code settings files that rules can target"
        values:
          - name: Shared
            value: .claude/settings.json
            description: "Project settings shared with the team (committed to git)"
          - name: Local
            value: .claude/settings.local.json
            description: "Machine-local project settings (not committed)"
      - id: claude-model
        name: "Claude model"
        description: "Model aliases accepted by the model key in settings.json (a full model ID is also valid but not offered here)"
        values:
          - name: Sonnet
            value: sonnet
            description: "Latest Sonnet model — balanced capability and speed, the recommended default"
          - name: Opus
            value: opus
            description: "Latest Opus model — most capable, slower and more expensive"
          - name: Haiku
            value: haiku
            description: "Latest Haiku model — fastest and cheapest, for lightweight tasks"
          - name: "Sonnet 1M"
            value: "sonnet[1m]"
            description: "Sonnet with the 1-million-token context window"
          - name: "Opus plan mode"
            value: opusplan
            description: "Opus for plan mode, Sonnet for execution"
      - id: claude-hook-event
        name: "Claude hook event"
        description: "Lifecycle events that hooks in settings.json can register on (hooks.<Event>[].hooks[].command)"
        values:
          - name: PreToolUse
            value: PreToolUse
            description: "Runs before a tool call executes; can block or approve it"
          - name: PostToolUse
            value: PostToolUse
            description: "Runs after a tool call completes (e.g. format a file right after Claude edits it)"
          - name: UserPromptSubmit
            value: UserPromptSubmit
            description: "Runs when the user submits a prompt, before Claude processes it"
          - name: Notification
            value: Notification
            description: "Runs when Claude Code sends a notification (input needed, permission request)"
          - name: Stop
            value: Stop
            description: "Runs when the main agent finishes responding"
          - name: SubagentStop
            value: SubagentStop
            description: "Runs when a subagent finishes responding"
          - name: PreCompact
            value: PreCompact
            description: "Runs before the conversation context is compacted"
          - name: SessionStart
            value: SessionStart
            description: "Runs when a session starts or resumes (e.g. git pull to sync the repo)"
          - name: SessionEnd
            value: SessionEnd
            description: "Runs when a session ends"
      - id: claude-setting-key
        name: "Claude setting key"
        description: "Curated catalog of project-enforceable settings.json keys (scalar-valued, usable with the claude-setting-value script; array-valued keys like availableModels, sandbox.excludedCommands or sandbox.network.allowedDomains are checked with json-array-contains instead)"
        values:
          - name: "Model"
            value: model
            description: "Overrides the default model — an alias like sonnet/opus/haiku or a full model ID (string)"
          - name: "Advisor model"
            value: advisorModel
            description: "Secondary model used for the server-side advisor tool (string)"
          - name: "Enforce available models"
            value: enforceAvailableModels
            description: "Extends the availableModels allowlist to also constrain the default model (boolean)"
          - name: "Always thinking"
            value: alwaysThinkingEnabled
            description: "Enables extended thinking by default for all sessions (boolean)"
          - name: "Effort level"
            value: effortLevel
            description: "Persists thinking effort across sessions: \"low\", \"medium\", \"high\" or \"xhigh\" (string)"
          - name: "Fast mode per-session opt-in"
            value: fastModePerSessionOptIn
            description: "Requires opting into fast mode each session instead of persisting it (boolean)"
          - name: "Disable auto mode"
            value: disableAutoMode
            description: "Set to \"disable\" to remove auto mode from the permission-mode cycle (string)"
          - name: "Output style"
            value: outputStyle
            description: "Adjusts the system prompt with a configured output style, e.g. \"Explanatory\" (string)"
          - name: "Language"
            value: language
            description: "Preferred response language for Claude, e.g. \"english\", \"japanese\" (string)"
          - name: "Permission default mode"
            value: permissions.defaultMode
            description: "Default permission mode — see the Claude permission mode enum for valid values (string)"
          - name: "Disable bypass permissions"
            value: permissions.disableBypassPermissionsMode
            description: "Set to \"disable\" to prevent bypassPermissions mode from being used (string)"
          - name: "Disable all hooks"
            value: disableAllHooks
            description: "Safety toggle that turns off all hooks and the custom status line (boolean)"
          - name: "Default shell"
            value: defaultShell
            description: "Shell for input-box ! commands: \"bash\" or \"powershell\" (string)"
          - name: "Include git instructions"
            value: includeGitInstructions
            description: "Includes the built-in git workflow instructions in the system prompt (boolean)"
          - name: "Commit attribution"
            value: attribution.commit
            description: "Custom attribution text for git commits, replacing the default Claude co-author line; \"\" removes it (string)"
          - name: "PR attribution"
            value: attribution.pr
            description: "Custom attribution text for pull requests; \"\" removes it (string)"
          - name: "Sandbox enabled"
            value: sandbox.enabled
            description: "Runs Bash commands with OS-level filesystem and network isolation (boolean)"
          - name: "Auto-allow sandboxed bash"
            value: sandbox.autoAllowBashIfSandboxed
            description: "Skips permission prompts for commands running inside the sandbox (boolean)"
          - name: "Allow unsandboxed fallback"
            value: sandbox.allowUnsandboxedCommands
            description: "Allows retrying commands outside the sandbox when they fail under it; false enforces strict sandbox mode (boolean)"
          - name: "Sandbox fail if unavailable"
            value: sandbox.failIfUnavailable
            description: "Refuses to start when sandbox dependencies are missing instead of falling back to unsandboxed execution (boolean)"
          - name: "Sandbox HTTP proxy port"
            value: sandbox.network.httpProxyPort
            description: "Routes sandboxed HTTP traffic through a custom proxy on this port (number)"
          - name: "Sandbox SOCKS proxy port"
            value: sandbox.network.socksProxyPort
            description: "Routes sandboxed traffic through a custom SOCKS proxy on this port (number)"
          - name: "Auto memory enabled"
            value: autoMemoryEnabled
            description: "Lets Claude persist learned project context into automated memory files (boolean)"
          - name: "Auto memory directory"
            value: autoMemoryDirectory
            description: "Custom directory for auto memory storage (string path)"
          - name: "Cleanup period days"
            value: cleanupPeriodDays
            description: "Days session transcripts and temporary worktrees are kept before startup cleanup; default 30 (number)"
          - name: "File checkpointing"
            value: fileCheckpointingEnabled
            description: "Snapshots files before edits so /rewind can restore them (boolean)"
          - name: "Auto compact"
            value: autoCompactEnabled
            description: "Automatically compacts the conversation when context approaches its limit (boolean)"
          - name: "Temp file cleanup interval"
            value: temporaryFileCleanupInterval
            description: "Minutes between temporary-file cleanup runs (number)"
          - name: "Auto-updates channel"
            value: autoUpdatesChannel
            description: "Release track for auto-updates: \"stable\" or \"latest\" (string)"
          - name: "Minimum version"
            value: minimumVersion
            description: "Floor preventing the auto-updater from going below this version (string)"
          - name: "Enable all project MCP servers"
            value: enableAllProjectMcpServers
            description: "Auto-approves every MCP server declared in the project's .mcp.json (boolean)"
          - name: "Editor mode"
            value: editorMode
            description: "Key binding mode for the input prompt: \"normal\" or \"vim\" (string)"
          - name: "Spinner tips"
            value: spinnerTipsEnabled
            description: "Shows context-aware tips while the spinner is loading (boolean)"
          - name: "Reduced motion"
            value: prefersReducedMotion
            description: "Reduces or disables UI animations for accessibility (boolean)"
          - name: "Verbose"
            value: verbose
            description: "Enables verbose logging output (boolean)"


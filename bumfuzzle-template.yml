  - group: Claude Settings
    enums:
      - id: claude-permission-mode
        name: "Claude permission mode"
        description: "Valid values for permissions.defaultMode in .claude/settings.json"
        values:
          - name: Default
            value: default
            description: "Asks you before doing anything"
          - name: "Accept edits"
            value: acceptEdits
            description: "Changes files freely, but asks before running commands"
          - name: Plan
            value: plan
            description: "Looks at code and plans, but cannot change files"
          - name: Auto
            value: auto
            description: "AI automatically decides if a task is safe to run"
          - name: "Don't ask"
            value: dontAsk
            description: "Blocks everything unless you already allowed it"
          - name: "Bypass permissions"
            value: bypassPermissions
            description: "Runs everything instantly without asking"
      - id: claude-rule
        name: "Claude rule"
        description: "Permission rule types: deny blocks, allow auto-approves, ask always prompts"
        values:
          - name: Deny
            value: deny
            description: "Blocks the action instantly; the tool is hidden or rejected without asking"
          - name: Allow
            value: allow
            description: "Auto-approves the action silently without a prompt"
          - name: Ask
            value: ask
            description: "Always interrupts and prompts you for confirmation before executing"
      - id: claude-tool
        name: "Claude tool"
        description: "Claude Code tool names used in permission patterns"
        values:
          - name: Bash
            value: Bash
            description: "Matches every single terminal/shell command execution"
          - name: Read
            value: Read
            description: "Matches any command or tool trying to read files"
          - name: Edit
            value: Edit
            description: "Matches partial tool updates to existing files"
          - name: Write
            value: Write
            description: "Matches creating or completely rewriting whole files"
          - name: WebFetch
            value: WebFetch
            description: "Matches outbound internet or API network requests"
          - name: Agent
            value: Agent
            description: "Matches the spawning of subagents (e.g., Agent(Plan), Agent(Explore))"
          - name: Skill
            value: Skill
            description: "Matches invocations of named slash-command skills"
      - id: claude-default-shell

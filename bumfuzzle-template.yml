schema_version: 1
scripts:
  - group: "File Meta Checks"
    scripts:
      - id: file-or-dir-existence
        name: "File/directory presence check"
        description: "Checks that a file or directory exists at each path in FILE_PATH."
        command: |
          _failed=false
          while IFS= read -r _p; do
            [[ -z "$_p" ]] && continue
            [[ "$_p" =~ [[:space:]] ]] && { printf '%s must not contain spaces\n' "$_p"; exit 1; }
            [[ "$_p" =~ \.\. ]] && { printf '%s must not contain ..\n' "$_p"; exit 1; }
            [[ "$_p" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf '%s contains invalid characters\n' "$_p"; exit 1; }
            if [[ "$_p" == *"**/"* ]]; then
              _root="${_p%%\*\*/*}"
              _hit=$(find "${_root:-.}" -name "${_p#*\*\*/}" 2>/dev/null | head -1)
            elif [[ "$_p" == */* ]]; then
              _hit=$(find "." -path "./$_p" 2>/dev/null | head -1)
            else
              _hit=$(find "." -name "$_p" 2>/dev/null | head -1)
            fi
            [[ -n "$_hit" ]] || { printf 'missing: %s\n' "$_p"; _failed=true; }
          done <<< "$FILE_PATH"
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: File or directory path
            required: true
            type: path
            list: true
            placeholder: README.md
            description: "Glob-capable path. Provide a YAML list to check multiple files/directories in one rule."
      - id: file-syntax-valid
        name: "File syntax valid"
        description: "Checks that all files matching INCLUDE_FILES_GLOB (and not matching EXCLUDE_FILES_GLOB; both accept YAML lists) under SEARCH_ROOT parse/compile cleanly as the selected FILE_TYPE (YAML via yq, JSON via jq, Bash via bash -n). Searches up to SEARCH_DEPTH levels deep; .git, node_modules, .venv and .claude are always skipped. Every matched file must pass; no matches is a pass unless FAIL_ON_FILE_NOT_FOUND."
        command: |
          [[ "${SEARCH_ROOT:-}" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          case "$FILE_TYPE" in
            yaml|json|bash) ;;
            *) printf 'Unsupported FILE_TYPE: %s\n' "$FILE_TYPE"; exit 1 ;;
          esac
          _depth_arg=""
          if [[ -n "${SEARCH_DEPTH:-}" && "$SEARCH_DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $SEARCH_DEPTH"
          fi
          _from="${SEARCH_ROOT:-.}"
          _inc_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _inc_args="${_inc_args:+$_inc_args -o }-name $_g"
          done <<< "${INCLUDE_FILES_GLOB:-}"
          [[ -z "$_inc_args" ]] && { printf 'INCLUDE_FILES_GLOB is required\n'; exit 1; }
          _ex_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args -not -name $_g"
          done <<< "${EXCLUDE_FILES_GLOB:-}"
          _failed=false
          _any=false
          set -f
          while IFS= read -r _f; do
            _any=true
            case "$FILE_TYPE" in
              yaml) yq '.' "$_f" > /dev/null 2>&1 || { printf '%s is not valid YAML\n' "$_f"; _failed=true; } ;;
              json) jq empty "$_f" > /dev/null 2>&1 || { printf '%s is not valid JSON\n' "$_f"; _failed=true; } ;;
              bash) bash -n "$_f" 2>/dev/null || { printf '%s has bash syntax errors\n' "$_f"; _failed=true; } ;;
            esac
          done < <(find "$_from" $_depth_arg \( -name .git -o -name node_modules -o -name .venv -o -name .claude \) -prune -o \( $_inc_args \) $_ex_args -type f -print 2>/dev/null)
          set +f
          if [[ "$_any" == "false" && "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
            printf 'missing: no files matched %s under %s\n' "${INCLUDE_FILES_GLOB:-}" "$_from"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_TYPE
            label: File type
            required: true
            type: enum
            enum_ref: verifiable-file-types
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: SEARCH_DEPTH
            label: "Max depth"
            type: int
            required: false
            placeholder: "1"
            description: "Maximum directory depth to search. 1 = files directly inside SEARCH_ROOT. Omit for unlimited depth."
          - key: INCLUDE_FILES_GLOB
            label: Include files glob
            required: true
            type: glob
            list: true
            placeholder: '*.yml'
            description: Glob pattern matched against file basenames to include (e.g. *.yml, config.yml). Provide a YAML list to match multiple globs.
          - key: EXCLUDE_FILES_GLOB
            label: Exclude files glob
            required: false
            type: glob
            list: true
            placeholder: '*.generated.yml'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no files matched
            type: bool
            required: true
            description: true = zero files matched is a failure; false = zero files matched is a pass
      - id: file-naming-scan-check
        name: "File name(s) (via pattern scan) matches pattern"
        description: "Checks that all file basenames matching INCLUDE (and not matching EXCLUDE; both accept YAML lists) comply with the selected NAMING_CONVENTION. The final extension is stripped before matching, so PascalCase matches Header.tsx. Searches under SEARCH_ROOT up to SEARCH_DEPTH levels deep; .git, node_modules, .venv and .claude are always skipped. FAIL_ON_FILE_NOT_FOUND controls whether zero matches is a fail (default true) or a pass (false)."
        command: |
          [[ "${SEARCH_ROOT:-}" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          _pattern="$NAMING_CONVENTION"
          _depth_arg=""
          if [[ -n "${SEARCH_DEPTH:-}" && "$SEARCH_DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $SEARCH_DEPTH"
          fi
          _from="${SEARCH_ROOT:-.}"
          _inc_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _inc_args="${_inc_args:+$_inc_args -o }-name $_g"
          done <<< "${INCLUDE:-*}"
          [[ -z "$_inc_args" ]] && _inc_args="-name *"
          _ex_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args -not -name $_g"
          done <<< "${EXCLUDE:-}"
          _failed=false
          _any=false
          set -f
          while IFS= read -r _f; do
            _any=true
            _base=$(basename "$_f")
            _stem="${_base%.*}"
            [[ -z "$_stem" ]] && _stem="$_base"
            if ! echo "$_stem" | grep -qE "$_pattern"; then
              printf '%s does not match naming convention %s\n' "$_f" "$_pattern"
              _failed=true
            fi
          done < <(find "$_from" $_depth_arg \( -name .git -o -name node_modules -o -name .venv -o -name .claude \) -prune -o \( $_inc_args \) $_ex_args -type f -print 2>/dev/null)
          set +f
          if [[ "$_any" == "false" && "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
            printf 'missing: no files matched %s under %s\n' "${INCLUDE:-*}" "$_from"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: SEARCH_DEPTH
            label: "Max depth"
            type: int
            required: false
            placeholder: "1"
            description: "Maximum directory depth to search. 1 = files directly inside SEARCH_ROOT. Omit for unlimited depth."
          - key: INCLUDE
            label: Include glob
            required: false
            type: glob
            list: true
            default: '*'
            placeholder: '*.java'
            description: Glob pattern matched against file basenames to include (e.g. *.java, *Controller*). Provide a YAML list to match multiple globs. Defaults to * (all files).
          - key: EXCLUDE
            label: Exclude glob
            required: false
            type: glob
            list: true
            placeholder: '*Test.java'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
          - key: NAMING_CONVENTION
            label: Naming convention
            required: true
            type: enum
            enum_ref: file-naming-convention
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no matches found
            type: bool
            required: true
            description: true = zero matches is a failure; false = zero matches is a pass
      - id: dir-naming-scan-check
        name: "Folder name(s) (via pattern scan) matches pattern"
        description: "Checks that all directory basenames matching INCLUDE (and not matching EXCLUDE; both accept YAML lists of basename globs) under SEARCH_ROOT (up to SEARCH_DEPTH levels) comply with the selected NAMING_CONVENTION. Hidden directories and node_modules are always skipped. FAIL_ON_FILE_NOT_FOUND controls whether zero matches is a fail (default true) or a pass (false)."
        command: |
          _from="${SEARCH_ROOT:-.}"
          [[ "$_from" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          _pattern="$NAMING_CONVENTION"
          _depth_arg=""
          if [[ -n "${SEARCH_DEPTH:-}" && "$SEARCH_DEPTH" -ge 1 ]]; then
            _depth_arg="-maxdepth $SEARCH_DEPTH"
          fi
          _failed=false
          _any=false
          while IFS= read -r _d; do
            [[ -z "$_d" ]] && continue
            _base=$(basename "$_d")
            _inc=false
            while IFS= read -r _g; do
              [[ -z "$_g" ]] && continue
              [[ "$_base" == $_g ]] && _inc=true
            done <<< "${INCLUDE:-*}"
            [[ "$_inc" == "false" ]] && continue
            _skip=false
            while IFS= read -r _e; do
              [[ -z "$_e" ]] && continue
              [[ "$_base" == $_e ]] && _skip=true
            done <<< "${EXCLUDE:-}"
            [[ "$_skip" == "true" ]] && continue
            _any=true
            if ! echo "$_base" | grep -qE "$_pattern"; then
              printf 'directory %s does not match naming convention %s\n' "$_d" "$_pattern"
              _failed=true
            fi
          done < <(find "$_from" $_depth_arg -mindepth 1 \( -name '.*' -o -name node_modules \) -prune -o -type d -print 2>/dev/null)
          if [[ "$_any" == "false" && "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
            printf 'missing: no directories matched %s under %s\n' "${INCLUDE:-*}" "$_from"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: SEARCH_DEPTH
            label: "Max depth"
            type: int
            required: false
            placeholder: "1"
            description: "Maximum directory depth to search. 1 = directories directly inside SEARCH_ROOT. Omit for unlimited depth."
          - key: INCLUDE
            label: Include glob
            required: false
            type: glob
            list: true
            default: '*'
            placeholder: 'src'
            description: Glob pattern matched against directory basenames to include. Provide a YAML list to match multiple globs. Defaults to * (all directories).
          - key: EXCLUDE
            label: Exclude glob
            required: false
            type: glob
            list: true
            placeholder: "Export"
            description: "Glob pattern matched against directory basenames to exclude. Provide a YAML list for multiple globs."
          - key: NAMING_CONVENTION
            label: Naming convention
            required: true
            type: enum
            enum_ref: file-naming-convention
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no matches found
            type: bool
            required: true
            description: true = zero matches is a failure; false = zero matches is a pass
      - id: file-naming-path-check
        name: "File name(s) (via declared path) matches pattern"
        description: "Checks that each file in PATH_LIST (a YAML list of paths) has a basename complying with NAMING_CONVENTION. The final extension is stripped before matching, so PascalCase matches Header.tsx. FAIL_ON_FILE_NOT_FOUND controls whether a declared path that doesn't exist (or isn't a file) is a fail (default true) or a skip (false)."
        command: |
          _failed=false
          while IFS= read -r _p; do
            [[ -z "$_p" ]] && continue
            [[ "$_p" =~ \.\. ]] && { printf '%s must not contain ..\n' "$_p"; _failed=true; continue; }
            if [[ ! -f "$_p" ]]; then
              if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
                printf 'missing: %s is not a file\n' "$_p"
                _failed=true
              fi
              continue
            fi
            _base=$(basename "$_p")
            _stem="${_base%.*}"
            [[ -z "$_stem" ]] && _stem="$_base"
            if ! echo "$_stem" | grep -qE "$NAMING_CONVENTION"; then
              printf '%s does not match naming convention %s\n' "$_p" "$NAMING_CONVENTION"
              _failed=true
            fi
          done <<< "${PATH_LIST:-}"
          [[ "$_failed" == "false" ]]
        args:
          - key: PATH_LIST
            label: Path(s)
            required: true
            type: path
            list: true
            placeholder: 'src/main/AppConfig.java'
            description: File path(s) to check. Provide a YAML list for multiple.
          - key: NAMING_CONVENTION
            label: Naming convention
            required: true
            type: enum
            enum_ref: file-naming-convention
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when path is missing
            type: bool
            required: true
            description: true = a declared path that isn't an existing file is a failure; false = it's silently skipped
      - id: dir-naming-path-check
        name: "Folder name(s) (via declared path) matches pattern"
        description: "Checks that each directory in PATH_LIST (a YAML list of paths) has a basename complying with NAMING_CONVENTION. FAIL_ON_FILE_NOT_FOUND controls whether a declared path that doesn't exist (or isn't a directory) is a fail (default true) or a skip (false)."
        command: |
          _failed=false
          while IFS= read -r _p; do
            [[ -z "$_p" ]] && continue
            [[ "$_p" =~ \.\. ]] && { printf '%s must not contain ..\n' "$_p"; _failed=true; continue; }
            if [[ ! -d "$_p" ]]; then
              if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
                printf 'missing: %s is not a directory\n' "$_p"
                _failed=true
              fi
              continue
            fi
            _base=$(basename "$_p")
            if ! echo "$_base" | grep -qE "$NAMING_CONVENTION"; then
              printf '%s does not match naming convention %s\n' "$_p" "$NAMING_CONVENTION"
              _failed=true
            fi
          done <<< "${PATH_LIST:-}"
          [[ "$_failed" == "false" ]]
        args:
          - key: PATH_LIST
            label: Path(s)
            required: true
            type: path
            list: true
            placeholder: 'src/main'
            description: Directory path(s) to check. Provide a YAML list for multiple.
          - key: NAMING_CONVENTION
            label: Naming convention
            required: true
            type: enum
            enum_ref: file-naming-convention
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when path is missing
            type: bool
            required: true
            description: true = a declared path that isn't an existing directory is a failure; false = it's silently skipped
      - id: no-large-files
        name: "No large files"
        description: "Checks that no file in the project exceeds SIZE_AMOUNT SIZE_UNIT. .git and node_modules are always skipped; EXCLUDE_FILES_GLOB (accepts a YAML list) skips additional basename globs."
        command: |
          _threshold=$((10#$SIZE_AMOUNT * SIZE_UNIT))
          _ex_args=""
          while IFS= read -r _g; do
            [[ -z "$_g" ]] && continue
            _ex_args="$_ex_args -not -name $_g"
          done <<< "${EXCLUDE_FILES_GLOB:-}"
          _failed=false
          set -f
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            printf '%s exceeds %s bytes\n' "$_f" "$_threshold"
            _failed=true
          done < <(find . \( -name .git -o -name node_modules \) -prune -o -type f -size +"${_threshold}"c $_ex_args -print 2>/dev/null)
          set +f
          [[ "$_failed" == "false" ]]
        args:
          - key: SIZE_AMOUNT
            label: "Amount"
            type: int
            required: true
            placeholder: "5"
          - key: SIZE_UNIT
            label: "Unit"
            type: enum
            required: true
            enum_ref: size-unit
          - key: EXCLUDE_FILES_GLOB
            label: Exclude files glob
            required: false
            type: glob
            list: true
            placeholder: '*Test.java'
            description: 'Glob pattern matched against file basenames to exclude. Note: matches basename only, not full path. Provide a YAML list for multiple globs.'
      - id: symlinks-valid
        name: "Symlinks valid"
        description: "Checks that every symlink under SEARCH_ROOT resolves to an existing target, and that absolute targets stay inside the project root."
        command: |
          _from="${SEARCH_ROOT:-.}"
          [[ "$_from" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          _any=false
          _failed=false
          while IFS= read -r _l; do
            [[ -z "$_l" ]] && continue
            _any=true
            _t=$(readlink "$_l")
            if [[ ! -e "$_l" ]]; then
              printf 'broken symlink %s -> %s\n' "$_l" "$_t"
              _failed=true
            elif [[ "$_t" == /* && "$_t" != "$PWD"/* ]]; then
              printf 'symlink %s points outside the project (%s)\n' "$_l" "$_t"
              _failed=true
            fi
          done < <(find "$_from" -name .git -prune -o -type l -print 2>/dev/null)
          if [[ "$_any" == "false" ]]; then
            if [[ "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
              printf 'missing: no symlinks found under %s\n' "$_from"
              exit 1
            else
              exit 0
            fi
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: SEARCH_ROOT
            label: "Search root"
            type: path
            required: false
            placeholder: "."
            description: "Directory to search from. Defaults to . (project root)."
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no symlinks found
            type: bool
            required: true
            description: true = no symlink found under SEARCH_ROOT is a failure; false = it's a pass
      - id: file-or-dir-size-compare
        name: "File or directory size"
        description: "Checks that all files/directories matching FILE_PATH (glob-capable) satisfy SIZE_AMOUNT SIZE_UNIT compared via COMPARISON_OPERATOR (e.g. AMOUNT=5, UNIT=MiB, OPERATOR=le means every match must be <= 5 MiB). Directories are measured as their recursive total size. Every match must comply. FAIL_ON_FILE_NOT_FOUND controls whether zero matches is a fail (default true) or a pass (false)."
        command: |
          [[ "$FILE_PATH" =~ [[:space:]] ]] && { printf 'FILE_PATH must not contain spaces\n'; exit 1; }
          [[ "$FILE_PATH" =~ \.\. ]] && { printf 'FILE_PATH must not contain ..\n'; exit 1; }
          [[ "$FILE_PATH" =~ ^[a-zA-Z0-9_./*?-]+$ ]] || { printf 'FILE_PATH contains invalid characters\n'; exit 1; }
          case "$COMPARISON_OPERATOR" in lt|le|eq|ge|gt) ;; *) printf 'Unrecognized COMPARISON_OPERATOR %s\n' "$COMPARISON_OPERATOR"; exit 1 ;; esac
          _threshold=$((10#$SIZE_AMOUNT * SIZE_UNIT))
          _failed=false
          _any=false
          while IFS= read -r _f; do
            [[ -z "$_f" ]] && continue
            _any=true
            if [[ -d "$_f" ]]; then
              _size=$(( $(du -sk "$_f" 2>/dev/null | awk '{print $1}') * 1024 ))
            else
              _size=$(stat -f%z "$_f" 2>/dev/null || stat -c%s "$_f" 2>/dev/null)
            fi
            _ok=false
            case "$COMPARISON_OPERATOR" in
              lt) [[ "$_size" -lt "$_threshold" ]] && _ok=true ;;
              le) [[ "$_size" -le "$_threshold" ]] && _ok=true ;;
              eq) [[ "$_size" -eq "$_threshold" ]] && _ok=true ;;
              ge) [[ "$_size" -ge "$_threshold" ]] && _ok=true ;;
              gt) [[ "$_size" -gt "$_threshold" ]] && _ok=true ;;
            esac
            if [[ "$_ok" == "false" ]]; then
              printf '%s size %s does not satisfy %s %s\n' "$_f" "$_size" "$COMPARISON_OPERATOR" "$_threshold"
              _failed=true
            fi
          done < <(
            if [[ "$FILE_PATH" == *"**/"* ]]; then
              _root="${FILE_PATH%%\*\*/*}"
              find "${_root:-.}" -name "${FILE_PATH#*\*\*/}" 2>/dev/null
            elif [[ "$FILE_PATH" == */* ]]; then
              find "." -path "./$FILE_PATH" 2>/dev/null
            else
              find "." -name "$FILE_PATH" 2>/dev/null
            fi
          )
          if [[ "$_any" == "false" && "${FAIL_ON_FILE_NOT_FOUND:-true}" == "true" ]]; then
            printf 'missing: no files matched %s\n' "$FILE_PATH"
            _failed=true
          fi
          [[ "$_failed" == "false" ]]
        args:
          - key: FILE_PATH
            label: File or directory path or glob
            required: true
            type: path
            placeholder: '**/*.log'
          - key: COMPARISON_OPERATOR
            label: "Operator"
            type: enum
            required: true
            enum_ref: comparison-operator
          - key: SIZE_AMOUNT
            label: "Amount"
            type: int
            required: true
            placeholder: "5"
          - key: SIZE_UNIT
            label: "Unit"
            type: enum
            required: true
            enum_ref: size-unit
          - key: FAIL_ON_FILE_NOT_FOUND
            label: Fail when no paths matched
            type: bool
            required: true
            description: true = zero matches is a failure; false = zero matches is a pass
      - id: file-name-count-compare
        name: "File name count compares"
        description: "Compares the count of files under SEARCH_ROOT (up to SEARCH_DEPTH levels) whose basename matches any of FILE_NAMES (glob-capable list) against COUNT_THRESHOLD via COMPARISON_OPERATOR"
        command: |
          [[ "$SEARCH_ROOT" =~ [[:space:]] ]] && { printf 'SEARCH_ROOT must not contain spaces\n'; exit 1; }
          [[ "$SEARCH_ROOT" =~ \.\. ]] && { printf 'SEARCH_ROOT must not contain ..\n'; exit 1; }
          [[ "$SEARCH_DEPTH" =~ ^[0-9]+$ ]] || { printf 'SEARCH_DEPTH must be a non-negative integer\n'; exit 1; }
          [[ "$COUNT_THRESHOLD" =~ ^[0-9]+$ ]] || { printf 'COUNT_THRESHOLD must be a non-negative integer\n'; exit 1; }
          case "$COMPARISON_OPERATOR" in lt|le|eq|ge|gt) ;; *) printf 'Unrecognized COMPARISON_OPERATOR %s\n' "$COMPARISON_OPERATOR"; exit 1 ;; esac
          [[ -z "$FILE_NAMES" ]] && { printf 'FILE_NAMES must not be empty\n'; exit 1; }
          _find_expr=()
          while IFS= read -r _n; do
            [[ -z "$_n" ]] && continue
            [[ "$_n" =~ \.\. ]] && { printf 'FILE_NAMES entries must not contain ..\n'; exit 1; }
            [[ ${#_find_expr[@]} -gt 0 ]] && _find_expr+=(-o)
            _find_expr+=(-name "$_n")
          done <<< "$FILE_NAMES"
          _count=$(find "$SEARCH_ROOT" -maxdepth "$SEARCH_DEPTH" \( "${_find_expr[@]}" \) 2>/dev/null | wc -l | tr -d ' ')
          _ok=false
          case "$COMPARISON_OPERATOR" in
            lt) [[ "$_count" -lt "$COUNT_THRESHOLD" ]] && _ok=true ;;
            le) [[ "$_count" -le "$COUNT_THRESHOLD" ]] && _ok=true ;;
            eq) [[ "$_count" -eq "$COUNT_THRESHOLD" ]] && _ok=true ;;
            ge) [[ "$_count" -ge "$COUNT_THRESHOLD" ]] && _ok=true ;;
            gt) [[ "$_count" -gt "$COUNT_THRESHOLD" ]] && _ok=true ;;
          esac
          if [[ "$_ok" == "false" ]]; then
            printf 'matched count %s does not satisfy %s %s under %s\n' "$_count" "$COMPARISON_OPERATOR" "$COUNT_THRESHOLD" "$SEARCH_ROOT"
            exit 1
          fi
        args:
          - key: SEARCH_ROOT
            label: Search root
            required: true
            type: path
          - key: SEARCH_DEPTH
            label: Search depth
            required: true
            type: int
          - key: FILE_NAMES
            label: File names
            required: true
            type: glob
            list: true
          - key: COMPARISON_OPERATOR
            label: Operator
            required: true
            type: enum
            enum_ref: comparison-operator
          - key: COUNT_THRESHOLD

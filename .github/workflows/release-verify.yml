name: Release Verify

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  verify:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Registries can take a few seconds to index a fresh publish.
      - name: Wait for registries to catch up
        run: sleep 30

      - name: Verify npm/PyPI/Homebrew all serve VERSION
        run: ./tests/release/test_release.sh

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG" != "$FILE_VERSION" ]]; then
            echo "::error::tag v$TAG does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

      - name: Compute source tarball sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          curl -sL "$URL" -o /tmp/bumfuzzle-src.tar.gz
          echo "sha256=$(shasum -a 256 /tmp/bumfuzzle-src.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      # publish to npm/PyPI is intentionally omitted here until NPM_TOKEN /
      # PYPI_API_TOKEN secrets exist on this repo.

      - name: Bump Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="formula-bump-${{ github.ref_name }}"
          git checkout -b "$BRANCH"
          sed -i "s|^  url \".*\"|  url \"${{ steps.sha.outputs.url }}\"|" Formula/bumfuzzle.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${{ steps.sha.outputs.sha256 }}\"|" Formula/bumfuzzle.rb
          git config user.name "bumfuzzle-bot"
          git config user.email "noreply@archicode.ai"
          git add Formula/bumfuzzle.rb
          git commit -m "chore(formula): bump to ${{ github.ref_name }}

          Co-Authored-By: Alan <noreply@archicode.ai>"
          git push origin "$BRANCH"
          gh pr create --title "chore(formula): bump to ${{ github.ref_name }}" \
            --body "Automated formula bump for ${{ github.ref_name }}." \
            --base main --head "$BRANCH"

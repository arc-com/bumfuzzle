name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION file
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [[ "$TAG" != "$FILE_VERSION" ]]; then
            echo "::error::tag v$TAG does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

  github-release:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
      url: ${{ steps.sha.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes

      - name: Compute source tarball sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          curl -sL "$URL" -o /tmp/bumfuzzle-src.tar.gz
          echo "sha256=$(shasum -a 256 /tmp/bumfuzzle-src.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  pypi-publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install build twine
          python -m build
          twine upload dist/*

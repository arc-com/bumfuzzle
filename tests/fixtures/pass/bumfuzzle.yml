# Fixture: every enabled rule passes when marker.txt exists in the project.
# The "Optional arg not inherited" rule doubles as the env-isolation check:
# test scripts export OPT_ARG before running preflight and the rule must
# still pass. The disabled rule would fail if it ever ran.
scripts:
  - group: "Files"
    scripts:
      - id: file-exists
        name: "File exists"
        description: "Fails unless FILE_PATH exists"
        command: |
          [ -e "$FILE_PATH" ]
        args:
          - key: FILE_PATH
            label: "Path"
            required: true
      - id: env-clean
        name: "Env clean"
        description: "Fails if OPT_ARG is present in the environment"
        command: |
          [ -z "${OPT_ARG:-}" ]
        args:
          - key: OPT_ARG
            label: "Optional arg"
rules:
  - group: "Structure"
    rules:
      - type: script_reusable
        name: "Marker file present"
        script: file-exists
        instruction: "Create marker.txt"
        args:
          FILE_PATH: marker.txt
      - type: script_clean
        name: "Working directory readable"
        command: |
          ls . > /dev/null
  - group: "Isolation"
    rules:
      - type: script_reusable
        name: "Optional arg not inherited"
        script: env-clean
      - type: script_reusable
        name: "Disabled rule never runs"
        script: file-exists
        enabled: false
        args:
          FILE_PATH: does-not-exist.txt
